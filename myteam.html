<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فريقي — سيمبل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f7f8f7;--panel:#fff;--line:rgba(10,10,10,.09);--line2:rgba(10,10,10,.16);--ink:#0a0a0a;--muted:#5f6b66;--faint:#9aa3a0;--accent:#13B9B2;--accent-dim:#0e7a74;--accent-ink:#0c4f4b;--ok:#1fbf6b;--font:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}
.nav{background:#fff;border-bottom:1px solid var(--line);padding:16px 0}
.wrap{max-width:900px;margin:0 auto;padding:0 22px}
.nav-in{display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:var(--ink)}
.logo .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);align-self:flex-end;margin-bottom:6px}
.back{font-size:13px;color:var(--muted);font-weight:600}
.hero{padding:26px 0 6px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero h1{font-size:24px;font-weight:700}.hero p{color:var(--muted);font-size:14px;margin-top:4px;max-width:520px}
/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.stat .n{font-size:22px;font-weight:700;color:var(--accent-ink);line-height:1.2}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}
/* section head */
.sechead{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px}
.sechead h2{font-size:16px;font-weight:700;color:var(--accent-ink)}
.sechead .cnt{font-size:12.5px;color:var(--faint)}
/* board */
.board{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.board{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr 1fr;gap:8px}.stat{padding:11px}.stat .n{font-size:18px}}
.mcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 17px;display:flex;flex-direction:column;gap:11px;position:relative}
.mcard.owner{border-color:rgba(19,185,178,.45);background:linear-gradient(180deg,rgba(19,185,178,.05),#fff)}
.mtop{display:flex;align-items:center;gap:12px}
.avwrap{position:relative;flex-shrink:0}
.av{width:46px;height:46px;border-radius:50%;background:rgba(19,185,178,.14);color:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px}
.sdot{position:absolute;bottom:1px;left:1px;width:12px;height:12px;border-radius:50%;border:2.5px solid #fff;background:var(--faint)}
.sdot.on{background:var(--ok)}
.mname{flex:1;min-width:0}
.mname b{font-weight:700;color:var(--accent-ink);font-size:15px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mname small{display:block;color:var(--faint);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:100px;flex-shrink:0;align-self:flex-start}
.badge.owner{background:rgba(19,185,178,.16);color:var(--accent-dim)}.badge.member{background:#eef1f0;color:#5f6b66}
/* current activity */
.doing{background:#f6faf9;border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start}
.doing .dic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.doing .dtx{flex:1;min-width:0;font-size:13px;line-height:1.55}
.doing .dtx .st{font-weight:700;color:var(--accent-ink)}
.doing .dtx small{display:block;color:var(--faint);font-size:11.5px;margin-top:2px}
.doing.idle{background:#fafbfb}.doing.idle .dic{background:#f0f1f0;color:#b0b7b4}.doing.idle .st{color:var(--muted)}
/* perms */
.pchips{display:flex;flex-wrap:wrap;gap:5px}
.pc{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:100px;background:rgba(19,185,178,.12);color:var(--accent-dim)}
.pc.off{background:#f4f5f5;color:#c2c8c5;text-decoration:line-through}
.macts{display:flex;gap:7px;margin-top:1px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:100px;border:1px solid var(--line2);background:#fff;color:var(--ink);font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--accent);color:var(--accent-dim)}
.btn.primary{background:linear-gradient(135deg,#16c2ba,#0e9a94);border-color:transparent;color:#fff}
.btn.primary:hover{filter:brightness(1.05);color:#fff}
.btn.primary:disabled{opacity:.6;cursor:default}
.btn.sm{padding:7px 13px;font-size:12px}
.btn.danger{color:#c23b3b;border-color:rgba(201,48,48,.4)}.btn.danger:hover{background:rgba(201,48,48,.06)}
.ed{margin-top:2px;padding:12px;background:#fbfdfc;border:1px solid var(--line);border-radius:12px}
/* member banner */
.wsbanner{background:linear-gradient(135deg,#16c2ba,#0e9a94);color:#fff;border-radius:14px;padding:14px 18px;margin-top:16px;font-size:13.5px;font-weight:600}
/* timeline */
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-top:12px}
.feed{display:flex;flex-direction:column}
.frow{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
.frow:first-child{border-top:0}
.fic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fi{flex:1;min-width:0;font-size:13.5px;line-height:1.6}
.fi .fw{font-weight:700;color:var(--accent-ink)}
.fi .fd{color:var(--ink)}
.fi .fa{font-weight:700;color:var(--accent-dim)}
.fi small{display:block;color:var(--faint);font-size:11.5px;margin-top:2px}
.empty{color:var(--faint);font-size:13px;padding:10px 0}
.toggle{background:none;border:0;color:var(--accent-dim);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;padding:0}
/* modal */
.ov{position:fixed;inset:0;background:rgba(8,20,19,.5);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:34px 16px;overflow:auto}
.ov.show{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:480px;padding:22px 22px 24px;position:relative}
.modal h3{font-size:17px;font-weight:700;color:var(--accent-ink)}
.modal .sub{font-size:12.5px;color:var(--faint);margin:4px 0 16px}
.modal .x{position:absolute;top:14px;left:16px;background:none;border:0;font-size:22px;color:var(--faint);cursor:pointer;line-height:1}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
.field{margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.row2{grid-template-columns:1fr}}
input[type=text],input[type=email],input[type=password]{width:100%;padding:12px 14px;border:1px solid var(--line2);border-radius:11px;font-family:var(--font);font-size:15px;background:#fff;color:var(--ink)}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(19,185,178,.14)}
.perms{display:flex;flex-wrap:wrap;gap:9px;margin-top:2px}
.perm-chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);border-radius:100px;padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer;user-select:none;transition:.15s}
.perm-chip input{accent-color:var(--accent);width:15px;height:15px}
.perm-chip.on{border-color:var(--accent);background:rgba(19,185,178,.08);color:var(--accent-ink)}
.note{font-size:12px;color:var(--muted);background:#f1f5f4;border-radius:11px;padding:11px 13px;margin-top:12px;line-height:1.7}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0c4f4b;color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:80;max-width:90%;text-align:center}
.toast.show{opacity:1}
.loading{text-align:center;color:var(--muted);padding:44px}
</style>
</head>
<body>
<nav class="nav"><div class="wrap nav-in">
  <a href="/brand.html" class="logo">سيمبل<span class="dot"></span></a>
  <a href="/brand.html" class="back">← رجوع للوحة</a>
</div></nav>

<div class="wrap">
  <div id="content"><div class="loading">نحمّل فريقك…</div></div>
</div>

<!-- Add member modal -->
<div class="ov" id="ov" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <button class="x" onclick="closeAdd()">×</button>
    <h3>➕ إضافة عضو للفريق</h3>
    <div class="sub">تنشئ له حساباً بإيميل وكلمة سر يدخل فيهما، وتحدّد صلاحياته. يدخل نفس مساحتك مباشرة.</div>
    <div class="row2">
      <div class="field"><label>اسم العضو</label><input type="text" id="m-name" placeholder="مثال: خالد المنصور"></div>
      <div class="field"><label>الإيميل</label><input type="email" id="m-email" placeholder="member@email.com" autocomplete="off"></div>
    </div>
    <div class="field"><label>كلمة السر (6 أحرف فأكثر)</label><input type="text" id="m-pass" placeholder="كلمة سر يدخل بها العضو" autocomplete="new-password"></div>
    <div class="field"><label>الصلاحيات</label><div class="perms" id="perm-box"></div></div>
    <button class="btn primary" id="add-btn" style="width:100%;margin-top:4px" onclick="addMember()">+ إضافة العضو</button>
    <div class="note">🔒 كلمة السر تُستخدم لإنشاء الحساب فقط ولا تُخزَّن كنص. شاركها مع العضو ليدخل بها من صفحة تسجيل الدخول.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>document.write('<script src="supabase-config.js?v=' + Date.now() + '"><\/script>');</script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const PERMS=[
  {k:'campaigns',l:'إدارة الحملات',d:'إنشاء وتعديل وحذف الحملات'},
  {k:'deals',l:'اعتماد الصفقات',d:'اعتماد/رفض المعلنين والتفاوض'},
  {k:'workflow',l:'إدارة التنفيذ',d:'مراحل التنفيذ والموافقة على المحتوى'},
  {k:'payments',l:'المستحقات والدفع',d:'رؤية وتأكيد الدفع والبيانات البنكية'},
  {k:'analytics',l:'التحليلات والتقارير',d:'عرض التحليلات وتصدير التقارير'}
];
const PLABEL=Object.fromEntries(PERMS.map(p=>[p.k,p.l]));
const ACTS={
  camp_create:{i:'🆕',c:'#0e9a94',v:'ينشئ حملة'}, camp_edit:{i:'✏️',c:'#5f6b66',v:'يعدّل حملة'}, camp_delete:{i:'🗑️',c:'#c23b3b',v:'حذف حملة'},
  approve:{i:'✅',c:'#0e9a94',v:'يعتمد صفقة'}, reject:{i:'⛔',c:'#c23b3b',v:'رفض معلن'}, stage:{i:'🎬',c:'#5f6b66',v:'ينفّذ حملة'},
  pay:{i:'💰',c:'#0e9a94',v:'يؤكد دفعة'}, member_add:{i:'👤',c:'#0e9a94',v:'أضاف عضو'}
};
let currentUser=null, workspace=null, MEMBERS=[], ACTIVITY=[], showAll=false;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function timeAgo(ts){
  const d=new Date(ts), now=new Date(), s=Math.floor((now-d)/1000);
  if(s<60) return 'الآن';
  const m=Math.floor(s/60); if(m<60) return 'قبل '+m+' دقيقة';
  const h=Math.floor(m/60); if(h<24) return 'قبل '+h+' ساعة';
  const dd=Math.floor(h/24); if(dd<30) return 'قبل '+dd+' يوم';
  return d.toLocaleDateString('ar-SA');
}
function isToday(ts){const d=new Date(ts),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}

async function init(){
  try{ await tryRestoreSession(); }catch(e){}
  currentUser=(typeof getCurrentUser==='function')?getCurrentUser():null;
  if(!currentUser){ location.href='/login.html'; return; }
  if(currentUser.role!=='brand'){ location.href='/creator.html'; return; }
  await load();
}
async function load(){
  try{
    const [wsRes,listRes,actRes]=await Promise.all([ supabaseClient.rpc('team_my_workspace'), supabaseClient.rpc('team_list'), supabaseClient.rpc('team_activity_list') ]);
    workspace=wsRes.data||{is_member:false};
    MEMBERS=listRes.data||[];
    ACTIVITY=(actRes&&Array.isArray(actRes.data))?actRes.data:[];
    render();
  }catch(e){ console.error(e); $('#content').innerHTML='<div class="card"><div class="empty" style="color:#c23b3b">تعذّر تحميل الفريق. حدّث الصفحة.</div></div>'; }
}

// latest activity for a given member id
function latestFor(id){
  for(const a of ACTIVITY){ if(a.actor_id===id) return a; }
  return null;
}
function countToday(id){ return ACTIVITY.filter(a=>a.actor_id===id && isToday(a.created_at)).length; }

function doingBlock(m){
  const a=latestFor(m.member_id);
  if(!a){ return '<div class="doing idle"><span class="dic">💤</span><div class="dtx"><span class="st">ما بدأ بعد</span><small>ما فيه نشاط مسجّل</small></div></div>'; }
  const meta=ACTS[a.action]||{i:'•',c:'#5f6b66',v:'نشاط'};
  const recent=(new Date()-new Date(a.created_at))<30*60*1000;
  return '<div class="doing"><span class="dic" style="background:'+meta.c+'1a;color:'+meta.c+'">'+meta.i+'</span>'
    +'<div class="dtx"><span class="st">'+(recent?'الحين: ':'آخر نشاط: ')+'</span>'+esc(a.detail||meta.v)
    +'<small>'+esc(timeAgo(a.created_at))+'</small></div></div>';
}

function memberCard(m){
  const nm=m.name||m.email||'عضو'; const initial=(nm||'ع')[0];
  const badge=m.is_owner?'<span class="badge owner">المالك</span>':'<span class="badge member">عضو</span>';
  const isMe=m.member_id===currentUser.id;
  const perms=m.permissions||[];
  const chips=m.is_owner
    ? '<span class="pc">كل الصلاحيات</span>'
    : PERMS.map(p=>'<span class="pc'+(perms.includes(p.k)?'':' off')+'">'+p.l+'</span>').join('');
  const a=latestFor(m.member_id);
  const recent=a&&(new Date()-new Date(a.created_at))<30*60*1000;
  const today=countToday(m.member_id);
  const canManage = !workspace.is_member && !m.is_owner;
  const acts=canManage?'<div class="macts"><button class="btn sm" onclick="toggleEdit(\''+m.member_id+'\')">صلاحيات</button><button class="btn sm danger" onclick="removeMember(\''+m.member_id+'\',\''+esc(nm).replace(/\x27/g,"")+'\')">إزالة</button></div>':'';
  return '<div class="mcard'+(m.is_owner?' owner':'')+'">'
    +'<div class="mtop"><div class="avwrap"><span class="av">'+esc(initial)+'</span><span class="sdot'+(recent?' on':'')+'"></span></div>'
    +'<div class="mname"><b>'+esc(nm)+(isMe?' <span style="color:#9aa3a0;font-weight:400">(أنت)</span>':'')+'</b><small>'+esc(m.email||'')+(today?' · '+today+' حركة اليوم':'')+'</small></div>'
    +badge+'</div>'
    +doingBlock(m)
    +'<div class="pchips">'+chips+'</div>'
    +acts
    +'<div id="ed-'+m.member_id+'"></div></div>';
}

function render(){
  const isMember = workspace && workspace.is_member;
  const owner = MEMBERS.find(m=>m.is_owner);
  const others = MEMBERS.filter(m=>!m.is_owner);
  const ordered = owner? [owner].concat(others) : MEMBERS;
  const activeToday = MEMBERS.filter(m=>countToday(m.member_id)>0).length;
  const actsToday = ACTIVITY.filter(a=>isToday(a.created_at)).length;

  let html='';
  html+='<div class="hero"><div><h1>👥 فريقي</h1><p>'
    +(isMember?'مساحة العمل المشتركة — شوف الفريق وكل واحد وش يسوي.':'شوف فريقك في مكان واحد — مين نشِط الحين، وكل واحد وش آخر شي سواه.')
    +'</p></div>'
    +(!isMember?'<button class="btn primary" onclick="openAdd()">+ إضافة عضو</button>':'')+'</div>';

  if(isMember){
    html+='<div class="wsbanner">✦ أنت عضو في مساحة «'+esc(workspace.owner_company_name||'شركة')+'». صلاحياتك: '+((workspace.permissions||[]).map(p=>PLABEL[p]||p).join(' · ')||'—')+'</div>';
  }

  html+='<div class="stats">'
    +'<div class="stat"><div class="n">'+MEMBERS.length+'</div><div class="l">عضو في المساحة</div></div>'
    +'<div class="stat"><div class="n">'+activeToday+'</div><div class="l">نشِط اليوم</div></div>'
    +'<div class="stat"><div class="n">'+actsToday+'</div><div class="l">حركة اليوم</div></div>'
    +'</div>';

  html+='<div class="sechead"><h2>لوحة الفريق</h2><span class="cnt">'+ordered.length+' أعضاء</span></div>';
  html+='<div class="board">'+(ordered.length?ordered.map(memberCard).join(''):'<div class="empty">ما فيه أعضاء بعد.</div>')+'</div>';

  // timeline
  const feed = showAll?ACTIVITY:ACTIVITY.slice(0,8);
  html+='<div class="sechead"><h2>📋 سجل النشاط</h2>'
    +(ACTIVITY.length>8?'<button class="toggle" onclick="showAll=!showAll;render()">'+(showAll?'إظهار أقل':'عرض الكل ('+ACTIVITY.length+')')+'</button>':'')+'</div>';
  html+='<div class="card">'
    +(ACTIVITY.length?'<div class="feed">'+feed.map(activityRow).join('')+'</div>':'<div class="empty">ما فيه نشاط مسجّل بعد. أي حركة من الفريق (اعتماد، تنفيذ، دفع، تعديل حملة) بتظهر هنا.</div>')
    +'</div>';

  $('#content').innerHTML=html;
}

function activityRow(a){
  const meta=ACTS[a.action]||{i:'•',c:'#5f6b66'};
  const who=a.is_me?'أنت':(a.actor_name||'عضو');
  return '<div class="frow"><span class="fic" style="background:'+meta.c+'1a;color:'+meta.c+'">'+meta.i+'</span>'
    +'<div class="fi"><span class="fw">'+esc(who)+'</span> <span class="fd">'+esc(a.detail||'')+'</span>'
    +(a.amount?' <span class="fa">'+Number(a.amount).toLocaleString('en-US')+' ر.س</span>':'')
    +'<small>'+esc(timeAgo(a.created_at))+'</small></div></div>';
}

/* ---- add member modal ---- */
function openAdd(){
  $('#perm-box').innerHTML = PERMS.map(p=>'<label class="perm-chip on"><input type="checkbox" class="perm" value="'+p.k+'" checked onchange="this.closest(\'.perm-chip\').classList.toggle(\'on\',this.checked)"> '+p.l+'</label>').join('');
  $('#m-name').value='';$('#m-email').value='';$('#m-pass').value='';
  $('#ov').classList.add('show');
}
function closeAdd(){ $('#ov').classList.remove('show'); }

async function addMember(){
  const name=($('#m-name').value||'').trim(), email=($('#m-email').value||'').trim(), pass=$('#m-pass').value||'';
  const perms=Array.from(document.querySelectorAll('#perm-box .perm:checked')).map(c=>c.value);
  if(!name){ toast('اكتب اسم العضو'); return; }
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast('الإيميل غير صحيح'); return; }
  if(pass.length<6){ toast('كلمة السر 6 أحرف على الأقل'); return; }
  const btn=$('#add-btn'); btn.disabled=true; btn.textContent='جاري الإضافة…';
  try{
    const {data:sess}=await supabaseClient.auth.getSession();
    const token=sess&&sess.session?sess.session.access_token:'';
    const res=await fetch('/api/team-member',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({name,email,password:pass,permissions:perms})});
    const j=await res.json().catch(()=>({}));
    if(!res.ok||!j.ok) throw new Error(j.error||'تعذّرت الإضافة');
    toast('تمت إضافة العضو ✓'); closeAdd();
    await load();
  }catch(e){ toast(e.message||'تعذّرت الإضافة'); btn.disabled=false; btn.textContent='+ إضافة العضو'; }
}

/* ---- edit / remove ---- */
function toggleEdit(id){
  const host=$('#ed-'+id); if(!host) return;
  if(host.innerHTML){ host.innerHTML=''; return; }
  const m=MEMBERS.find(x=>x.member_id===id); const perms=m?(m.permissions||[]):[];
  host.innerHTML='<div class="ed"><div class="perms">'
    + PERMS.map(p=>'<label class="perm-chip'+(perms.includes(p.k)?' on':'')+'"><input type="checkbox" class="ep-'+id+'" value="'+p.k+'"'+(perms.includes(p.k)?' checked':'')+' onchange="this.closest(\'.perm-chip\').classList.toggle(\'on\',this.checked)"> '+p.l+'</label>').join('')
    +'</div><div style="margin-top:10px;display:flex;gap:8px"><button class="btn sm primary" onclick="savePerms(\''+id+'\')">حفظ</button><button class="btn sm" onclick="toggleEdit(\''+id+'\')">إلغاء</button></div></div>';
}
async function savePerms(id){
  const perms=Array.from(document.querySelectorAll('.ep-'+id+':checked')).map(c=>c.value);
  try{
    const {error}=await supabaseClient.rpc('team_set_permissions',{p_member:id,p_perms:perms});
    if(error) throw error;
    toast('حُدّثت الصلاحيات ✓'); await load();
  }catch(e){ toast((e&&e.message)?e.message:'تعذّر الحفظ'); }
}
async function removeMember(id,name){
  if(!confirm('إزالة '+(name||'العضو')+'؟ ما راح يقدر يوصل مساحتك بعدها.')) return;
  try{
    const {error}=await supabaseClient.rpc('team_remove',{p_member:id});
    if(error) throw error;
    toast('تمت الإزالة'); await load();
  }catch(e){ toast((e&&e.message)?e.message:'تعذّرت الإزالة'); }
}

init();
</script>
