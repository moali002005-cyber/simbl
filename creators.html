<!DOCTYPE html>
<html lang="ar" dir="rtl" data-i18n-title="creators_title">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تصفّح المعلنين - سيمبل</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/translations.js"></script>
<script src="/i18n.js"></script>
<style>
:root{--cream:#ffffff;--cream-darker:#f5f5f4;--ink:#0a0a0a;--ink-soft:#3a3a3a;--ink-muted:#6b6b6b;--ink-faint:#a0a0a0;--accent:#13B9B2;--accent-ink:#0c4f4b;--line:rgba(10,10,10,0.08);--line-strong:rgba(10,10,10,0.16);--font-display:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;--font-body:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.7;min-height:100vh;}
.container{max-width:1200px;margin:0 auto;padding:0 32px;}
.nav{background:var(--cream);padding:16px 0;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;}
.nav-inner{display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--ink);}
.logo-eye{width:40px;height:40px;display:block;}
.logo-mark{font-family:var(--font-display);font-size:16px;font-weight:500;position:relative;padding-left:10px;line-height:1;}
.logo-mark::after{content:'';position:absolute;bottom:0;left:0;width:4px;height:4px;background:var(--accent);border-radius:50%;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-back{background:#fff;color:var(--ink);border:1px solid var(--line-strong);padding:8px 16px;border-radius:100px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;}
.btn-back:hover{border-color:var(--ink-soft);}
.hero{padding:38px 24px 16px;text-align:center;}
.hero-title{font-family:var(--font-display);font-size:32px;font-weight:600;margin:0 0 8px;}
.hero-sub{font-size:15px;color:var(--ink-soft);max-width:560px;margin:0 auto 16px;}
.count-pill{display:inline-flex;align-items:center;gap:8px;padding:7px 16px;border-radius:100px;border:1px solid rgba(19,185,178,0.30);color:var(--accent-ink);background:#fff;font-size:13px;font-weight:600;}
.count-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.search-wrap{max-width:520px;margin:20px auto 0;}
.search-input{width:100%;padding:13px 18px;border:1px solid var(--line-strong);border-radius:100px;font-family:inherit;font-size:15px;background:#fff;color:var(--ink);text-align:center;}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(19,185,178,0.14);}
.filters{padding:14px 0 6px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.filter-label{font-size:12px;font-weight:600;color:var(--ink-muted);min-width:90px;}
.dd{position:relative;}
.dd-btn{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:100px;padding:9px 16px;font-family:inherit;font-size:13px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;transition:all .15s;}
.dd-btn:hover{border-color:var(--ink-soft);}
.dd-btn.on{border-color:var(--accent);color:var(--accent-ink);font-weight:600;}
.dd-chev{font-size:10px;color:var(--ink-muted);}
.dd-menu{position:absolute;top:calc(100% + 6px);right:0;z-index:30;background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px;min-width:190px;box-shadow:0 10px 30px rgba(10,10,10,0.12);display:none;max-height:320px;overflow-y:auto;}
.dd-menu.open{display:block;}
.dd-opt{display:block;width:100%;text-align:right;background:none;border:none;border-radius:9px;padding:9px 12px;font-family:inherit;font-size:13px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;}
.dd-opt:hover{background:#f5f5f4;}
.dd-opt.active{background:rgba(19,185,178,0.10);color:var(--accent-ink);font-weight:600;}
.chip{background:#fff;color:var(--ink-soft);padding:7px 14px;border-radius:100px;border:1px solid var(--line);font-family:inherit;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip:hover{border-color:var(--ink-soft);}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.ptabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:20px 0 4px;overflow-x:auto;}
.ptab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 18px;font-family:inherit;font-size:14px;color:var(--ink-muted);cursor:pointer;white-space:nowrap;transition:all .15s;margin-bottom:-1px;}
.ptab:hover{color:var(--ink-soft);}
.ptab.active{color:var(--accent-ink);font-weight:600;border-bottom-color:var(--accent);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;padding:22px 0 60px;}
.vcard{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;text-align:center;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .25s;}
.vcard:hover{transform:translateY(-3px);border-color:rgba(19,185,178,0.45);box-shadow:0 10px 30px -14px rgba(10,10,10,0.2);}
.vband{height:44px;background:var(--accent);}
.vav-ring{width:62px;height:62px;border-radius:50%;margin:-32px auto 0;padding:3px;background:#fff;box-shadow:0 0 0 1px rgba(10,10,10,0.06);}
.vbody{padding:8px 14px 16px;}
.vname{font-family:var(--font-display);font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vhandle{font-size:12px;color:var(--ink-muted);direction:ltr;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vfoll{font-size:24px;font-weight:600;color:var(--accent);font-family:var(--font-display);margin-top:10px;line-height:1.1;}
.vfoll-lbl{font-size:11px;color:var(--ink-faint);margin-bottom:10px;}
.tag{font-size:11px;padding:4px 10px;border-radius:100px;background:var(--cream-darker);color:var(--ink-soft);font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.empty,.loading-wrap{grid-column:1/-1;text-align:center;padding:70px 32px;color:var(--ink-muted);}
.empty .ic{font-size:42px;opacity:.5;margin-bottom:10px;}
.empty h3{font-family:var(--font-display);font-size:19px;color:var(--ink);margin-bottom:6px;}
.loading-pill{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(19,185,178,0.2);border-radius:100px;padding:10px 22px;font-family:var(--font-display);font-size:13px;font-weight:500;color:var(--accent-ink);}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.modal-backdrop{position:fixed;inset:0;background:rgba(10,10,10,0.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-backdrop.show{display:flex;}
.modal{background:#fff;border-radius:22px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;position:relative;text-align:center;}
.modal-close{position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.9);border:0;width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--ink-muted);z-index:2;}
.m-band{height:64px;background:var(--accent);border-radius:22px 22px 0 0;}
.m-ring{width:96px;height:96px;border-radius:50%;margin:-48px auto 0;padding:3px;background:#fff;box-shadow:0 0 0 2px var(--accent);}
.m-name{font-family:var(--font-display);font-size:19px;font-weight:600;margin-top:12px;}
.m-handle{font-size:13px;color:var(--ink-muted);direction:ltr;}
.m-stats{display:flex;align-items:center;margin:16px 18px 14px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.m-stat{flex:1;text-align:center;}
.m-sn{font-size:17px;font-weight:600;font-family:var(--font-display);}
.m-sl{font-size:11px;color:var(--ink-faint);margin-top:2px;}
.m-div{width:1px;height:26px;background:var(--line);}
.m-bio{font-size:13px;color:var(--ink-soft);line-height:1.7;margin:0 18px 16px;}
.m-actions{display:flex;gap:10px;padding:0 18px;margin-bottom:14px;}
.m-btn{flex:1;text-align:center;padding:11px;border-radius:100px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;}
.m-btn.primary{background:var(--accent);color:#fff;border:0;}
.m-btn.primary:hover{background:var(--accent-ink);}
.m-btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line-strong);}
.m-watch{margin:0 18px 18px;border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--ink-muted);}
.m-watch-ic{width:46px;height:46px;border-radius:50%;background:rgba(19,185,178,0.10);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-size:20px;}
.toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
.toast{display:flex;align-items:center;gap:10px;background:#fff;color:var(--ink);border:1px solid var(--line);border-right:4px solid var(--accent);border-radius:14px;padding:13px 18px;font-size:14px;font-weight:500;box-shadow:0 14px 36px -12px rgba(10,10,10,0.28);opacity:0;transform:translateY(-12px);transition:all .28s cubic-bezier(0.22,1,0.36,1);}
.toast.show{opacity:1;transform:translateY(0);}
.cart-btn{margin-top:12px;width:100%;padding:9px;border-radius:100px;border:1px solid var(--accent);background:#fff;color:var(--accent-ink);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;}
.cart-btn:hover{background:rgba(19,185,178,0.08);}
.cart-btn.in{background:var(--accent);color:#fff;border-color:var(--accent);}
@media (max-width:640px){.container{padding:0 16px;}.hero-title{font-size:26px;}.filter-label{min-width:100%;}}
/* ===== طبقة الثقة في الدليل ===== */
.vtrust{display:flex;align-items:center;justify-content:center;gap:4px;margin:7px 0 3px;flex-wrap:wrap;}
.cstars{direction:ltr;display:inline-flex;}
.cstar{font-size:13px;color:var(--line-strong);}
.cstar.on{color:#E8B84B;}
.cstar-v{font-size:12px;font-weight:700;color:var(--ink-soft);margin-inline-start:3px;}
.cstar-c{font-size:10px;color:var(--ink-faint);}
.cstar-c.seed{color:#8a6500;background:rgba(232,184,75,0.12);padding:1px 6px;border-radius:100px;font-weight:600;}
.cflag{width:18px;height:12px;border-radius:2px;overflow:hidden;object-fit:cover;display:inline-block;vertical-align:middle;box-shadow:0 0 0 1px rgba(10,10,10,0.10);margin-inline-start:2px;}
.cbadge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:100px;margin-inline-start:6px;vertical-align:middle;}
.cbadge.ver{background:rgba(19,185,178,0.14);color:var(--accent-ink);}
.cbadge.prom{background:rgba(232,184,75,0.16);color:#8a6500;}
.m-trust{margin:0 18px 14px;padding:14px 16px;background:var(--cream-darker);border-radius:14px;text-align:right;}
.m-trust-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;}
.m-trust-score{display:flex;flex-direction:column;align-items:center;line-height:1;}
.mts-num{font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--accent-ink);}
.mts-lbl{font-size:10px;color:var(--ink-faint);margin-top:2px;}
.m-trust-stars{display:flex;align-items:center;gap:3px;}
.m-crit-note{font-size:12px;color:var(--ink-muted);text-align:center;padding:4px 0;}
.cbar-row{display:flex;align-items:center;gap:10px;margin:8px 0;}
.cbar-label{font-size:12px;color:var(--ink-soft);min-width:122px;text-align:right;}
.cbar-track{flex:1;height:7px;background:#fff;border-radius:100px;overflow:hidden;}
.cbar-fill{height:100%;background:var(--accent);border-radius:100px;}
.cbar-val{font-size:12px;font-weight:700;color:var(--accent-ink);min-width:24px;text-align:left;}
.m-reviews{margin-top:6px;}
.m-rev-title{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--ink);margin:12px 0 8px;}
.m-rev{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:7px;}
.m-rev-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.m-rev-by{font-size:10px;color:var(--ink-faint);}
.m-rev-txt{font-size:12.5px;color:var(--ink-soft);line-height:1.6;}
</style>
</head>
<body>
<div class="toast-wrap" id="toast-wrap"></div>
<nav class="nav">
  <div class="container nav-inner">
    <a href="/brand.html" class="logo" aria-label="سيمبل">

      <button type="button" data-i18n-toggle onclick="simblI18n.toggle()" style="background:#fff;border:1.5px solid rgba(10,10,10,0.28);color:var(--ink);padding:8px 16px;border-radius:100px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">EN</button>
      <a href="/top.html" class="btn-back" style="border-color:rgba(19,185,178,0.5);color:var(--accent-ink);font-weight:600;">★ النخبة</a>
      <a href="/brand.html" class="btn-back">العودة للوحة</a>
    </div>
  </div>
</nav>
<main class="container">
  <section class="hero">
    <h1 class="hero-title">تصفّح المعلنين</h1>
    <p class="hero-sub">اكتشف المؤثرين المسجّلين في سيمبل واختر الأنسب لحملتك.</p>
    <div class="search-wrap"><input type="text" class="search-input" id="search" placeholder="ابحث بالاسم أو الحساب..." oninput="applyFilters()"></div>
  </section>
  <div class="ptabs" id="ptabs"></div>
  <section class="filters">
    <div class="dd" id="dd-tier"><button type="button" class="dd-btn" id="btn-tier" onclick="toggleDD('tier',event)"><span id="lbl-tier">نطاق المتابعين</span><span class="dd-chev">▾</span></button><div class="dd-menu" id="menu-tier"></div></div>
    <div class="dd" id="dd-cat"><button type="button" class="dd-btn" id="btn-cat" onclick="toggleDD('cat',event)"><span id="lbl-cat">التصنيف</span><span class="dd-chev">▾</span></button><div class="dd-menu" id="menu-cat"></div></div>
  </section>
  <section class="grid" id="grid"><div class="loading-wrap"><div class="loading-pill"><span class="loading-dot"></span>جاري تحميل المعلنين...</div></div></section>
</main>
<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeProfile()"><div class="modal" id="modal-body"></div></div>
<script src="/supabase-config.js"></script>
<script>
let allCreators = [];
let filters = { tier:'all', cat:'all', plat:'all' };

  SD:'<rect width="24" height="16" fill="#fff"/><rect width="24" height="5.34" fill="#ce1126"/><rect y="10.66" width="24" height="5.34" fill="#000"/><path d="M0 0 L9 8 L0 16 Z" fill="#007a3d"/>',

// ===== طبقة الثقة: نفس منطق صفحة النخبة =====
var T_PRIOR_STRENGTH=4, T_REAL_RAMP=6;
function tHashId(id){ var h=0,s=String(id||''); for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function tSeedScore(id){ return 82 + (tHashId(id)%14); }
function tFollowerBonus(f){ f=parseInt(f)||0; if(f<=0) return 0; return Math.max(0,Math.min(5,Math.log10(f+1)-3)); }
function tSeedRating(id){ return 4.3 + (tHashId(id+'r')%7)/10; }
function tDisplayRating(c){ var ratings=Number(c.ratings_count)||0, avg=Number(c.avg_rating)||0, seed=tSeedRating(c.id); return (T_PRIOR_STRENGTH*seed+avg*ratings)/(T_PRIOR_STRENGTH+ratings); }
function tTrustScore(c){ var seed=tSeedScore(c.id)+tFollowerBonus(c.followers); var ratings=Number(c.ratings_count)||0; var ratingScore=(tDisplayRating(c)/5)*100; var wReal=ratings/(ratings+T_REAL_RAMP); var dealsBoost=Math.min(Number(c.deals_count)||0,20)*0.4; return Math.max(0,Math.min(100,(1-wReal)*seed+wReal*ratingScore+dealsBoost)); }
function tStarsLine(c){
  var ratings=Number(c.ratings_count)||0, dr=tDisplayRating(c), full=Math.round(dr);
  var s=''; for(var i=1;i<=5;i++) s+='<span class="cstar'+(i<=full?' on':'')+'">★</span>';
  var tail=ratings>0?('<span class="cstar-c">('+ratings+' تقييم)</span>'):'';
  return '<span class="cstars">'+s+'</span><span class="cstar-v">'+dr.toFixed(1)+'</span>'+tail;
}
function tBadge(c){ return (Number(c.deals_count)||0)>=1 ? '<span class="cbadge ver">موثّق ✓</span>' : '<span class="cbadge prom">واعد</span>'; }
function tCritSeed(id, key){ return 4.2 + (tHashId(key + ':' + id) % 8) / 10; }
function tCritBars(c){
  var ratings=Number(c.ratings_count)||0;
  var crits=[['جودة المحتوى','content',c.avg_content],['الالتزام بالمواعيد','punct',c.avg_punctuality],['التواصل والاحترافية','comm',c.avg_communication],['النتائج والتفاعل','res',c.avg_results]];
  return crits.map(function(it){ var seed=tCritSeed(c.id,it[1]); var real=Number(it[2])||0; var v=ratings>0?(T_PRIOR_STRENGTH*seed+real*ratings)/(T_PRIOR_STRENGTH+ratings):seed; var pct=Math.max(0,Math.min(100,(v/5)*100)); return '<div class="cbar-row"><span class="cbar-label">'+it[0]+'</span><span class="cbar-track"><span class="cbar-fill" style="width:'+pct+'%"></span></span><span class="cbar-val">'+v.toFixed(1)+'</span></div>'; }).join('');
}
async function loadReviews(creatorId){
  var box=document.getElementById('m-reviews'); if(!box) return;
  try{
    var res=await supabaseClient.from('creator_ratings').select('stars, comment, created_at').eq('creator_id',creatorId).order('created_at',{ascending:false}).limit(20);
    var rows=(res.data||[]).filter(function(r){ return r.comment && String(r.comment).trim(); });
    if(!rows.length){ box.innerHTML=''; return; }
    box.innerHTML='<div class="m-rev-title">آراء الشركات</div>'+rows.map(function(r){
      var full=Math.round(Number(r.stars)||0), st=''; for(var i=1;i<=5;i++) st+='<span class="cstar'+(i<=full?' on':'')+'">★</span>';
      return '<div class="m-rev"><div class="m-rev-head"><span class="cstars">'+st+'</span><span class="m-rev-by">شركة موثّقة</span></div><div class="m-rev-txt">'+escHtml(r.comment)+'</div></div>';
    }).join('');
  }catch(e){ box.innerHTML=''; }
}

function buildDD(which, defaultLabel, items){

  var cur=(which==='tier')?filters.tier:filters.cat; menu.innerHTML='';
  items.forEach(it=>{ var b=document.createElement('button'); b.type='button';
    b.className='dd-opt'+(it.key===cur?' active':''); b.textContent=it.label; b.dataset.key=it.key; b.dataset.label=it.label;
    b.onclick=function(e){ e.stopPropagation(); selectDD(which, it.key, it.label, defaultLabel); }; menu.appendChild(b); });

function selectDD(which, key, label, defaultLabel){

function matchTier(f){ if(filters.tier==='all') return true; var t=TIERS.find(x=>x.key===filters.tier); var n=parseInt(f)||0; return t&&n>=t.min&&n<=t.max; }
function currentFiltered(){

    if(filters.plat!=='all'&&c.platform!==filters.plat) return false;

function closeProfile(){ document.getElementById('modal').classList.remove('show'); }
function getCart(){ try{ return JSON.parse(localStorage.getItem('simbl_cart')||'[]'); }catch(e){ return []; } }
function inCart(id){ return getCart().indexOf(id)>=0; }
function updateCartBadge(){ var n=getCart().length; var b=document.getElementById('cart-badge'); if(b){ b.textContent=n; b.style.display=n?'inline-flex':'none'; } }
function toggleCart(id, ev){ if(ev){ ev.stopPropagation(); } var a=getCart(); var i=a.indexOf(id); var nowIn; if(i>=0){ a.splice(i,1); nowIn=false; } else { a.push(id); nowIn=true; } localStorage.setItem('simbl_cart', JSON.stringify(a)); updateCartBadge(); showToast(nowIn?'أُضيف للسلة ✓':'أُزيل من السلة'); document.querySelectorAll('[data-cart-id="'+id+'"]').forEach(function(btn){ btn.classList.toggle('in',nowIn); var lbl=btn.querySelector('.cart-lbl'); if(lbl) lbl.textContent=nowIn?'في السلة ✓':'أضف للسلة'; }); if(window.simblI18n && document.documentElement.lang==='en') simblI18n.apply(); }
document.addEventListener('DOMContentLoaded', updateCartBadge);
function copyHandle(h){ if(!h) return; var done=()=>showToast('تم نسخ المعرّف ✓'); if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(h).then(done).catch(done); else done(); }
async function init(){
  if(typeof tryRestoreSession==='function'){ try{ await tryRestoreSession(); }catch(e){} }
  var user=getCurrentUser();
  if(!user){ alert('يرجى تسجيل الدخول أولاً'); window.location.href='/signup.html'; return; }
  if(user.role==='creator'){ window.location.href='/creator.html'; return; }
  initChips();
  try{
    var [dirRes, trustRes]=await Promise.all([
      supabaseClient.from('creator_directory').select('id, name, handle, platform, followers, category, bio, website, avatar_url').order('followers',{ascending:false}),
      supabaseClient.from('creator_trust').select('creator_id, deals_count, ratings_count, avg_rating, avg_content, avg_punctuality, avg_communication, avg_results')
    ]);
    if(dirRes.error) throw dirRes.error;
    allCreators=dirRes.data||[];
    var tmap={}; (trustRes.data||[]).forEach(function(t){ tmap[t.creator_id]=t; });
    allCreators.forEach(function(c){
      var t=tmap[c.id]||{};
      c.deals_count=Number(t.deals_count)||0; c.ratings_count=Number(t.ratings_count)||0; c.avg_rating=Number(t.avg_rating)||0;
      c.avg_content=Number(t.avg_content)||0; c.avg_punctuality=Number(t.avg_punctuality)||0;
      c.avg_communication=Number(t.avg_communication)||0; c.avg_results=Number(t.avg_results)||0;
    });
    applyFilters();
    var _pid = new URLSearchParams(location.search).get('id');
    if(_pid) openProfileById(_pid);
    if(window.simblI18n && document.documentElement.lang==='en') simblI18n.apply();
  }catch(err){
    console.error(err);
    document.getElementById('grid').innerHTML='<div class="empty"><div class="ic">!</div><h3>حصل خطأ في تحميل المعلنين.</h3><p>حدّث الصفحة وحاول مرة أخرى.</p></div>';
  }
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeProfile(); });
init();
</script>
</body>
</html>
