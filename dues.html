<!DOCTYPE html>

<head>

<style>
:root {
  --cream: #ffffff;
  --cream-darker: #f5f5f4;
  --ink: #0a0a0a;
  --ink-soft: #3a3a3a;
  --ink-muted: #6b6b6b;
  --ink-faint: #a0a0a0;
  --accent: #13B9B2;
  --accent-soft: #7fd6d2;
  --accent-ink: #0c4f4b;
  --line: rgba(10, 10, 10, 0.08);
  --line-strong: rgba(10, 10, 10, 0.16);
  --font-display: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--cream); color: var(--ink); font-family: var(--font-body); font-weight: 400; font-size: 16px; line-height: 1.7; min-height: 100vh; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

.nav { background: var(--cream); padding: 16px 0; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 50; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: var(--ink); transition: transform .3s ease-out; }
.logo:hover { transform: scale(1.05); }
.logo-eye { width: 40px; height: 40px; display: block; flex-shrink: 0; }
.logo-mark { font-family: var(--font-display); font-size: 16px; font-weight: 500; color: var(--ink); position: relative; padding-left: 10px; line-height: 1; }
.logo-mark::after { content: ''; position: absolute; bottom: 0; left: 0; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }
.user-menu { display: flex; align-items: center; gap: 10px; }
.btn-back { background: var(--ink); color: #fff; border: 0; padding: 9px 18px; border-radius: 100px; font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .2s, transform .15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
.btn-back:hover { background: var(--accent); transform: translateY(-1px); }

.page-head { padding: 36px 0 8px; }
.ph-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.btn-export { background: var(--accent); color: #fff; border: 0; padding: 11px 20px; border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s, transform .15s; white-space: nowrap; }
.btn-export:hover { background: var(--accent-ink); transform: translateY(-1px); }
.page-title { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.4px; margin: 0 0 6px; display: flex; align-items: center; gap: 10px; }
.page-sub { font-size: 14px; color: var(--ink-soft); margin: 0; }

.loading-wrap { display: flex; justify-content: center; padding: 60px 20px; }
.loading-pill { display: inline-flex; align-items: center; gap: 10px; background: #fff; border: 1px solid rgba(19,185,178,0.2); border-radius: 100px; padding: 10px 22px; font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--accent-ink); box-shadow: 0 0 30px 6px rgba(19,185,178,0.15); animation: lp-glow 2s ease-in-out infinite; }
@keyframes lp-glow { 0%,100% { box-shadow: 0 0 20px 4px rgba(19,185,178,0.12); } 50% { box-shadow: 0 0 32px 8px rgba(19,185,178,0.20); } }
.loading-pill-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: lp-blink 1s ease-in-out infinite; }
@keyframes lp-blink { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

/* ============ شيت الإكسل ============ */
.dues-wrap { background:#fff; border:1px solid var(--line); border-radius:18px; padding:18px 20px; margin:18px 0 40px; }
.dues-head { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:6px; }
.dues-head h3 { font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; margin:0; }
.dues-sum { display:flex; gap:8px; flex-wrap:wrap; }
.dues-chip { font-size:12px; font-weight:500; border-radius:100px; padding:5px 12px; background:var(--cream-darker); color:var(--ink-soft); }
.dues-chip.due { background:rgba(201,48,48,0.08); color:#b32d2d; }
.dues-chip.paid { background:rgba(19,185,178,0.12); color:var(--accent-ink); }
.dues-hint { font-size:11.5px; color:var(--ink-faint); margin:0 0 12px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.dues-grid-wrap { overflow-x:auto; border:1px solid #c9ccc9; border-radius:6px; }
table.xl { width:100%; border-collapse:collapse; font-size:12.5px; white-space:nowrap; background:#fff; }
table.xl th, table.xl td { border:1px solid #d7dad7; padding:7px 11px; text-align:right; }
table.xl .xl-corner, table.xl .xl-colh, table.xl .xl-rowh { background:#f1f3f1; color:#7a807c; font-weight:500; text-align:center; font-size:11px; user-select:none; }
table.xl .xl-rowh { min-width:30px; }
table.xl thead .xl-label { background:#e7eceb; color:var(--ink-soft); font-weight:600; }
table.xl td.cell { cursor:pointer; transition:background .12s; }
table.xl td.cell:hover { background:#eef6f5; }
table.xl td.cell.copied { background:#13B9B2; color:#fff; }
table.xl td.cell.copied .dp, table.xl td.cell.copied .dues-link { color:#fff; }
.xl-iban { direction:ltr; text-align:right; color:var(--accent-ink); font-weight:600; font-variant-numeric:tabular-nums; }
.dues-editable[contenteditable="true"]{ outline:2px solid #12b5a3; outline-offset:-2px; background:#f0fbf9; cursor:text; min-width:80px; }
td.iban-bad{ background:#fff2f2 !important; color:#c0392b !important; box-shadow:inset 0 0 0 1.5px #f0b4b4; }
.xl-amount { font-variant-numeric:tabular-nums; font-weight:600; }
.dp { display:inline-block; padding:2px 9px; border-radius:100px; font-size:11px; font-weight:600; }
.dp-paid { background:rgba(19,185,178,0.14); color:var(--accent-ink); }
.dp-wait { background:rgba(184,134,11,0.15); color:#8a6500; }
.dp-due  { background:rgba(201,48,48,0.12); color:#b32d2d; }
.dp-prog { background:var(--cream-darker); color:var(--ink-muted); }
.dim { color:var(--ink-faint); }
.dues-mark { background:var(--accent); color:#fff; border:0; border-radius:7px; padding:5px 12px; font-family:var(--font-body); font-size:11.5px; font-weight:600; cursor:pointer; }
.dues-mark:hover { background:var(--accent-ink); }
.dues-fix { background:#fff; color:#c0392b; border:1.5px solid #e6b0aa; border-radius:7px; padding:5px 10px; font-family:var(--font-body); font-size:11.5px; font-weight:600; cursor:pointer; margin-inline-start:6px; }
.dues-fix:hover { background:#fdecea; }
.dues-link { color:var(--accent-ink); font-weight:600; text-decoration:none; }
.dues-link:hover { text-decoration:underline; }
.dues-empty { padding:30px 22px; text-align:center; color:var(--ink-faint); font-size:13.5px; line-height:1.8; }

/* بلوك الحملة */
.camp-block { margin-bottom:26px; }
.camp-block:last-child { margin-bottom:0; }
.camp-bar { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:14px 16px; background:rgba(19,185,178,0.06); border:1px solid rgba(19,185,178,0.28); border-radius:12px 12px 0 0; border-bottom:0; }
.camp-titles { min-width:0; }
.camp-title { font-family:var(--font-display); font-size:16px; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:8px; }
.camp-meta { font-size:12px; color:var(--ink-muted); margin-top:3px; display:flex; gap:6px 14px; flex-wrap:wrap; }
.camp-meta strong { color:var(--accent-ink); font-weight:600; }
.camp-block .dues-grid-wrap { border-radius:0 0 6px 6px; }
/* الصفوف الفاضية */
table.xl tr.xl-empty td { color:var(--ink-faint); background:#fcfcfc; }
table.xl tr.xl-empty .xl-rowh { color:#b8bdba; }
table.xl td.xl-rowcopy { cursor:pointer; }
table.xl td.xl-rowcopy:hover { background:#e2efed; color:var(--accent-ink); }
table.xl td.xl-rowcopy.copied { background:#13B9B2; color:#fff; }

/* Toast */
.toast-wrap { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 10px; width: max-content; max-width: calc(100vw - 32px); pointer-events: none; }
.toast { display: flex; align-items: center; gap: 10px; background: #fff; color: var(--ink); border: 1px solid var(--line); border-right: 4px solid var(--accent); border-radius: 14px; padding: 13px 18px; font-family: var(--font-body); font-size: 14px; font-weight: 500; line-height: 1.5; box-shadow: 0 14px 36px -12px rgba(10,10,10,0.28); pointer-events: auto; opacity: 0; transform: translateY(-12px); transition: opacity .28s cubic-bezier(0.22,1,0.36,1), transform .28s cubic-bezier(0.22,1,0.36,1); }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-right-color: #c93030; }
.toast .toast-ic { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(19,185,178,0.14); color: var(--accent-ink); font-size: 13px; font-weight: 700; }
.toast.error .toast-ic { background: rgba(201,48,48,0.12); color: #c93030; }

@media (max-width: 740px) {
  .container { padding: 0 16px; }
  .page-title { font-size: 22px; }
  .logo-eye { width: 36px; height: 36px; }
  .logo-mark { font-size: 14px; }
}
</style>
</head>
<body>

<div class="toast-wrap" id="toast-wrap"></div>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg class="logo-eye" viewBox="0 0 200 200" aria-hidden="true">
        <g fill="none" stroke-linejoin="miter" stroke-miterlimit="6" stroke-linecap="round">
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="10" transform="rotate(25 100 100)"/>
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="10" transform="rotate(-25 100 100)"/>
          <path d="M76 100 Q100 88 124 100 Q100 112 76 100 Z" fill="#ffffff" stroke="#13B9B2" stroke-width="7"/>
          <circle cx="100" cy="100" r="8" fill="#0a0a0a"/>
        </g>
      </svg>
      <span class="logo-mark">سيمبل</span>
    </a>
    <div class="user-menu">
      <span style="display:inline-flex;align-items:center;gap:12px;"><button type="button" data-i18n-toggle onclick="simblI18n.toggle()" style="background:#fff;border:1.5px solid rgba(10,10,10,0.28);color:var(--ink);padding:8px 16px;border-radius:100px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">EN</button><a class="btn-back" href="/brand.html">→ رجوع للوحة</a></span>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-head">
    <div class="ph-row">
      <div>
        <h1 class="page-title">📋 متابعة الحملات والمستحقات</h1>
        <p class="page-sub">كل صفقاتك المعتمدة في مكان واحد — اضغط أي خانة لنسخها، أو رقم الصف لنسخه كامل.</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-export" id="dues-edit-btn" onclick="toggleDuesEdit()" style="background:#0f1512;">✏️ تعديل قبل التصدير</button>
        <button class="btn-export" onclick="autoCleanIbans()" style="background:#5B6B7A;">🧹 تنظيف الآيبانات</button>
        <button class="btn-export" onclick="exportPaySheetCSV()" style="background:#1D9E75;">💳 شيت الدفع المختصر</button>
        <button class="btn-export" onclick="exportDuesCSV()">📥 تصدير Excel (CSV)</button>
      </div>
    </div>
  </div>

  <div id="dues-section">
    <div class="loading-wrap"><div class="loading-pill"><span class="loading-pill-dot"></span>جاري التحميل...</div></div>
  </div>
</main>

<script src="supabase-config.js?v=2"></script>
<script src="notifications.js?v=2"></script>
<script>
let currentUser = null;
let myCampaigns = [];
let campaignApps = {};

const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
const toArabic = n => String(n).split('').map(d => arabicDigits[parseInt(d)] ?? d).join('');

const DUES_STAGE_NAMES = { 1:'العنوان', 2:'الشحن', 3:'الاستلام', 4:'البريف', 5:'المحتوى', 6:'الموافقة', 7:'النشر', 8:'البيانات البنكية', 9:'مكتمل' };

function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(message, type = 'success', duration = 3500) {
  const wrap = document.getElementById('toast-wrap');
  if (!wrap) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type === 'error' ? 'error' : '');
  toast.innerHTML = `<span class="toast-ic">${type === 'error' ? '!' : '✓'}</span><span>${message}</span>`;
  wrap.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 320); }, duration);
}

function duesCampMap() {
  const m = {};
  (myCampaigns || []).forEach(c => { m[c.id] = c; });
  return m;
}
function duesIsOverdue(a, camp) {
  if (!a || (a.stage || 0) < 9) return false;
  if (a.payment_status === 'confirmed') return false;
  const days = camp ? parseInt(camp.payment_max_days, 10) : NaN;
  if (!a.completed_at || isNaN(days) || days <= 0) return false;
  const d = new Date(a.completed_at); if (isNaN(d.getTime())) return false;
  d.setDate(d.getDate() + days);
  return Date.now() > d.getTime();
}
function duesDateText(iso) {
  if (!iso) return '—';
  const d = new Date(iso); if (isNaN(d.getTime())) return '—';
  return toArabic(d.toLocaleDateString('en-GB'));
}

function findAppById(applicationId) {
  for (const campaignId in campaignApps) {
    const apps = campaignApps[campaignId] || [];
    const found = apps.find(a => a.id === applicationId);
    if (found) return { app: found, campaign: myCampaigns.find(c => c.id === campaignId) };
  }
  return { app: null, campaign: null };
}

function duesAccountLink(creator) {
  if (!creator) return '';
  for (const k of ['account_link', 'profile_link', 'profile_url', 'link']) {
    if (creator[k] && /^https?:\/\//i.test(creator[k])) return creator[k];
  }
  if (creator.website && /^https?:\/\//i.test(creator.website)) return creator.website;
  let h = (creator.handle || creator.username || '').toString().trim().replace(/^@/, '');
  const p = (creator.platform || '').toString().toLowerCase();
  if (h && /^https?:\/\//i.test(h)) return h;
  if (!h) return '';
  if (p.includes('tiktok')) return 'https://www.tiktok.com/@' + h;
  if (p.includes('insta')) return 'https://instagram.com/' + h;
  if (p.includes('snap')) return 'https://snapchat.com/add/' + h;
  if (p.includes('youtube') || p.includes('يوتيوب')) return 'https://youtube.com/@' + h;
  if (p === 'x' || p.includes('twitter') || p.includes('إكس') || p.includes('اكس')) return 'https://x.com/' + h;
  return '';
}

// تحويل رقم الجوال السعودي إلى رابط واتساب دولي (05xxxxxxxx → 9665xxxxxxxx)
function duesWaLink(raw) {
  let d = String(raw || '').replace(/[^\d+]/g, '');
  if (d.startsWith('+')) d = d.slice(1);
  if (d.startsWith('00')) d = d.slice(2);
  if (d.startsWith('05')) d = '966' + d.slice(1);      // 05xxxxxxxx → 9665xxxxxxxx
  else if (d.startsWith('5') && d.length === 9) d = '966' + d; // 5xxxxxxxx → 9665xxxxxxxx
  return 'https://wa.me/' + d;
}

function duesCopy(el) {
  if (typeof duesEditing !== 'undefined' && duesEditing) return;   // في وضع التعديل: لا ننسخ
  const txt = el.getAttribute('data-copy') || el.textContent || '';
  const done = () => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 700);
    try { showToast('تم نسخ: ' + txt); } catch (e) {}
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done).catch(() => fallbackCopy(txt, done));
  } else { fallbackCopy(txt, done); }
}
function fallbackCopy(txt, done) {
  try {
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    done();
  } catch (e) { try { showToast('تعذّر النسخ تلقائيًا'); } catch (e2) {} }
}

// ============ تعديل وتنظيف المستحقات قبل التصدير ============
let duesOverrides = {};                            // { appId: { name, iban, holder } }
try { const _dov = localStorage.getItem('simblDuesOverrides'); if (_dov) duesOverrides = JSON.parse(_dov) || {}; } catch (e) {}
function saveDuesOverrides() { try { localStorage.setItem('simblDuesOverrides', JSON.stringify(duesOverrides)); } catch (e) {} }
let duesEditing = false;

function cleanField(v) {                          // يشيل الأسطر الطويلة اللي تكبّر الصف في إكسل
  return String(v == null ? '' : v).replace(/[\r\n\t]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
}
function ibanLooksValid(v) {
  return /^SA\d{22}$/.test(String(v || '').toUpperCase().replace(/[\s\-]/g, ''));
}
function cleanIban(v) {                           // يستخرج SA + الأرقام من أي كلام/اسم ملتصق
  const s = String(v || '').toUpperCase().replace(/[\s\-]/g, '');
  const m = s.match(/SA\d{22}/); if (m) return m[0];
  const m2 = s.match(/SA\d+/);   if (m2) return m2[0];
  return String(v || '').trim();
}
function cleanUrl(v) {                            // يستخرج أول رابط http(s) من أي نص ملتصق
  const s = String(v || '');
  const m = s.match(/https?:\/\/[^\s"'<>()]+/);
  return m ? m[0].replace(/[.,;،]+$/, '') : s.trim();
}

function toggleDuesEdit() {
  duesEditing = !duesEditing;
  document.querySelectorAll('.dues-editable').forEach(td => td.setAttribute('contenteditable', duesEditing ? 'true' : 'false'));
  const btn = document.getElementById('dues-edit-btn');
  if (btn) btn.textContent = duesEditing ? '✅ تم — أوقف التعديل' : '✏️ تعديل قبل التصدير';
  try { showToast(duesEditing ? 'وضع التعديل مفعّل — صلّح الآيبان/الاسم ثم صدّر' : 'تم إيقاف التعديل — تعديلاتك محفوظة للتصدير', 'success', 4000); } catch (e) {}
}
function autoCleanIbans() {
  let fixed = 0, bad = 0;
  document.querySelectorAll('.dues-editable[data-field="iban"]').forEach(td => {
    const id = td.getAttribute('data-appid');
    const cleaned = cleanIban(td.textContent);
    if (ibanLooksValid(cleaned)) {
      if (cleaned !== td.textContent.trim()) td.textContent = cleaned;
      td.classList.remove('iban-bad');
      duesOverrides[id] = duesOverrides[id] || {}; duesOverrides[id].iban = cleaned; fixed++;
    } else { td.classList.add('iban-bad'); bad++; }
  });
  saveDuesOverrides();
  try { showToast('نُظّف ' + toArabic(fixed) + ' آيبان' + (bad ? ' · ' + toArabic(bad) + ' يحتاج تصحيح يدوي (بالأحمر)' : ''), bad ? 'error' : 'success', 6000); } catch (e) {}
}
// التقاط التعديلات اليدوية
document.addEventListener('input', function (e) {
  const td = e.target && e.target.closest ? e.target.closest('.dues-editable') : null;
  if (!td) return;
  const id = td.getAttribute('data-appid'), f = td.getAttribute('data-field');
  if (!id || !f) return;
  duesOverrides[id] = duesOverrides[id] || {};
  duesOverrides[id][f] = td.textContent.trim();
  if (f === 'iban') td.classList.toggle('iban-bad', td.textContent.trim() !== '' && !ibanLooksValid(td.textContent));
  saveDuesOverrides();
});

// صف معبّأ (صفقة معتمدة)
function duesRowFilled(a, camp, idx, totals) {
  const ov = duesOverrides[a.id] || {};
  const creator = a.users || {};
  const nameRaw = ov.name != null ? ov.name : (creator.name || 'معلن');

function duesCopyRow(el) {

    navigator.clipboard.writeText(txt).then(done).catch(() => fallbackCopy(txt, done));
  } else { fallbackCopy(txt, done); }
}

// بلوك حملة واحدة: عنوان + تاريخ الانطلاق + جدول بعدد المعلنين
function renderCampaignBlock(camp, deals) {
  const totals = { due: 0, paid: 0 };

  // ترتيب: المتأخر/النزاع أولًا، ثم بانتظار التأكيد، ثم قيد التنفيذ، ثم المدفوع
  function groupRank(a) {
    const stg = a.stage || 1;
    const ps = a.payment_status || 'unpaid';
    if (stg >= 9) { if (ps === 'confirmed') return 4; if (ps === 'marked_paid') return 1; return 0; }
    return 2;
  }
  deals = deals.slice().sort((a, b) => {
    const ra = groupRank(a), rb = groupRank(b);
    if (ra !== rb) return ra - rb;
    return new Date(b.completed_at || b.created_at || 0) - new Date(a.completed_at || a.created_at || 0);
  });

  const size = parseInt(camp.campaign_size, 10) || 0;
  const slots = Math.max(size, deals.length);

  let body = '';
  for (let i = 0; i < slots; i++) {
    body += deals[i] ? duesRowFilled(deals[i], camp, i + 1, totals) : duesRowEmpty(i + 1);
  }

  const colLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'].map(L => '<th class="xl-colh">' + L + '</th>').join('');
  const launch = duesDateText(camp.created_at);
  const sumChips =
    '<span class="dues-chip due">المتبقّي: ' + totals.due.toLocaleString('ar-SA') + ' ر.س</span>' +
    '<span class="dues-chip paid">المدفوع: ' + totals.paid.toLocaleString('ar-SA') + ' ر.س</span>';

  return '<div class="camp-block">'
    + '<div class="camp-bar">'
    +   '<div class="camp-titles">'
    +     '<div class="camp-title">📦 ' + escHtml(camp.title || 'حملة') + '</div>'
    +     '<div class="camp-meta">'
    +       '<span>🗓️ انطلقت: <strong>' + launch + '</strong></span>'
    +       (size ? '<span>👥 المطلوب: <strong>' + toArabic(size) + ' معلن</strong></span>' : '')
    +       '<span>✅ معتمد: <strong>' + toArabic(deals.length) + (size ? '/' + toArabic(size) : '') + '</strong></span>'
    +     '</div>'
    +   '</div>'
    +   '<div class="dues-sum">' + sumChips + '</div>'
    + '</div>'
    + '<div class="dues-grid-wrap"><table class="xl">'
    + '<thead>'
    + '<tr><th class="xl-corner"></th>' + colLetters + '</tr>'
    + '<tr><th class="xl-rowh"></th><th class="xl-label">الاسم</th><th class="xl-label">الجوال</th><th class="xl-label">رابط الحساب</th><th class="xl-label">تاريخ النشر</th><th class="xl-label">رابط الفيديو</th><th class="xl-label">كود الترويج</th><th class="xl-label">الآيبان</th><th class="xl-label">الاسم بالبنك</th><th class="xl-label">المبلغ</th><th class="xl-label">حالة الدفع</th><th class="xl-label">إجراء</th></tr>'
    + '</thead><tbody>' + body + '</tbody></table></div>'
    + '</div>';
}

async function setBrandPaid(applicationId) {
  try {
    const { data, error } = await supabaseClient
      .from('applications')
      .update({ payment_status: 'marked_paid', paid_marked_at: new Date().toISOString() })
      .eq('id', applicationId)
      .select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('لم يتم التحديث. تحقق من سياسات الحماية.');

    const { app, campaign } = findAppById(applicationId);
    if (app && app.creator_id) {
      const title = '💸 تم تحويل مستحقاتك';
      const body = `${campaign?.title || 'صفقة'}: الشركة أبلغت بتحويل المبلغ. افتح صفقتك وأكّد الاستلام.`;
      try { createNotification(app.creator_id, 'payment_marked', title, body, '/creator.html').catch(console.error); } catch (e) {}
      fetch('https://rdzzzasbyzugxogbgwwn.supabase.co/functions/v1/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + supabaseClient.supabaseKey },
        body: JSON.stringify({ title, body, url: '/creator.html', target_users: [app.creator_id] })
      }).catch(console.error);
    }

    await loadData();
    showToast('تم تسجيل التحويل ✓ — بانتظار تأكيد المعلن.');
  } catch (err) {
    console.error('Brand paid error:', err);
    showToast('حصل خطأ: ' + (err.message || 'حاول مرة أخرى'), 'error');
  }
}

let _fixAppId = null;
function requestFix(applicationId) {
  _fixAppId = applicationId;
  const m = document.getElementById('fix-modal');
  const ta = document.getElementById('fix-note'); if (ta) ta.value = '';
  if (m) m.style.display = 'flex';
  setTimeout(function () { if (ta) ta.focus(); }, 50);
}
function closeFixModal() { const m = document.getElementById('fix-modal'); if (m) m.style.display = 'none'; }
async function submitFix() {
  const applicationId = _fixAppId; if (!applicationId) return;
  const note = (document.getElementById('fix-note').value || '').trim();
  const btn = document.getElementById('fix-confirm'); const o = btn.textContent; btn.disabled = true; btn.textContent = 'جاري الإرسال...';
  try {
    const { data: row, error: e1 } = await supabaseClient.from('applications').select('stage_data, creator_id').eq('id', applicationId).single();
    if (e1) throw e1;
    const existing = (row && typeof row.stage_data === 'object' && row.stage_data) ? { ...row.stage_data } : {};
    existing[7] = { ...(existing[7] || {}), _fix_requested: true, _fix_note: note, _fix_at: new Date().toISOString() };
    const { error: e2 } = await supabaseClient.from('applications').update({ stage: 7, stage_data: existing }).eq('id', applicationId).select();
    if (e2) throw e2;
    const creatorId = row && row.creator_id;
    const body = note ? ('راجع رابط الفيديو/كود الترويج — ' + note) : 'راجع رابط الفيديو وكود الترويج وصحّح الخطأ.';
    if (creatorId) {
      try { if (typeof createNotification === 'function') createNotification(creatorId, 'fix_requested', 'مطلوب تصحيح المنشور', body, '/creator.html'); } catch (e) {}
      fetch('https://rdzzzasbyzugxogbgwwn.supabase.co/functions/v1/send-push', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + supabaseClient.supabaseKey }, body: JSON.stringify({ title: 'مطلوب تصحيح المنشور', body: body, url: '/creator.html', target_users: [creatorId] }) }).catch(function () {});
    }
    showToast('تم إرجاع الصفقة للمعلن للتصحيح', 'success');
    closeFixModal();
    if (typeof loadData === 'function') loadData();
  } catch (err) {
    console.error('fix request failed:', err);
    showToast('حصل خطأ: ' + (err.message || 'حاول مرة أخرى'), 'error');
  } finally { btn.disabled = false; btn.textContent = o; }
}

async function loadData() {
  try {
    myCampaigns = await dbGetMyCampaigns(currentUser.id);

    // جلب عروض كل الحملات بطلب واحد بدل طلب لكل حملة (إصلاح N+1)
    const campIds = myCampaigns.map(c => c.id);
    let allApps = [];
    if (campIds.length) {
      const { data, error } = await supabaseClient
        .from('applications')
        .select('*, users!applications_creator_id_fkey(name, platform, handle, followers, category, website, whatsapp, phone)')
        .in('campaign_id', campIds)
        .order('created_at', { ascending: false });
      if (error) throw error;
      allApps = data || [];
    }
    const grouped = {};
    myCampaigns.forEach(c => { grouped[c.id] = []; });
    allApps.forEach(a => { (grouped[a.campaign_id] = grouped[a.campaign_id] || []).push(a); });
    campaignApps = grouped;
    renderDues();
  } catch (err) {
    console.error(err);
    const host = document.getElementById('dues-section');
    if (host) host.innerHTML = '<div class="dues-wrap"><div class="dues-empty" style="color:var(--accent)">حصل خطأ في التحميل. حدّث الصفحة.</div></div>';
  }
}

    }
  } catch (e) {}
  if (approvalStatus === 'pending' || approvalStatus === 'rejected' || approvalStatus === 'suspended') {
    window.location.href = '/brand.html';
    return;
  }

  await loadData();
  // تحديث تلقائي كل 30 ثانية
  setInterval(() => { if (document.visibilityState === 'visible') loadData(); }, 30000);
}

init();
</script>

<div id="fix-modal" style="display:none;position:fixed;inset:0;background:rgba(10,10,10,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;z-index:200;padding:20px;">
  <div style="background:#fff;border-radius:20px;padding:26px;max-width:440px;width:100%;font-family:var(--font-body,sans-serif);">

    <label style="font-size:12px;font-weight:600;">وش الخطأ؟ (اختياري — يظهر للمعلن)</label>
    <textarea id="fix-note" rows="3" placeholder="مثلًا: كود الترويج غلط، أو رابط الفيديو ما يفتح..." style="width:100%;box-sizing:border-box;margin-top:6px;padding:10px;border:1px solid #e7edeb;border-radius:10px;font-family:inherit;"></textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">

    </div>
  </div>
</div>
