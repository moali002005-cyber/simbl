<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المعلن - سيمبل</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="سيمبل">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #ffffff;
  --cream-darker: #f5f5f4;
  --ink: #0a0a0a;
  --ink-soft: #3a3a3a;
  --ink-muted: #6b6b6b;
  --ink-faint: #a0a0a0;
  --accent: #13B9B2;
  --accent-soft: #7fd6d2;
  --accent-ink: #0c4f4b;
  --line: rgba(10, 10, 10, 0.08);
  --line-strong: rgba(10, 10, 10, 0.16);
  --success: #13B9B2;
  --font-display: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
}

.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

.nav {
  background: var(--cream);
  padding: 16px 0;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: var(--ink); transition: transform .3s ease-out; }
.logo:hover { transform: scale(1.05); }
.logo-eye { width: 40px; height: 40px; display: block; flex-shrink: 0; }
.logo-mark {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  position: relative;
  padding-left: 10px;
  line-height: 1;
}
.logo-mark::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 50%;
}

.user-menu { display: flex; align-items: center; gap: 10px; }
.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 4px 12px 4px 4px;
  border-radius: 100px;
  border: 1px solid var(--line);
  transition: border-color .2s, transform .2s;
}
.user-pill:hover { border-color: rgba(19,185,178,0.40); transform: translateY(-1px); }
.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 12px;
}
.user-name { font-size: 14px; font-weight: 500; }
.btn-logout {
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink-muted);
  padding: 7px 14px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { color: var(--accent); border-color: var(--accent); }

.btn-push {
  background: var(--accent);
  color: #fff;
  border: 0;
  padding: 7px 14px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 6px;
  transition: background 0.2s, transform 0.15s;
  animation: btnPushPulse 2.4s ease-in-out infinite;
}
.btn-push:hover { background: var(--accent-ink); transform: translateY(-1px); animation: none; }
.btn-push.show { display: inline-flex; }
@keyframes btnPushPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(19, 185, 178, 0.45); }
  50% { box-shadow: 0 0 0 10px rgba(19, 185, 178, 0); }
}

/* ==================== HERO ==================== */
@keyframes sb-pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.7); opacity: 0.35; } }
@keyframes sb-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes sb-glow { 0%,100% { box-shadow: 0 0 14px 0 rgba(19,185,178,0.18); } 50% { box-shadow: 0 0 32px 6px rgba(19,185,178,0.48); } }

.hero { padding: 60px 24px 56px; text-align: center; }
.hero-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 100px;
  font-size: 14px; font-weight: 500;
  margin-bottom: 24px;
  border: 1px solid rgba(19,185,178,0.30);
  color: var(--accent-ink); background: #fff;
  animation: sb-glow 2.6s ease-in-out infinite;
}
.hero-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: sb-pulse 1.6s ease-in-out infinite; flex-shrink: 0; }
.hero-title {
  font-family: var(--font-display);
  font-size: 36px; font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0 0 10px; color: var(--ink);
}
.hero-title .nm { color: var(--accent); position: relative; display: inline-block; cursor: default; }
.hero-title .nm::after {
  content: ''; position: absolute; bottom: -3px; right: 0; left: 0;
  height: 2px; background: var(--accent);
  transform: scaleX(0); transform-origin: right;
  transition: transform .35s cubic-bezier(0.22, 1, 0.36, 1);
}
.hero-title .nm:hover::after { transform: scaleX(1); }
.hero-sub { font-size: 16px; max-width: 520px; margin: 0 auto 28px; line-height: 1.7; color: var(--ink-soft); }
.hero-cta {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 32px; border-radius: 100px; border: 0;
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: background .25s, transform .15s;
  background: var(--ink); color: #fff;
}
.hero-cta:hover { background: var(--accent); transform: translateY(-2px); }
.hero-cta:active { transform: translateY(0); }
.hero-link {
  display: inline-block; margin-right: 16px;
  font-size: 14px; cursor: pointer;
  color: var(--ink-muted); transition: color .2s;
  background: transparent; border: 0; font-family: var(--font-body);
}
.hero-link:hover { color: var(--accent); }
.hero-arr { display: inline-block; transition: transform .25s ease-out; }
.hero-link:hover .hero-arr { transform: translateX(-5px); }

.hero-features {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-top: 40px; padding-top: 28px;
  border-top: 1px solid var(--line);
  max-width: 560px; margin-left: auto; margin-right: auto;
}
.hero-feat {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-radius: 100px;
  background: #fff; font-size: 13px; font-weight: 500;
  border: 1px solid rgba(19,185,178,0.25); color: var(--accent-ink);
  cursor: default;
  animation: sb-float 2.8s ease-in-out infinite;
}
.hero-features .hero-feat:nth-child(1) { animation-delay: 0s; }
.hero-features .hero-feat:nth-child(2) { animation-delay: 0.4s; }
.hero-features .hero-feat:nth-child(3) { animation-delay: 0.8s; }
.hero-feat:hover {
  animation: none;
  transform: translateY(-8px);
  border-color: rgba(19,185,178,0.55);
  transition: transform .25s, border-color .25s;
}
.hero-feat-ic {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; background: var(--accent);
  transition: transform .35s; font-size: 12px;
}
.hero-feat:hover .hero-feat-ic { transform: rotate(360deg); }

/* ==================== TABS & APP CONTENT ==================== */
.section-divider {
  border-top: 1px solid var(--line);
  margin: 20px 0 32px;
}

.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 32px; }
.tab {
  padding: 14px 24px;
  background: transparent;
  border: none;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--ink-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  margin-bottom: -1px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab .count { background: var(--cream-darker); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.tab.active .count { background: var(--accent); color: #fff; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.filter-bar .label { font-size: 13px; color: var(--ink-muted); font-weight: 500; }
.filter-pill {
  padding: 8px 16px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--ink-soft);
  font-family: var(--font-body);
}
.filter-pill:hover { border-color: var(--ink-soft); }
.filter-pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.campaigns-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

.campaign-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.campaign-card:hover { transform: translateY(-3px); border-color: var(--ink-soft); }
.campaign-card .top { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
.brand-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-muted); }
.brand-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--cream-darker);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600; font-size: 11px;
  color: var(--ink-soft);
}
.budget-tag { background: var(--cream-darker); padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; color: var(--ink); }

.campaign-card h3 { font-family: var(--font-display); font-size: 19px; font-weight: 600; line-height: 1.3; letter-spacing: 0; }

.campaign-card .desc {
  font-size: 14px; color: var(--ink-soft); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.meta-row { display: flex; gap: 12px; flex-wrap: wrap; }
.meta-item { font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; gap: 4px; }

.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--line); }
.tags-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 4px 10px; background: var(--cream-darker); border-radius: 100px; color: var(--accent-ink); font-weight: 500; }

.btn-apply {
  background: var(--ink); color: #fff;
  padding: 10px 20px; border: none; border-radius: 100px;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.btn-apply:hover { background: var(--accent); }
.btn-apply.applied { background: var(--cream-darker); color: var(--ink-muted); cursor: not-allowed; }

.empty { text-align: center; padding: 80px 32px; color: var(--ink-muted); }
.empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty h3 { font-family: var(--font-display); font-size: 20px; color: var(--ink); margin-bottom: 8px; }

.applications-list { display: flex; flex-direction: column; gap: 16px; }
.application-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
}
.app-info h4 { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.app-info .meta { font-size: 13px; color: var(--ink-muted); }
.app-status { padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 500; }
.status-pending { background: rgba(10, 10, 10, 0.06); color: var(--ink-muted); }
.status-active { background: rgba(19, 185, 178, 0.14); color: var(--accent-ink); }
.status-closed { background: var(--ink); color: #fff; }
.status-rejected { background: var(--cream-darker); color: var(--ink-muted); }

/* ============ Workflow progress strip ============ */
.workflow-strip {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 22px 18px 18px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  margin-top: 8px;
  position: relative;
  gap: 4px;
}
.ws-step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  min-width: 0;
}
.ws-step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 17px;
  right: 50%;
  width: 100%;
  height: 2px;
  background: var(--line-strong);
  z-index: 0;
}
.ws-step.done::after { background: var(--accent); }
.ws-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--cream-darker);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-faint);
  position: relative;
  z-index: 1;
  transition: all 0.25s;
  border: 1.5px solid var(--line-strong);
  font-family: var(--font-display);
}
.ws-step.done .ws-circle {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.ws-step.current .ws-circle {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
  box-shadow: 0 0 0 4px rgba(10, 10, 10, 0.08);
}
.ws-label {
  font-size: 12px;
  color: var(--ink-muted);
  margin-top: 10px;
  white-space: nowrap;
  font-family: var(--font-body);
  text-align: center;
}
.ws-step.done .ws-label,
.ws-step.current .ws-label {
  color: var(--ink);
  font-weight: 500;
}

/* ============ Stage action card ============ */
.stage-action {
  margin-top: 10px;
  padding: 18px 20px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid var(--line);
}
.stage-action.mine {
  background: rgba(19, 185, 178, 0.05);
  border-color: rgba(19, 185, 178, 0.30);
}
.stage-action.waiting { background: var(--cream-darker); }
.stage-action.complete {
  background: rgba(19, 185, 178, 0.08);
  border-color: rgba(19, 185, 178, 0.35);
}
.sa-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--ink);
}
.sa-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.65;
  margin-bottom: 0;
}
.stage-action.mine .sa-desc { margin-bottom: 14px; }
.sa-btn {
  background: var(--ink);
  color: #fff;
  border: 0;
  padding: 11px 22px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.sa-btn:hover { background: var(--accent); transform: translateY(-1px); }
@media (max-width: 640px) {
  .workflow-strip { padding: 18px 8px 14px; gap: 2px; }
  .ws-circle { width: 28px; height: 28px; font-size: 12px; }
  .ws-step:not(:last-child)::after { top: 13px; }
  .ws-label { font-size: 10px; margin-top: 6px; }
}

.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(10, 10, 10, 0.5);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal-backdrop.show { display: flex; }
.modal { background: #fff; border-radius: 24px; padding: 36px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.modal .sub { color: var(--ink-muted); font-size: 14px; margin-bottom: 24px; }
.field { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; }
input, textarea {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--line-strong); border-radius: 10px;
  font-family: var(--font-body); font-size: 14px;
  background: #fff; color: var(--ink);
}
input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(19,185,178,0.14); }
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.btn-secondary { flex: 1; padding: 12px; background: #fff; border: 1px solid var(--line-strong); color: var(--ink); border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary { flex: 1; padding: 12px; background: var(--ink); color: #fff; border: none; border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: var(--accent); }
.btn-primary:disabled { background: var(--ink-faint); cursor: not-allowed; }

@media (max-width: 640px) {
  .container { padding: 0 16px; }
  .campaigns-grid { grid-template-columns: 1fr; }
  .modal { padding: 24px; }
  .hero-title { font-size: 28px; }
  .hero-sub { font-size: 15px; }
  .hero { padding: 40px 16px 36px; }
  .logo-eye { width: 36px; height: 36px; }
  .logo-mark { font-size: 14px; }
  .user-pill .user-name { display: none; }
  .hero-link { display: block; margin: 14px 0 0; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg class="logo-eye" viewBox="0 0 200 200" aria-hidden="true">
        <g fill="none" stroke-linejoin="miter" stroke-miterlimit="6" stroke-linecap="round">
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="10" transform="rotate(25 100 100)"/>
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="10" transform="rotate(-25 100 100)"/>
          <path d="M76 100 Q100 88 124 100 Q100 112 76 100 Z" fill="#ffffff" stroke="#13B9B2" stroke-width="7"/>
          <circle cx="100" cy="100" r="8" fill="#0a0a0a"/>
        </g>
      </svg>
      <span class="logo-mark">سيمبل</span>
    </a>
    <div class="user-menu" id="user-menu">
      <button class="btn-push" id="btn-push" onclick="manualEnablePush()" title="تفعيل الإشعارات">
        <span>🔔</span>
        <span>فعّل الإشعارات</span>
      </button>
      <div class="user-pill">
        <div class="user-avatar" id="user-initial">م</div>
        <span class="user-name" id="user-name">معلن</span>
      </div>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>
</nav>

<main class="container">

  <!-- ============ HERO ============ -->
  <section class="hero">
    <div class="hero-pill"><span class="hero-dot"></span><span id="hero-status">جاري التحميل...</span></div>
    <h1 class="hero-title">أهلًا <span class="nm" id="welcome-name">بك</span></h1>
    <p class="hero-sub">اطّلع على جميع الحملات الإعلانية المتاحة لك، واختر المناسب.</p>
    <div>
      <button class="hero-cta" onclick="goToBrowse()">تصفّح الحملات</button>
      <button class="hero-link" onclick="goToApplications()">صفقاتي (<span id="hero-app-count">٠</span>) <span class="hero-arr">←</span></button>
    </div>
    <div class="hero-features">
      <span class="hero-feat"><span class="hero-feat-ic">✓</span>تصلك الحملات</span>
      <span class="hero-feat"><span class="hero-feat-ic">✓</span>تختار المناسب</span>
      <span class="hero-feat"><span class="hero-feat-ic">✓</span>تقفل الصفقة</span>
    </div>
  </section>

  <!-- ============ APP CONTENT ============ -->
  <div id="app-section" class="section-divider"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')" id="tab-browse">
      <span>الحملات المتاحة</span>
      <span class="count" id="count-browse">0</span>
    </button>
    <button class="tab" onclick="switchTab('applications')" id="tab-applications">
      <span>صفقاتي</span>
      <span class="count" id="count-applications">0</span>
    </button>
  </div>

  <div class="tab-panel active" id="panel-browse">
    <div class="filter-bar">
      <span class="label">التصنيف:</span>
      <button class="filter-pill active" onclick="filterCampaigns('all', this)">الكل</button>
      <button class="filter-pill" onclick="filterCampaigns('perfumes', this)">عطور</button>
      <button class="filter-pill" onclick="filterCampaigns('fashion', this)">موضة</button>
      <button class="filter-pill" onclick="filterCampaigns('beauty', this)">جمال</button>
      <button class="filter-pill" onclick="filterCampaigns('food', this)">طعام</button>
      <button class="filter-pill" onclick="filterCampaigns('tech', this)">تقنية</button>
    </div>
    <div class="campaigns-grid" id="campaigns-list"></div>
  </div>

  <div class="tab-panel" id="panel-applications">
    <div class="applications-list" id="applications-list"></div>
  </div>
</main>

<div class="modal-backdrop" id="apply-modal">
  <div class="modal">
    <h3 id="modal-title">تقديم عرض</h3>
    <p class="sub" id="modal-sub">قدّم عرضك على هذه الحملة. الوكيل الذكي راح يتفاوض معك بناءً على عرضك.</p>

    <form onsubmit="submitApplication(event)">
      <div class="field">
        <label>السعر المعروض (ر.س)</label>
        <input type="number" name="price" required placeholder="مثال: 800">
      </div>

      <div class="field">
        <label>ملاحظة إضافية (اختياري)</label>
        <textarea name="note" rows="3" placeholder="مثل: أقدر أصور خلال 3 أيام، أو لدي اقتراحات إضافية..."></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn-primary">إرسال العرض</button>
      </div>
    </form>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="notifications.js"></script>
<script>
let currentUser = null;
let allCampaigns = [];
let myApplications = [];
let currentFilter = 'all';
let currentCampaignId = null;

const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
const toArabic = n => String(n).split('').map(d => arabicDigits[parseInt(d)] ?? d).join('');

function newCampaignsLabel(n) {
  if (n === 0) return 'حملات بانتظارك';
  if (n === 1) return 'حملة جديدة لك اليوم';
  if (n === 2) return 'حملتان جديدتان لك اليوم';
  return `${toArabic(n)} حملات جديدة لك اليوم`;
}

function goToBrowse() {
  switchTab('browse');
  document.getElementById('app-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function goToApplications() {
  switchTab('applications');
  document.getElementById('app-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function init() {
  await tryRestoreSession();

  currentUser = getCurrentUser();
  if (!currentUser) {
    alert('يرجى تسجيل الدخول أولاً');
    window.location.href = '/signup.html';
    return;
  }

  if (currentUser.role !== 'creator') {
    alert('هذه الصفحة مخصصة للمعلنين. سيتم تحويلك للوحة الشركة.');
    window.location.href = '/brand.html';
    return;
  }

  const firstName = (currentUser.name || 'بك').split(' ')[0];
  document.getElementById('user-name').textContent = firstName;
  document.getElementById('user-initial').textContent = firstName[0];
  document.getElementById('welcome-name').textContent = firstName;

  initNotifications('user-menu');

  await loadData();
}

async function loadData() {
  try {
    document.getElementById('campaigns-list').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--ink-muted)">جاري تحميل الحملات...</div>';
    [allCampaigns, myApplications] = await Promise.all([
      dbGetCampaigns(),
      dbGetMyApplications(currentUser.id)
    ]);
    updateHeroStats();
    renderCampaigns();
    renderApplications();
  } catch (err) {
    console.error(err);
    document.getElementById('campaigns-list').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--ink-soft)">حصل خطأ في تحميل البيانات. حدّث الصفحة وحاول مرة أخرى.</div>';
  }
}

function updateHeroStats() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const newToday = allCampaigns.filter(c => new Date(c.created_at) >= today).length;
  document.getElementById('hero-status').textContent = newCampaignsLabel(newToday);

  const activeApps = myApplications.filter(a => a.status !== 'rejected').length;
  document.getElementById('hero-app-count').textContent = toArabic(activeApps);
}

function renderCampaigns() {
  const filtered = currentFilter === 'all'
    ? allCampaigns
    : allCampaigns.filter(c => c.brand_industry === currentFilter);

  document.getElementById('count-browse').textContent = filtered.length;
  const list = document.getElementById('campaigns-list');

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty" style="grid-column: 1/-1">
        <div class="icon">○</div>
        <h3>لا توجد حملات</h3>
        <p>لا توجد حملات في هذا التصنيف حالياً</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const applied = myApplications.some(a => a.campaign_id === c.id);
    const brandName = c.brand || 'شركة';
    const brandInitial = brandName[0];
    const tags = c.tags || [];
    return `
      <div class="campaign-card">
        <div class="top">
          <div class="brand-badge">
            <div class="brand-avatar">${brandInitial}</div>
            <span>${brandName}</span>
          </div>
          <div class="budget-tag">${c.budget} ر.س</div>
        </div>
        <h3>${c.title}</h3>
        <p class="desc">${c.description}</p>
        <div class="meta-row">
          ${c.duration ? `<div class="meta-item">⏱ ${c.duration}</div>` : ''}
          ${c.package ? `<div class="meta-item">◇ ${c.package}</div>` : ''}
        </div>
        <div class="card-footer">
          <div class="tags-row">
            ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <button class="btn-apply ${applied ? 'applied' : ''}"
                  onclick="${applied ? '' : `openApplyModal('${c.id}')`}"
                  ${applied ? 'disabled' : ''}>
            ${applied ? 'تم التقديم ✓' : 'قدّم عرضك'}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function renderApplications() {
  document.getElementById('count-applications').textContent = myApplications.length;
  const list = document.getElementById('applications-list');

  if (myApplications.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="icon">◌</div>
        <h3>لم تقدّم على أي حملة بعد</h3>
        <p>تصفّح الحملات المتاحة وقدّم عرضك على ما يناسبك</p>
      </div>`;
    return;
  }

  const statusLabels = {
    pending: 'قيد المراجعة',
    active: 'تفاوض نشط',
    closed: 'مقفلة',
    rejected: 'مرفوضة'
  };

  list.innerHTML = myApplications.map(a => {
    const campaignTitle = a.campaigns?.title || 'حملة';
    const brandName = a.campaigns?.users?.company_name || '';
    const isClosed = a.status === 'closed';
    return `
      <div class="application-card" onclick="window.location.href='/campaign.html?app=${a.id}'" style="cursor: pointer">
        <div class="app-info">
          <h4>${campaignTitle}</h4>
          <div class="meta">${brandName} · عرضك: ${a.price.toLocaleString('ar-SA')} ر.س · ${new Date(a.created_at).toLocaleDateString('ar-SA')}</div>
        </div>
        <span class="app-status status-${a.status}">${statusLabels[a.status]}</span>
      </div>
      ${isClosed ? renderWorkflowStrip(a.stage || 1) + renderStageAction(a.id, a.stage || 1, 'creator') : ''}
    `;
  }).join('');
}

// ============ Workflow stages ============
const WORKFLOW_STAGES = [
  { id: 1, name: 'العنوان' },
  { id: 2, name: 'الشحن' },
  { id: 3, name: 'الاستلام' },
  { id: 4, name: 'المحتوى' },
  { id: 5, name: 'الموافقة' },
  { id: 6, name: 'النشر' },
  { id: 7, name: 'مكتمل', isFinal: true }
];

const STAGE_ACTIONS = {
  1: {
    responsible: 'creator',
    creator: { label: '✓ تم إرسال العنوان', desc: 'بعد إرسال عنوانك للشركة عبر التفاوض، اضغط للانتقال للمرحلة التالية.' },
    brand:   { desc: 'بانتظار إرسال المعلن لعنوانه عبر التفاوض.' }
  },
  2: {
    responsible: 'brand',
    brand:   { label: '✓ تأكيد الشحن', desc: 'بعد شحن المنتج للمعلن، اضغط لتأكيد الشحن.' },
    creator: { desc: 'الشركة تجهّز المنتج لشحنه إليك.' }
  },
  3: {
    responsible: 'creator',
    creator: { label: '✓ تأكيد الاستلام', desc: 'بعد وصول المنتج إليك، اضغط لتأكيد الاستلام.' },
    brand:   { desc: 'المنتج في الطريق إلى المعلن.' }
  },
  4: {
    responsible: 'creator',
    creator: { label: '✓ تأكيد إرسال المحتوى', desc: 'بعد إرسال المحتوى للشركة للمراجعة، اضغط للتأكيد.' },
    brand:   { desc: 'المعلن يجهّز المحتوى الإعلاني.' }
  },
  5: {
    responsible: 'brand',
    brand:   { label: '✓ الموافقة على المحتوى', desc: 'بعد مراجعة المحتوى والموافقة عليه، اضغط للموافقة.' },
    creator: { desc: 'الشركة تراجع المحتوى الذي أرسلته.' }
  },
  6: {
    responsible: 'creator',
    creator: { label: '✓ تأكيد النشر', desc: 'بعد نشر المحتوى على المنصة، اضغط للتأكيد.' },
    brand:   { desc: 'بانتظار نشر المعلن للمحتوى المعتمد.' }
  }
};

const STAGE_NOTIFICATIONS = {
  1: { title: 'بداية الصفقة', body: 'الصفقة في مرحلة تأكيد العنوان' },
  2: { title: '📦 الشحن', body: 'تم تأكيد العنوان، الصفقة دخلت مرحلة الشحن' },
  3: { title: '🚚 الاستلام', body: 'تم الشحن، الصفقة في مرحلة الاستلام' },
  4: { title: '🎬 المحتوى', body: 'تم استلام المنتج، بدأت مرحلة إعداد المحتوى' },
  5: { title: '👀 المراجعة', body: 'المحتوى جاهز، الصفقة في مرحلة المراجعة والموافقة' },
  6: { title: '🚀 النشر', body: 'تمت الموافقة، الصفقة في مرحلة النشر' },
  7: { title: '🎉 صفقة مكتملة', body: 'تم اكتمال الصفقة بنجاح، شكرًا لك' }
};

function renderWorkflowStrip(currentStage) {
  const stages = WORKFLOW_STAGES.map(s => {
    let cls = '';
    let content = '';
    if (s.id < currentStage) { cls = 'done'; content = '✓'; }
    else if (s.id === currentStage) { cls = 'current'; content = s.isFinal ? '✓' : toArabic(s.id); }
    else { cls = 'future'; content = s.isFinal ? '✓' : toArabic(s.id); }
    return `
      <div class="ws-step ${cls}" title="${s.name}">
        <div class="ws-circle">${content}</div>
        <div class="ws-label">${s.name}</div>
      </div>
    `;
  }).join('');
  return `<div class="workflow-strip">${stages}</div>`;
}

function renderStageAction(applicationId, currentStage, viewerRole) {
  if (currentStage >= 7) {
    return `
      <div class="stage-action complete">
        <div class="sa-title">🎉 صفقة مكتملة</div>
        <div class="sa-desc">تم اكتمال جميع مراحل الصفقة بنجاح.</div>
      </div>
    `;
  }
  const info = STAGE_ACTIONS[currentStage];
  if (!info) return '';
  const stageName = WORKFLOW_STAGES.find(s => s.id === currentStage)?.name || '';
  const isMyTurn = info.responsible === viewerRole;
  const myInfo = info[viewerRole] || {};

  if (isMyTurn) {
    return `
      <div class="stage-action mine" onclick="event.stopPropagation()">
        <div class="sa-title">المرحلة الحالية: ${stageName}</div>
        <div class="sa-desc">${myInfo.desc || ''}</div>
        <button class="sa-btn" onclick="event.stopPropagation(); advanceStage('${applicationId}', ${currentStage + 1})">${myInfo.label}</button>
      </div>
    `;
  }
  return `
    <div class="stage-action waiting" onclick="event.stopPropagation()">
      <div class="sa-title">⏳ المرحلة الحالية: ${stageName}</div>
      <div class="sa-desc">${myInfo.desc || ''}</div>
    </div>
  `;
}

async function advanceStage(applicationId, newStage) {
  const app = myApplications.find(a => a.id === applicationId);
  const oldStage = app?.stage || 1;
  if (newStage <= oldStage) return;

  try {
    const { data, error } = await supabaseClient
      .from('applications')
      .update({ stage: newStage })
      .eq('id', applicationId)
      .select('*, campaigns(brand_id, title)');
    if (error) throw error;
    if (!data || data.length === 0) {
      throw new Error('لم يتم التحديث. تحقق من سياسات الحماية.');
    }

    // إشعار الشركة (الطرف الآخر)
    const brandId = data[0]?.campaigns?.brand_id;
    const campaignTitle = data[0]?.campaigns?.title || 'صفقة';
    const notif = STAGE_NOTIFICATIONS[newStage];
    if (brandId && notif) {
      createNotification(
        brandId,
        'workflow_update',
        notif.title,
        `${campaignTitle}: ${notif.body}`,
        '/brand.html'
      ).catch(err => console.error(err));

      fetch('https://rdzzzasbyzugxogbgwwn.supabase.co/functions/v1/send-push', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + supabaseClient.supabaseKey
        },
        body: JSON.stringify({
          title: notif.title,
          body: `${campaignTitle}: ${notif.body}`,
          url: '/brand.html',
          target_users: [brandId]
        })
      }).catch(err => console.error('Push error:', err));
    }

    await loadData();
  } catch (err) {
    console.error('Failed to advance stage:', err);
    alert('حصل خطأ: ' + (err.message || 'حاول مرة أخرى'));
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

function filterCampaigns(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderCampaigns();
}

function openApplyModal(campaignId) {
  currentCampaignId = campaignId;
  const campaign = allCampaigns.find(c => c.id === campaignId);
  if (!campaign) return;
  document.getElementById('modal-title').textContent = 'تقديم على: ' + campaign.title;
  document.getElementById('modal-sub').textContent = `${campaign.brand} · الميزانية: ${campaign.budget} ر.س`;
  document.getElementById('apply-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('apply-modal').classList.remove('show');
}

async function submitApplication(event) {
  event.preventDefault();
  const form = event.target;
  const submitBtn = form.querySelector('button[type="submit"]');
  const original = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الإرسال...';

  const fd = new FormData(form);
  const price = parseInt(fd.get('price'));
  const note = fd.get('note') || null;
  const applicationData = {
    campaign_id: currentCampaignId,
    creator_id: currentUser.id,
    price: price,
    note: note,
    status: 'pending'
  };

  const campaign = allCampaigns.find(c => c.id === currentCampaignId);

  try {
    const savedApplication = await dbApply(applicationData);

    if (campaign && campaign.brand_id) {
      createNotification(
        campaign.brand_id,
        'new_application',
        `📨 ${currentUser.name || 'معلن'} قدّمت عرضاً`,
        `على حملة: ${campaign.title} · بسعر ${price} ر.س`,
        '/brand.html'
      ).catch(err => console.error(err));
    }

    closeModal();
    form.reset();

    startAutoNegotiation(savedApplication, campaign);

    submitBtn.disabled = false;
    submitBtn.textContent = original;

    await loadData();

    setTimeout(() => alert('تم إرسال عرضك بنجاح! الوكيل الذكي بدأ التفاوض. افتح "صفقاتي" لمتابعة المحادثة.'), 100);
  } catch (err) {
    console.error(err);
    submitBtn.disabled = false;
    submitBtn.textContent = original;
    alert('حصل خطأ أثناء إرسال العرض. حاول مرة أخرى.');
  }
}

async function startAutoNegotiation(application, campaign) {
  try {
    if (!application || !application.id || !campaign) {
      console.warn('Missing data for auto-negotiation');
      return;
    }

    const { data: existing } = await supabaseClient
      .from('negotiations')
      .select('id')
      .eq('application_id', application.id)
      .limit(1);
    if (existing && existing.length > 0) return;

    const campaignData = {
      id: campaign.id,
      title: campaign.title,
      description: campaign.description,
      budget: campaign.budget,
      max_budget: campaign.max_budget || campaign.budget,
      duration: campaign.duration,
      package: campaign.package,
      requirements: campaign.requirements,
      brand_name: campaign.brand || '',
      brand_id: campaign.brand_id
    };
    const applicationPayload = {
      id: application.id,
      creator_name: currentUser.name || 'معلن',
      price: application.price,
      platform: currentUser.platform,
      followers: currentUser.followers,
      note: application.note
    };

    fetch('/api/negotiate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        campaign: campaignData,
        application: applicationPayload,
        history: []
      })
    }).catch(err => console.error('Auto-negotiation start error:', err));
  } catch (err) {
    console.error('startAutoNegotiation error:', err);
  }
}

function logout() {
  clearCurrentUser();
  window.location.href = '/';
}

init();
</script>

<script src="push-subscribe.js"></script>

</body>
