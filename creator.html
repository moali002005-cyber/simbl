<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المعلن - سيمبل</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="سيمبل">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="/splash.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #ffffff;
  --cream-darker: #f5f5f4;
  --ink: #0a0a0a;
  --ink-soft: #3a3a3a;
  --ink-muted: #6b6b6b;
  --ink-faint: #a0a0a0;
  --accent: #13B9B2;
  --accent-soft: #7fd6d2;
  --accent-ink: #0c4f4b;
  --line: rgba(10, 10, 10, 0.08);
  --line-strong: rgba(10, 10, 10, 0.16);
  --success: #13B9B2;
  --font-display: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
}

.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

.nav {
  background: var(--cream);
  padding: 16px 0;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: var(--ink); transition: transform .3s ease-out; }
.logo:hover { transform: scale(1.05); }
.logo-eye { width: 40px; height: 40px; display: block; flex-shrink: 0; }
.logo-mark {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  position: relative;
  padding-left: 10px;
  line-height: 1;
}
.logo-mark::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 50%;
}

.user-menu { display: flex; align-items: center; gap: 10px; }
.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 4px 12px 4px 4px;
  border-radius: 100px;
  border: 1px solid var(--line);
  transition: border-color .2s, transform .2s;
}
.user-pill:hover { border-color: rgba(19,185,178,0.40); transform: translateY(-1px); }
.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 12px;
}
.user-name { font-size: 14px; font-weight: 500; }
.btn-logout {
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink-muted);
  padding: 7px 14px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { color: var(--accent); border-color: var(--accent); }

.btn-push {
  background: var(--accent);
  color: #fff;
  border: 0;
  padding: 7px 14px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 6px;
  transition: background 0.2s, transform 0.15s;
  animation: btnPushPulse 2.4s ease-in-out infinite;
}
.btn-push:hover { background: var(--accent-ink); transform: translateY(-1px); animation: none; }
.btn-push.show { display: inline-flex; }
@keyframes btnPushPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(19, 185, 178, 0.45); }
  50% { box-shadow: 0 0 0 10px rgba(19, 185, 178, 0); }
}

/* ==================== HERO ==================== */
@keyframes sb-pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.7); opacity: 0.35; } }
@keyframes sb-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes sb-glow { 0%,100% { box-shadow: 0 0 14px 0 rgba(19,185,178,0.18); } 50% { box-shadow: 0 0 32px 6px rgba(19,185,178,0.48); } }

.hero { padding: 60px 24px 56px; text-align: center; }
.hero-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 100px;
  font-size: 14px; font-weight: 500;
  margin-bottom: 24px;
  border: 1px solid rgba(19,185,178,0.30);
  color: var(--accent-ink); background: #fff;
  animation: sb-glow 2.6s ease-in-out infinite;
}
.hero-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: sb-pulse 1.6s ease-in-out infinite; flex-shrink: 0; }
.hero-title {
  font-family: var(--font-display);
  font-size: 36px; font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0 0 10px; color: var(--ink);
}
.hero-title .nm { color: var(--accent); position: relative; display: inline-block; cursor: default; }
.hero-title .nm::after {
  content: ''; position: absolute; bottom: -3px; right: 0; left: 0;
  height: 2px; background: var(--accent);
  transform: scaleX(0); transform-origin: right;
  transition: transform .35s cubic-bezier(0.22, 1, 0.36, 1);
}
.hero-title .nm:hover::after { transform: scaleX(1); }
.hero-sub { font-size: 16px; max-width: 520px; margin: 0 auto 28px; line-height: 1.7; color: var(--ink-soft); }
.hero-cta {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 32px; border-radius: 100px; border: 0;
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: background .25s, transform .15s;
  background: var(--ink); color: #fff;
}
.hero-cta:hover { background: var(--accent); transform: translateY(-2px); }
.hero-cta:active { transform: translateY(0); }
.hero-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 26px; border-radius: 100px;
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .2s;
  background: #fff; color: var(--ink);
  border: 1.5px solid rgba(10, 10, 10, 0.18);
  margin-right: 12px;
}
.hero-link:hover {
  border-color: var(--ink);
  transform: translateY(-2px);
}
.hero-link:active { transform: translateY(0); }
.hero-arr { display: inline-block; transition: transform .25s ease-out; }
.hero-link:hover .hero-arr { transform: translateX(-4px); }

@media (max-width: 640px) {
  .hero-link { margin-right: 0; margin-top: 10px; padding: 12px 22px; font-size: 13px; }
  .hero-cta { padding: 13px 28px; font-size: 14px; }
}

.hero-features {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-top: 40px; padding-top: 28px;
  border-top: 1px solid var(--line);
  max-width: 560px; margin-left: auto; margin-right: auto;
}
.hero-feat {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-radius: 100px;
  background: #fff; font-size: 13px; font-weight: 500;
  border: 1px solid rgba(19,185,178,0.25); color: var(--accent-ink);
  cursor: default;
  animation: sb-float 2.8s ease-in-out infinite;
}
.hero-features .hero-feat:nth-child(1) { animation-delay: 0s; }
.hero-features .hero-feat:nth-child(2) { animation-delay: 0.4s; }
.hero-features .hero-feat:nth-child(3) { animation-delay: 0.8s; }
.hero-feat:hover {
  animation: none;
  transform: translateY(-8px);
  border-color: rgba(19,185,178,0.55);
  transition: transform .25s, border-color .25s;
}
.hero-feat-ic {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; background: var(--accent);
  transition: transform .35s; font-size: 12px;
}
.hero-feat:hover .hero-feat-ic { transform: rotate(360deg); }

/* ==================== TABS & APP CONTENT ==================== */
.section-divider {
  border-top: 1px solid var(--line);
  margin: 20px 0 32px;
}

/* Loading pill (used during data loading) */
.loading-wrap {
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}
.loading-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border: 1px solid rgba(19, 185, 178, 0.2);
  border-radius: 100px;
  padding: 10px 22px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent-ink);
  box-shadow: 0 0 30px 6px rgba(19, 185, 178, 0.15);
  animation: lp-glow 2s ease-in-out infinite;
}
@keyframes lp-glow {
  0%, 100% { box-shadow: 0 0 20px 4px rgba(19, 185, 178, 0.12); }
  50%      { box-shadow: 0 0 32px 8px rgba(19, 185, 178, 0.20); }
}
.loading-pill-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: lp-blink 1s ease-in-out infinite;
}
@keyframes lp-blink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.8); }
}

/* ============ Tabs (glowing pill style) ============ */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 32px;
  align-items: center;
}
.tab {
  background: #fff;
  color: var(--ink-muted);
  padding: 10px 18px;
  border-radius: 100px;
  border: 1px solid rgba(19, 185, 178, 0.18);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: color .15s, border-color .15s, box-shadow .25s;
  white-space: nowrap;
}
.tab:hover {
  color: var(--ink);
  border-color: rgba(19, 185, 178, 0.32);
}
.tab.active {
  color: var(--accent-ink);
  font-weight: 600;
  border-color: rgba(19, 185, 178, 0.32);
  animation: tab-pill-glow 2.5s ease-in-out infinite;
}
@keyframes tab-pill-glow {
  0%, 100% { box-shadow: 0 0 20px 4px rgba(19, 185, 178, 0.13); }
  50%      { box-shadow: 0 0 32px 8px rgba(19, 185, 178, 0.22); }
}
.tab .count {
  background: rgba(10, 10, 10, 0.05);
  color: var(--ink-soft);
  padding: 1px 8px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-display);
}
.tab.active .count {
  background: rgba(19, 185, 178, 0.15);
  color: var(--accent-ink);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.filter-bar .label { font-size: 13px; color: var(--ink-muted); font-weight: 500; }
.filter-pill {
  padding: 8px 16px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--ink-soft);
  font-family: var(--font-body);
}
.filter-pill:hover { border-color: var(--ink-soft); }
.filter-pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.campaigns-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

.campaign-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.campaign-card:hover { transform: translateY(-3px); border-color: var(--ink-soft); }
.campaign-card .top { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
.brand-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-muted); }
.brand-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--cream-darker);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600; font-size: 11px;
  color: var(--ink-soft);
}
.budget-tag { background: var(--cream-darker); padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; color: var(--ink); }

.campaign-card h3 { font-family: var(--font-display); font-size: 19px; font-weight: 600; line-height: 1.3; letter-spacing: 0; }

.campaign-card .desc {
  font-size: 14px; color: var(--ink-soft); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.meta-row { display: flex; gap: 12px; flex-wrap: wrap; }
.meta-item { font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; gap: 4px; }

.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--line); }
.tags-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 4px 10px; background: var(--cream-darker); border-radius: 100px; color: var(--accent-ink); font-weight: 500; }

.btn-apply {
  background: var(--ink); color: #fff;
  padding: 10px 20px; border: none; border-radius: 100px;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.btn-apply:hover { background: var(--accent); }
.btn-apply.applied { background: var(--cream-darker); color: var(--ink-muted); cursor: not-allowed; }

.empty { text-align: center; padding: 80px 32px; color: var(--ink-muted); }
.empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty h3 { font-family: var(--font-display); font-size: 20px; color: var(--ink); margin-bottom: 8px; }

.applications-list { display: flex; flex-direction: column; gap: 16px; }
.application-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
}
.app-info h4 { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.app-info .meta { font-size: 13px; color: var(--ink-muted); }
.app-status { padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 500; }
.status-pending { background: rgba(10, 10, 10, 0.06); color: var(--ink-muted); }
.status-pending_approval { background: rgba(19, 185, 178, 0.10); color: #0c4f4b; }
.status-active { background: rgba(19, 185, 178, 0.14); color: var(--accent-ink); }
.status-closed { background: var(--ink); color: #fff; }
.status-rejected { background: var(--cream-darker); color: var(--ink-muted); }

/* ============ Approval gate (deal waiting for brand confirmation) ============ */
.approval-gate {
  margin-top: 8px;
  background: rgba(19, 185, 178, 0.04);
  border: 1px solid rgba(19, 185, 178, 0.28);
  border-radius: 14px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.ag-info { flex: 1; min-width: 200px; }
.ag-price { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.ag-price .num { color: var(--accent); font-size: 16px; }
.ag-desc { font-size: 12px; color: var(--ink-soft); line-height: 1.6; }

/* ============ Workflow progress strip ============ */
.workflow-strip {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 22px 18px 18px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  margin-top: 8px;
  position: relative;
  gap: 4px;
}
.ws-step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  min-width: 0;
}
.ws-step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 17px;
  right: 50%;
  width: 100%;
  height: 2px;
  background: var(--line-strong);
  z-index: 0;
}
.ws-step.done::after { background: var(--accent); }
.ws-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--cream-darker);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-faint);
  position: relative;
  z-index: 1;
  transition: all 0.25s;
  border: 1.5px solid var(--line-strong);
  font-family: var(--font-display);
}
.ws-step.done .ws-circle {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.ws-step.current .ws-circle {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
  box-shadow: 0 0 0 4px rgba(10, 10, 10, 0.08);
}
.ws-label {
  font-size: 12px;
  color: var(--ink-muted);
  margin-top: 10px;
  white-space: nowrap;
  font-family: var(--font-body);
  text-align: center;
}
.ws-step.done .ws-label,
.ws-step.current .ws-label {
  color: var(--ink);
  font-weight: 500;
}

/* ============ Stage action card ============ */
.stage-action {
  margin-top: 10px;
  padding: 18px 20px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid var(--line);
}
.stage-action.mine {
  background: rgba(19, 185, 178, 0.05);
  border-color: rgba(19, 185, 178, 0.30);
}
.stage-action.waiting { background: var(--cream-darker); }
.stage-action.complete {
  background: rgba(19, 185, 178, 0.08);
  border-color: rgba(19, 185, 178, 0.35);
}
.sa-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--ink);
}
.sa-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.65;
  margin-bottom: 0;
}
.stage-action.mine .sa-desc { margin-bottom: 14px; }
.sa-btn {
  background: var(--ink);
  color: #fff;
  border: 0;
  padding: 11px 22px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.sa-btn:hover { background: var(--accent); transform: translateY(-1px); }

/* Form inside action card */
.sa-form { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
.sa-field { display: flex; flex-direction: column; gap: 6px; }
.sa-field label { font-size: 12px; color: var(--ink-soft); font-weight: 500; }
.sa-field input, .sa-field textarea {
  padding: 10px 12px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  background: #fff;
  color: var(--ink);
  width: 100%;
}
.sa-field input:focus, .sa-field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(19, 185, 178, 0.14);
}
.sa-field textarea { resize: vertical; min-height: 60px; }
.sa-form .sa-btn { align-self: flex-start; margin-top: 4px; }

/* Stage history */
.stage-history {
  margin-top: 10px;
  padding: 14px 18px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid var(--line);
}
.stage-history h4 {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--ink-soft);
}
.history-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 9px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--line);
}
.history-item:last-child { border-bottom: 0; padding-bottom: 0; }
.history-item:first-child { padding-top: 0; }
.history-item .hi-tick {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(19,185,178,0.15);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  margin-top: 2px;
  font-weight: 600;
}
.hi-name { font-weight: 600; color: var(--ink); }
.hi-fields { color: var(--ink-soft); font-size: 12px; margin-top: 2px; line-height: 1.6; word-break: break-word; overflow-wrap: anywhere; }
.hi-fields a { color: var(--accent-ink); text-decoration: underline; word-break: break-all; }

/* Brief / long-text field with copy + read more */
.hi-blocks { margin-top: 8px; display: flex; flex-direction: column; gap: 12px; }
.brief-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 6px;
}
.brief-header strong { font-size: 12px; color: var(--ink); font-weight: 600; }
.brief-copy {
  background: transparent;
  border: 1px solid var(--line-strong);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--ink-soft);
  cursor: pointer;
  font-family: var(--font-body);
  transition: background .15s, color .15s, border-color .15s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.brief-copy:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.brief-content {
  background: var(--cream-darker);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.brief-content.truncated {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 3;
  overflow: hidden;
}
.brief-content.expanded {
  display: block;
  -webkit-line-clamp: unset;
  overflow: visible;
}
.brief-toggle {
  background: transparent;
  border: 0;
  color: var(--accent-ink);
  font-size: 12px;
  cursor: pointer;
  padding: 6px 0 0;
  font-family: var(--font-body);
  font-weight: 500;
}
.brief-toggle:hover { color: var(--accent); }
@media (max-width: 640px) {
  .workflow-strip { padding: 18px 8px 14px; gap: 2px; }
  .ws-circle { width: 28px; height: 28px; font-size: 12px; }
  .ws-step:not(:last-child)::after { top: 13px; }
  .ws-label { font-size: 10px; margin-top: 6px; }
}

.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(10, 10, 10, 0.5);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal-backdrop.show { display: flex; }
.modal { background: #fff; border-radius: 24px; padding: 36px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.modal .sub { color: var(--ink-muted); font-size: 14px; margin-bottom: 24px; }
.field { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; }
input, textarea {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--line-strong); border-radius: 10px;
  font-family: var(--font-body); font-size: 14px;
  background: #fff; color: var(--ink);
}
input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(19,185,178,0.14); }
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.btn-secondary { flex: 1; padding: 12px; background: #fff; border: 1px solid var(--line-strong); color: var(--ink); border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary { flex: 1; padding: 12px; background: var(--ink); color: #fff; border: none; border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: var(--accent); }
.btn-primary:disabled { background: var(--ink-faint); cursor: not-allowed; }

@media (max-width: 640px) {
  .container { padding: 0 16px; }
  .campaigns-grid { grid-template-columns: 1fr; }
  .modal { padding: 24px; }
  .hero-title { font-size: 28px; }
  .hero-sub { font-size: 15px; }
  .hero { padding: 40px 16px 36px; }
  .logo-eye { width: 36px; height: 36px; }
  .logo-mark { font-size: 14px; }
  .user-pill .user-name { display: none; }
  .hero-link { display: block; margin: 14px 0 0; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg class="logo-eye" viewBox="0 0 200 200" aria-hidden="true">
        <g fill="none" stroke-linejoin="miter" stroke-miterlimit="6" stroke-linecap="round">
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="10" transform="rotate(25 100 100)"/>
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="10" transform="rotate(-25 100 100)"/>
          <path d="M76 100 Q100 88 124 100 Q100 112 76 100 Z" fill="#ffffff" stroke="#13B9B2" stroke-width="7"/>

</nav>

<main class="container">

  <!-- ============ HERO ============ -->
  <section class="hero">
    <div class="hero-pill"><span class="hero-dot"></span><span id="hero-status">جاري التحميل...</span></div>
    <h1 class="hero-title">أهلًا <span class="nm" id="welcome-name">بك</span></h1>
    <p class="hero-sub">اطّلع على جميع الإعلانات المتاحة لك، واختر المناسب.</p>
    <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
      <button class="hero-cta" onclick="goToBrowse()">تصفّح الإعلانات</button>

      <span class="hero-feat"><span class="hero-feat-ic">✓</span>تقفل الصفقة</span>

  <!-- ============ APP CONTENT ============ -->
  <div id="app-section" class="section-divider"></div>

  <div class="tabs">

    <button class="tab" onclick="switchTab('applications')" id="tab-applications">
      <span>العروض المقدّمة</span>

  <div class="tab-panel active" id="panel-browse">
    <div class="filter-bar">
      <span class="label">التصنيف:</span>
      <button class="filter-pill active" onclick="filterCampaigns('all', this)">الكل</button>
      <button class="filter-pill" onclick="filterCampaigns('perfumes', this)">عطور</button>
      <button class="filter-pill" onclick="filterCampaigns('fashion', this)">موضة</button>
      <button class="filter-pill" onclick="filterCampaigns('beauty', this)">جمال</button>
      <button class="filter-pill" onclick="filterCampaigns('food', this)">طعام</button>
      <button class="filter-pill" onclick="filterCampaigns('tech', this)">تقنية</button>

<div class="modal-backdrop" id="apply-modal">

    <p class="sub" id="modal-sub">قدّم عرضك على هذا الإعلان. الوكيل الذكي راح يتفاوض معك بناءً على عرضك.</p>

    <form onsubmit="submitApplication(event)">
      <div class="field">
        <label>السعر المعروض (ر.س)</label>
        <input type="number" name="price" required placeholder="مثال: 800">
      </div>

      <div class="field">
        <label>ملاحظة إضافية (اختياري)</label>
        <textarea name="note" rows="3" placeholder="مثل: أقدر أصور خلال 3 أيام، أو لدي اقتراحات إضافية..."></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn-primary">إرسال العرض</button>
      </div>
    </form>

</div>

<script src="supabase-config.js"></script>
<script src="notifications.js"></script>
<script>
let currentUser = null;
let allCampaigns = [];
let myApplications = [];
let currentFilter = 'all';
let currentCampaignId = null;

const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
const toArabic = n => String(n).split('').map(d => arabicDigits[parseInt(d)] ?? d).join('');

// ====== خرائط عرض الحقول الجديدة ======
const PUBLISH_TIMING_LABELS = {
  '24h': 'خلال ٢٤ ساعة (مستعجل)',
  '3d': 'خلال ٣ أيام',
  '1w': 'خلال أسبوع',
  '2w': 'خلال أسبوعين',
  'custom': 'تاريخ محدّد'
};
const PLATFORM_LABELS = {
  tiktok: 'تيك توك', snapchat: 'سناب شات', x: 'إكس', instagram: 'انستقرام', youtube: 'يوتيوب'
};
const FOLLOWER_RANGE_LABELS = {
  '20-50k': 'من ٢٠ ألف إلى ٥٠ ألف متابع',
  '50-200k': 'من ٥٠ ألف إلى ٢٠٠ ألف متابع',
  '200-500k': 'من ٢٠٠ ألف إلى ٥٠٠ ألف متابع',
  '500k+': 'أكثر من ٥٠٠ ألف متابع'
};
function publishTimingText(c) {
  if (!c) return '';
  if (c.publish_timing === 'custom' && c.publish_date) {
    try { return 'بتاريخ ' + new Date(c.publish_date).toLocaleDateString('ar-SA'); }
    catch (e) { return c.publish_date; }
  }
  return PUBLISH_TIMING_LABELS[c.publish_timing] || c.publish_timing || '';
}
function followerRangeText(c) {
  if (!c || !c.follower_range) return '';
  return String(c.follower_range).split(',').map(s => s.trim()).filter(Boolean)
    .map(v => FOLLOWER_RANGE_LABELS[v] || v).join('، ');
}

// نص الـ pill يعتمد على عدد العروض المقدّمة (غير المرفوضة):
// لا يظهر "لا يوجد لديك عروض حالياً" إلا إذا كان العدد صفر فعلاً.
function offersWaitingLabel(n) {
  if (n === 0) return 'لا يوجد لديك عروض حالياً';
  if (n === 1) return 'لديك عرض بانتظارك';
  return `لديك ${toArabic(n)} عروض بانتظارك`;
}

function goToBrowse() {
  switchTab('browse');
  document.getElementById('app-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function goToApplications() {
  switchTab('applications');
  document.getElementById('app-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function init() {
  await tryRestoreSession();

  currentUser = getCurrentUser();
  if (!currentUser) {
    alert('يرجى تسجيل الدخول أولاً');
    window.location.href = '/signup.html';
    return;
  }

  if (currentUser.role !== 'creator') {
    alert('هذه الصفحة مخصصة للمعلنين. سيتم تحويلك للوحة الشركة.');
    window.location.href = '/brand.html';
    return;
  }

  const firstName = (currentUser.name || 'بك').split(' ')[0];
  document.getElementById('user-name').textContent = firstName;
  document.getElementById('user-initial').textContent = firstName[0];
  document.getElementById('welcome-name').textContent = firstName;

  initNotifications('user-menu');

  await loadData();
}

async function loadData() {
  try {
    document.getElementById('campaigns-list').innerHTML = '<div class="loading-wrap" style="grid-column:1/-1"><div class="loading-pill"><span class="loading-pill-dot"></span>جاري تحميل الإعلانات...</div></div>';
    [allCampaigns, myApplications] = await Promise.all([
      dbGetCampaigns(),
      dbGetMyApplications(currentUser.id)
    ]);
    updateHeroStats();
    renderCampaigns();
    renderApplications();
  } catch (err) {
    console.error(err);
    document.getElementById('campaigns-list').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--ink-soft)">حصل خطأ في تحميل البيانات. حدّث الصفحة وحاول مرة أخرى.</div>';
  }
}

function updateHeroStats() {
  const activeApps = myApplications.filter(a => a.status !== 'rejected').length;
  document.getElementById('hero-status').textContent = offersWaitingLabel(activeApps);
  document.getElementById('hero-app-count').textContent = toArabic(activeApps);
}

function renderCampaigns() {
  const filtered = currentFilter === 'all'
    ? allCampaigns
    : allCampaigns.filter(c => c.brand_industry === currentFilter);

  document.getElementById('count-browse').textContent = filtered.length;
  const list = document.getElementById('campaigns-list');

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty" style="grid-column: 1/-1">
        <div class="icon">○</div>
        <h3>لا توجد إعلانات</h3>
        <p>لا توجد إعلانات في هذا التصنيف حالياً</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const applied = myApplications.some(a => a.campaign_id === c.id);
    const brandName = c.brand || 'شركة';
    const brandInitial = brandName[0];
    const tags = c.tags || [];
    return `
      <div class="campaign-card">
        <div class="top">
          <div class="brand-badge">
            <div class="brand-avatar">${brandInitial}</div>
            <span>${brandName}</span>
          </div>
        </div>
        <h3>${c.title}</h3>
        <p class="desc">${c.description}</p>
        <div class="meta-row">
          ${c.publish_timing ? `<div class="meta-item">⏱ ${publishTimingText(c)}</div>` : ''}
          ${c.platform ? `<div class="meta-item">◇ ${PLATFORM_LABELS[c.platform] || c.platform}</div>` : ''}
          ${c.follower_range ? `<div class="meta-item">◯ ${followerRangeText(c)}</div>` : ''}
        </div>
        <div class="card-footer">
          <div class="tags-row">
            ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <button class="btn-apply ${applied ? 'applied' : ''}"
                  onclick="${applied ? '' : `openApplyModal('${c.id}')`}"
                  ${applied ? 'disabled' : ''}>
            ${applied ? 'تم التقديم ✓' : 'قدّم عرضك'}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function renderApplications() {
  document.getElementById('count-applications').textContent = myApplications.length;
  const list = document.getElementById('applications-list');

  if (myApplications.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="icon">◌</div>
        <h3>لا يوجد لديك عروض حالياً</h3>
        <p>تصفّح الإعلانات المتاحة وقدّم عرضك على ما يناسبك</p>
      </div>`;
    return;
  }

  const statusLabels = {
    pending: 'قيد المراجعة',
    active: 'تفاوض نشط',
    closed: 'مقفلة',
    rejected: 'مرفوضة'
  };

  list.innerHTML = myApplications.map(a => {
    const campaignTitle = a.campaigns?.title || 'إعلان';
    const brandName = a.campaigns?.users?.company_name || '';
    const isClosed = a.status === 'closed';
    const isApproved = isClosed && a.brand_approved === true;
    const awaitingApproval = isClosed && !isApproved;
    const statusKey = awaitingApproval ? 'pending_approval' : a.status;
    const statusLabel = awaitingApproval ? '⏳ بانتظار تعميد الشركة' : statusLabels[a.status];
    return `
      <div class="application-card" onclick="window.location.href='/campaign.html?app=${a.id}'" style="cursor: pointer">
        <div class="app-info">
          <h4>${campaignTitle}</h4>
          <div class="meta">${brandName} · عرضك: ${a.price.toLocaleString('ar-SA')} ر.س · ${new Date(a.created_at).toLocaleDateString('ar-SA')}</div>
        </div>
        <span class="app-status status-${statusKey}">${statusLabel}</span>
      </div>
      ${awaitingApproval ? `
        <div class="approval-gate" onclick="event.stopPropagation()">
          <div class="ag-info">
            <div class="ag-price">السعر النهائي: <span class="num">${(a.final_price || a.price).toLocaleString('ar-SA')} ر.س</span></div>
            <div class="ag-desc">تم التوصّل لاتفاق، بانتظار تعميد الشركة لبدء التنفيذ.</div>
          </div>
        </div>
      ` : ''}
      ${isApproved ? renderWorkflowStrip(a.stage || 1) + renderStageHistory(a.stage_data, a.stage || 1) + renderStageAction(a.id, a.stage || 1, 'creator') : ''}
    `;
  }).join('');
}

// ============ Workflow stages ============
const WORKFLOW_STAGES = [
  { id: 1, name: 'العنوان' },
  { id: 2, name: 'الشحن' },
  { id: 3, name: 'الاستلام' },
  { id: 4, name: 'البريف' },
  { id: 5, name: 'المحتوى' },
  { id: 6, name: 'الموافقة' },
  { id: 7, name: 'النشر' },
  { id: 8, name: 'البيانات البنكية' },
  { id: 9, name: 'مكتمل', isFinal: true }
];

const STAGE_ACTIONS = {
  1: {
    responsible: 'creator',
    creator: { label: '✓ تأكيد إرسال العنوان', desc: 'عبّئ تفاصيل العنوان للشحن، ثم أكّد للانتقال للمرحلة التالية.' },
    brand:   { desc: 'بانتظار إرسال المعلن لعنوانه.' }
  },
  2: {
    responsible: 'brand',
    brand:   { label: '✓ تأكيد الشحن', desc: 'بعد شحن المنتج، عبّئ بيانات الشحن وأكّد.' },
    creator: { desc: 'الشركة تجهّز المنتج لشحنه إليك.' }
  },
  3: {
    responsible: 'creator',
    creator: { label: '✓ تأكيد الاستلام', desc: 'بعد وصول المنتج إليك، أكّد الاستلام.' },
    brand:   { desc: 'المنتج في الطريق إلى المعلن.' }
  },
  4: {
    responsible: 'brand',
    brand:   { label: '✓ إرسال البريف', desc: 'اكتب نص البريف الإعلاني (وضّح كيف تبي يكون الإعلان ومحتواه)، على أساسه المعلن يجهّز المحتوى.' },
    creator: { desc: 'الشركة تجهّز البريف الإعلاني (نص يوضّح متطلبات الإعلان).' }
  },
  5: {
    responsible: 'creator',
    creator: { label: '✓ تأكيد إرسال المحتوى', desc: 'بناءً على البريف، أرفق رابط المحتوى للمراجعة وأكّد للمرحلة التالية.' },
    brand:   { desc: 'المعلن يجهّز المحتوى الإعلاني حسب البريف.' }
  },
  6: {
    responsible: 'brand',
    brand:   { label: '✓ الموافقة على المحتوى', desc: 'بعد مراجعة المحتوى، أضف ملاحظاتك (إن وُجدت) وأكّد الموافقة.' },
    creator: { desc: 'الشركة تراجع المحتوى الذي أرسلته.' }
  },
  7: {
    responsible: 'creator',
    creator: { label: '✓ تأكيد النشر', desc: 'بعد نشر المحتوى، أرفق رابط المنشور وكود الترويج وأكّد.' },
    brand:   { desc: 'بانتظار نشر المعلن للمحتوى المعتمد.' }
  },
  8: {
    responsible: 'creator',
    creator: { label: '✓ إرسال البيانات البنكية', desc: 'أضف بياناتك البنكية لاستلام المبلغ المتفق عليه.' },
    brand:   { desc: 'تم النشر. المعلن يضيف بياناته البنكية لاستلام المبلغ.' }
  }
};

const STAGE_FIELDS = {
  1: [
    { name: 'address', label: 'العنوان الكامل', placeholder: 'مثل: الرياض، حي العليا، شارع الأمير محمد...', type: 'textarea', required: true },
    { name: 'phone',   label: 'رقم الجوال للتوصيل', placeholder: '966501234567', type: 'tel', required: true }
  ],
  2: [
    { name: 'tracking', label: 'رقم التتبع (اختياري)', placeholder: 'رقم بوليصة الشحن', type: 'text', required: false },
    { name: 'carrier',  label: 'شركة الشحن (اختياري)', placeholder: 'مثل: SMSA, Aramex', type: 'text', required: false }
  ],
  3: [
    { name: 'note', label: 'ملاحظة (اختياري)', placeholder: 'مثلًا: وصل بحالة ممتازة', type: 'text', required: false }
  ],
  4: [
    { name: 'brief', label: 'نص البريف الإعلاني', placeholder: 'وضّح للمعلن: المحاور الرئيسية، النقاط اللي تركّز عليها، نوع المحتوى المطلوب، الكلمات المفتاحية، أي مراجع أو أمثلة...', type: 'textarea', required: true }
  ],
  5: [
    { name: 'content_link', label: 'رابط المحتوى للمراجعة', placeholder: 'رابط Google Drive، WeTransfer، أو نسخة للمراجعة', type: 'url', required: true },
    { name: 'note',         label: 'ملاحظة (اختياري)', placeholder: 'تفاصيل أو ملاحظات للشركة', type: 'text', required: false }
  ],
  6: [
    { name: 'feedback', label: 'ملاحظات (اختياري)', placeholder: 'أي ملاحظات...', type: 'text', required: false }
  ],
  7: [
    { name: 'publish_link', label: 'رابط المنشور', placeholder: '', type: 'url', required: true },
    { name: 'promo_code',   label: 'كود الترويج', placeholder: '', type: 'textarea', rows: 4, required: false }
  ],
  8: [
    { name: 'account_holder', label: 'اسم صاحب الحساب', placeholder: '', type: 'text', required: true },
    { name: 'iban',           label: 'رقم الآيبان', placeholder: '', type: 'text', required: true },
    { name: 'bank_name',      label: 'اسم البنك', placeholder: '', type: 'text', required: false }
  ]
};

const STAGE_NOTIFICATIONS = {
  2: { title: '📦 الشحن', body: 'تم تأكيد العنوان، الصفقة دخلت مرحلة الشحن' },
  3: { title: '🚚 الاستلام', body: 'تم الشحن، الصفقة في مرحلة الاستلام' },
  4: { title: '📋 البريف', body: 'تم استلام المنتج، الشركة تجهّز البريف الإعلاني' },
  5: { title: '🎬 المحتوى', body: 'البريف جاهز، الصفقة في مرحلة إعداد المحتوى' },
  6: { title: '👀 المراجعة', body: 'المحتوى جاهز، الصفقة في مرحلة المراجعة والموافقة' },
  7: { title: '🚀 النشر', body: 'تمت الموافقة، الصفقة في مرحلة النشر' },
  8: { title: '💳 البيانات البنكية', body: 'تم النشر، المعلن يضيف بياناته البنكية' },
  9: { title: '🎉 صفقة مكتملة', body: 'تم استلام البيانات، الصفقة مكتملة بنجاح، شكرًا لك' }
};

function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderWorkflowStrip(currentStage) {
  const stages = WORKFLOW_STAGES.map(s => {
    let cls = '', content = '';
    if (s.id < currentStage) { cls = 'done'; content = '✓'; }
    else if (s.id === currentStage) { cls = 'current'; content = s.isFinal ? '✓' : toArabic(s.id); }
    else { cls = 'future'; content = s.isFinal ? '✓' : toArabic(s.id); }
    return `<div class="ws-step ${cls}" title="${s.name}"><div class="ws-circle">${content}</div><div class="ws-label">${s.name}</div></div>`;
  }).join('');
  return `<div class="workflow-strip">${stages}</div>`;
}

function renderStageHistory(stageData, currentStage) {
  if (!stageData) return '';
  const completedStages = Object.keys(stageData)
    .map(k => parseInt(k))
    .filter(n => n < currentStage)
    .sort((a, b) => a - b);
  if (completedStages.length === 0) return '';

  const items = completedStages.map(stageId => {
    const data = stageData[stageId] || {};
    const stageName = WORKFLOW_STAGES.find(s => s.id === stageId)?.name || '';
    const fields = STAGE_FIELDS[stageId] || [];

    const inlineFields = [];
    const blockFields = [];
    fields.forEach(f => {
      if (data[f.name] !== undefined && data[f.name] !== '') {
        if (f.type === 'textarea' || f.type === 'url') blockFields.push(f);
        else inlineFields.push(f);
      }
    });

    const inlineHtml = inlineFields.map(f => {
      const val = data[f.name];
      return `<div><strong>${f.label}:</strong> ${escHtml(val)}</div>`;
    }).join('');

    const blockHtml = blockFields.map(f => {
      const val = data[f.name];
      const isUrl = f.type === 'url';
      const longText = !isUrl && val.length > 200;
      const cid = 'brf-' + stageId + '-' + f.name + '-' + Math.random().toString(36).slice(2, 8);
      const content = isUrl
        ? `<a href="${escHtml(val)}" target="_blank" rel="noopener">${escHtml(val)}</a>`
        : escHtml(val);
      return `
        <div class="brief-field">
          <div class="brief-header">
            <strong>${f.label}:</strong>
            <button class="brief-copy" onclick="event.stopPropagation(); copyBrief(this)">📋 نسخ</button>
          </div>
          <div class="brief-content${longText ? ' truncated' : ''}" id="${cid}">${content}</div>
          ${longText ? `<button class="brief-toggle" onclick="event.stopPropagation(); toggleBrief('${cid}', this)">قراءة المزيد ↓</button>` : ''}
        </div>
      `;
    }).join('');

    return `
      <div class="history-item">
        <div class="hi-tick">✓</div>
        <div style="min-width:0; flex:1;">
          <div class="hi-name">${toArabic(stageId)}. ${stageName}</div>
          ${inlineHtml ? `<div class="hi-fields">${inlineHtml}</div>` : ''}
          ${blockHtml ? `<div class="hi-blocks">${blockHtml}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  return `<div class="stage-history" onclick="event.stopPropagation()"><h4>سجلّ المراحل المكتملة</h4>${items}</div>`;
}

function copyBrief(btn) {
  const wrap = btn.closest('.brief-field');
  if (!wrap) return;
  const content = wrap.querySelector('.brief-content');
  if (!content) return;
  const text = content.textContent;
  const original = btn.innerHTML;
  const done = () => {
    btn.innerHTML = '✓ نُسخ';
    setTimeout(() => { btn.innerHTML = original; }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, onDone) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    onDone && onDone();
  } catch (e) {
    alert('فشل النسخ. انسخ يدويًا.');
  }
}
function toggleBrief(id, btn) {
  const content = document.getElementById(id);
  if (!content) return;
  const isExpanded = content.classList.toggle('expanded');
  content.classList.toggle('truncated', !isExpanded);
  btn.textContent = isExpanded ? 'إخفاء ↑' : 'قراءة المزيد ↓';
}

function renderStageAction(applicationId, currentStage, viewerRole) {
  if (currentStage >= 9) {
    return `<div class="stage-action complete" onclick="event.stopPropagation()"><div class="sa-title">🎉 صفقة مكتملة</div><div class="sa-desc">تم اكتمال جميع مراحل الصفقة بنجاح.</div></div>`;
  }
  const info = STAGE_ACTIONS[currentStage];
  if (!info) return '';
  const stageName = WORKFLOW_STAGES.find(s => s.id === currentStage)?.name || '';
  const isMyTurn = info.responsible === viewerRole;
  const myInfo = info[viewerRole] || {};

  if (isMyTurn) {
    const fields = STAGE_FIELDS[currentStage] || [];
    const inputsHtml = fields.map(f => {
      const fid = `sf-${applicationId}-${f.name}`;
      if (f.type === 'textarea') {
        const rows = f.rows || 3;
        return `<div class="sa-field"><label for="${fid}">${f.label}${f.required ? ' *' : ''}</label><textarea id="${fid}" name="${f.name}" placeholder="${escHtml(f.placeholder)}" rows="${rows}"${f.required ? ' required' : ''} onclick="event.stopPropagation()"></textarea></div>`;
      }
      return `<div class="sa-field"><label for="${fid}">${f.label}${f.required ? ' *' : ''}</label><input type="${f.type}" id="${fid}" name="${f.name}" placeholder="${escHtml(f.placeholder)}"${f.required ? ' required' : ''} onclick="event.stopPropagation()"></div>`;
    }).join('');
    return `
      <div class="stage-action mine" onclick="event.stopPropagation()">
        <div class="sa-title">المرحلة الحالية: ${stageName}</div>
        <div class="sa-desc">${myInfo.desc || ''}</div>
        <form class="sa-form" id="stage-form-${applicationId}" onclick="event.stopPropagation()" onsubmit="event.preventDefault(); event.stopPropagation(); submitStageForm('${applicationId}')">
          ${inputsHtml}
          <button type="submit" class="sa-btn" onclick="event.stopPropagation()">${myInfo.label}</button>
        </form>
      </div>
    `;
  }
  return `<div class="stage-action waiting" onclick="event.stopPropagation()"><div class="sa-title">⏳ المرحلة الحالية: ${stageName}</div><div class="sa-desc">${myInfo.desc || ''}</div></div>`;
}

async function submitStageForm(applicationId) {
  const app = myApplications.find(a => a.id === applicationId);
  if (!app) return;
  const oldStage = app.stage || 1;
  const newStage = oldStage + 1;

  // اجمع بيانات النموذج
  const form = document.getElementById(`stage-form-${applicationId}`);
  const fd = new FormData(form);
  const data = {};
  for (const [key, value] of fd.entries()) {
    if (value && value.toString().trim()) data[key] = value.toString().trim();
  }

  // ادمج مع stage_data الحالي
  const existing = (typeof app.stage_data === 'object' && app.stage_data) ? { ...app.stage_data } : {};
  existing[oldStage] = { ...data, _at: new Date().toISOString() };

  const submitBtn = form.querySelector('button[type="submit"]');
  const original = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الحفظ...';

  try {
    const { data: updated, error } = await supabaseClient
      .from('applications')
      .update({ stage: newStage, stage_data: existing })
      .eq('id', applicationId)
      .select('*, campaigns(brand_id, title)');
    if (error) throw error;
    if (!updated || updated.length === 0) {
      throw new Error('لم يتم التحديث. تحقق من سياسات الحماية.');
    }

    // إشعار الشركة
    const brandId = updated[0]?.campaigns?.brand_id;
    const campaignTitle = updated[0]?.campaigns?.title || 'صفقة';
    const notif = STAGE_NOTIFICATIONS[newStage];
    if (brandId && notif) {
      createNotification(brandId, 'workflow_update', notif.title, `${campaignTitle}: ${notif.body}`, '/brand.html').catch(console.error);
      fetch('https://rdzzzasbyzugxogbgwwn.supabase.co/functions/v1/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + supabaseClient.supabaseKey },
        body: JSON.stringify({ title: notif.title, body: `${campaignTitle}: ${notif.body}`, url: '/brand.html', target_users: [brandId] })
      }).catch(console.error);
    }

    await loadData();
  } catch (err) {
    console.error('Failed to submit stage:', err);
    submitBtn.disabled = false;
    submitBtn.textContent = original;
    alert('حصل خطأ: ' + (err.message || 'حاول مرة أخرى'));
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

function filterCampaigns(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderCampaigns();
}

function openApplyModal(campaignId) {
  currentCampaignId = campaignId;
  const campaign = allCampaigns.find(c => c.id === campaignId);
  if (!campaign) return;
  document.getElementById('modal-title').textContent = 'تقديم على: ' + campaign.title;
  document.getElementById('modal-sub').textContent = `${campaign.brand} · حدّد السعر المناسب لك`;
  document.getElementById('apply-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('apply-modal').classList.remove('show');
}

async function submitApplication(event) {
  event.preventDefault();
  const form = event.target;
  const submitBtn = form.querySelector('button[type="submit"]');
  const original = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الإرسال...';

  const fd = new FormData(form);
  const price = parseInt(fd.get('price'));
  const note = fd.get('note') || null;
  const applicationData = {
    campaign_id: currentCampaignId,
    creator_id: currentUser.id,
    price: price,
    note: note,
    status: 'pending'
  };

  const campaign = allCampaigns.find(c => c.id === currentCampaignId);

  try {
    const savedApplication = await dbApply(applicationData);

    if (campaign && campaign.brand_id) {
      createNotification(
        campaign.brand_id,
        'new_application',
        `📨 ${currentUser.name || 'معلن'} قدّمت عرضاً`,
        `على إعلان: ${campaign.title} · بسعر ${price} ر.س`,
        '/brand.html'
      ).catch(err => console.error(err));
    }

    closeModal();
    form.reset();

    startAutoNegotiation(savedApplication, campaign);

    submitBtn.disabled = false;
    submitBtn.textContent = original;

    await loadData();

    setTimeout(() => alert('تم إرسال عرضك بنجاح! الوكيل الذكي بدأ التفاوض. افتح "صفقاتي" لمتابعة المحادثة.'), 100);
  } catch (err) {
    console.error(err);
    submitBtn.disabled = false;
    submitBtn.textContent = original;
    alert('حصل خطأ أثناء إرسال العرض. حاول مرة أخرى.');
  }
}

async function startAutoNegotiation(application, campaign) {
  try {
    if (!application || !application.id || !campaign) {
      console.warn('Missing data for auto-negotiation');
      return;
    }

    const { data: existing } = await supabaseClient
      .from('negotiations')
      .select('id')
      .eq('application_id', application.id)
      .limit(1);
    if (existing && existing.length > 0) return;

    const campaignData = {
      id: campaign.id,
      title: campaign.title,
      description: campaign.description,
      budget: campaign.budget,
      max_budget: campaign.max_budget || campaign.budget,
      duration: campaign.duration,
      package: campaign.package,
      requirements: campaign.requirements,
      brand_name: campaign.brand || '',
      brand_id: campaign.brand_id
    };
    const applicationPayload = {
      id: application.id,
      creator_name: currentUser.name || 'معلن',
      price: application.price,
      platform: currentUser.platform,
      followers: currentUser.followers,
      note: application.note
    };

    fetch('/api/negotiate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        campaign: campaignData,
        application: applicationPayload,
        history: []
      })
    }).catch(err => console.error('Auto-negotiation start error:', err));
  } catch (err) {
    console.error('startAutoNegotiation error:', err);
  }
}

function logout() {
  clearCurrentUser();
  window.location.href = '/';
}

init();
