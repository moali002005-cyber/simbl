<!DOCTYPE html>
<html lang="ar" dir="rtl" data-i18n-title="creator_title">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المعلن - سيمبل</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="سيمبل">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="/splash.js?v=2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/translations.js?v=2"></script>
<script src="/i18n.js?v=2"></script>
<style>
:root {
  --cream: #ffffff;
  --cream-darker: #f5f5f4;
  --ink: #0a0a0a;
  --ink-soft: #3a3a3a;
  --ink-muted: #6b6b6b;
  --ink-faint: #a0a0a0;
  --accent: #13B9B2;
  --accent-soft: #7fd6d2;
  --accent-ink: #0c4f4b;
  --line: rgba(10, 10, 10, 0.08);
  --line-strong: rgba(10, 10, 10, 0.16);
  --success: #13B9B2;
  --font-display: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
}

.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

.nav {
  background: var(--cream);
  padding: 16px 0;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: var(--ink); transition: transform .3s ease-out; }
.logo:hover { transform: scale(1.05); }
.logo-eye { width: 40px; height: 40px; display: block; flex-shrink: 0; }
.logo-mark {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  position: relative;
  padding-left: 10px;
  line-height: 1;
}
.logo-mark::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 50%;
}

.user-menu { display: flex; align-items: center; gap: 10px; }
.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 4px 12px 4px 4px;
  border-radius: 100px;
  border: 1px solid var(--line);
  transition: border-color .2s, transform .2s;
}
.user-pill:hover { border-color: rgba(19,185,178,0.40); transform: translateY(-1px); }
.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 12px;
}
.user-name { font-size: 14px; font-weight: 500; }
.btn-logout {
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink-muted);
  padding: 7px 14px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { color: var(--accent); border-color: var(--accent); }

.btn-push {
  background: var(--accent);
  color: #fff;
  border: 0;
  padding: 7px 14px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 6px;
  transition: background 0.2s, transform 0.15s;
  animation: btnPushPulse 2.4s ease-in-out infinite;
}
.btn-push:hover { background: var(--accent-ink); transform: translateY(-1px); animation: none; }
.btn-push.show { display: inline-flex; }
@keyframes btnPushPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(19, 185, 178, 0.45); }
  50% { box-shadow: 0 0 0 10px rgba(19, 185, 178, 0); }
}

/* ==================== HERO ==================== */
@keyframes sb-pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.7); opacity: 0.35; } }
@keyframes sb-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes sb-glow { 0%,100% { box-shadow: 0 0 14px 0 rgba(19,185,178,0.18); } 50% { box-shadow: 0 0 32px 6px rgba(19,185,178,0.48); } }

.hero { padding: 44px 24px 36px; text-align: center; }
.hero-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 100px;
  font-size: 14px; font-weight: 500;
  margin-bottom: 24px;
  border: 1px solid rgba(19,185,178,0.30);
  color: var(--accent-ink); background: #fff;
  animation: sb-glow 2.6s ease-in-out infinite;
}
.hero-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: sb-pulse 1.6s ease-in-out infinite; flex-shrink: 0; }
.hero-title {
  font-family: var(--font-display);
  font-size: 36px; font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0 0 10px; color: var(--ink);
}
.hero-title .nm { color: var(--accent); position: relative; display: inline-block; cursor: default; }
.hero-title .nm::after {
  content: ''; position: absolute; bottom: -3px; right: 0; left: 0;
  height: 2px; background: var(--accent);
  transform: scaleX(0); transform-origin: right;
  transition: transform .35s cubic-bezier(0.22, 1, 0.36, 1);
}
.hero-title .nm:hover::after { transform: scaleX(1); }
.hero-sub { font-size: 16px; max-width: 520px; margin: 0 auto 28px; line-height: 1.7; color: var(--ink-soft); }
.hero-cta {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 32px; border-radius: 100px; border: 0;
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: background .25s, transform .15s;
  background: var(--ink); color: #fff;
}
.hero-cta:hover { background: var(--accent); transform: translateY(-2px); }
.hero-cta:active { transform: translateY(0); }
.hero-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 26px; border-radius: 100px;
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .2s;
  background: #fff; color: var(--ink);
  border: 1.5px solid rgba(10, 10, 10, 0.18);
  margin-right: 12px;
}
.hero-link:hover {
  border-color: var(--ink);
  transform: translateY(-2px);
}
.hero-link:active { transform: translateY(0); }
.hero-arr { display: inline-block; transition: transform .25s ease-out; }
.hero-link:hover .hero-arr { transform: translateX(-4px); }

@media (max-width: 640px) {
  .hero-link { margin-right: 0; margin-top: 10px; padding: 12px 22px; font-size: 13px; }
  .hero-cta { padding: 13px 28px; font-size: 14px; }
}

.hero-features {
  display: flex; gap: 8px; justify-content: center; flex-wrap: nowrap;
  margin-top: 24px; padding-top: 20px;
  border-top: 1px solid var(--line);
  max-width: 560px; margin-left: auto; margin-right: auto;
}
.hero-feat {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 100px;
  background: transparent; font-size: 11px; font-weight: 500;
  color: var(--ink-muted); white-space: nowrap;
  cursor: default;
}
.hero-feat-ic {
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; background: var(--accent);
  font-size: 9px; flex-shrink: 0;
}
@media (max-width: 420px) {
  .hero-feat { font-size: 10px; padding: 4px 7px; gap: 4px; }
}

/* ==================== TABS & APP CONTENT ==================== */
.section-divider {
  border-top: 1px solid var(--line);
  margin: 14px 0 24px;
}

/* Loading pill (used during data loading) */
.loading-wrap {
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}
.loading-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border: 1px solid rgba(19, 185, 178, 0.2);
  border-radius: 100px;
  padding: 10px 22px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent-ink);
  box-shadow: 0 0 30px 6px rgba(19, 185, 178, 0.15);
  animation: lp-glow 2s ease-in-out infinite;
}
@keyframes lp-glow {
  0%, 100% { box-shadow: 0 0 20px 4px rgba(19, 185, 178, 0.12); }
  50%      { box-shadow: 0 0 32px 8px rgba(19, 185, 178, 0.20); }
}
.loading-pill-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: lp-blink 1s ease-in-out infinite;
}
@keyframes lp-blink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.8); }
}

/* ============ Tabs (glowing pill style) ============ */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 32px;
  align-items: center;
}
.tab {
  background: #fff;
  color: var(--ink-muted);
  padding: 10px 18px;
  border-radius: 100px;
  border: 1px solid rgba(19, 185, 178, 0.18);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: color .15s, border-color .15s, box-shadow .25s;
  white-space: nowrap;
}
.tab:hover {
  color: var(--ink);
  border-color: rgba(19, 185, 178, 0.32);
}
.tab.active {
  color: var(--accent-ink);
  font-weight: 600;
  border-color: rgba(19, 185, 178, 0.32);
  animation: tab-pill-glow 2.5s ease-in-out infinite;
}
@keyframes tab-pill-glow {
  0%, 100% { box-shadow: 0 0 20px 4px rgba(19, 185, 178, 0.13); }
  50%      { box-shadow: 0 0 32px 8px rgba(19, 185, 178, 0.22); }
}
.tab .count {
  background: rgba(10, 10, 10, 0.05);
  color: var(--ink-soft);
  padding: 1px 8px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-display);
}
.tab.active .count {
  background: rgba(19, 185, 178, 0.15);
  color: var(--accent-ink);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ============ Section head (single-view switcher) ============ */
.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.section-head-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  margin: 0;
  letter-spacing: -0.3px;
  flex: 1;
}
.section-browse, .section-back {
  background: var(--ink);
  color: #fff;
  border: 0;
  padding: 10px 20px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, transform .15s;
  white-space: nowrap;
}
.section-browse:hover, .section-back:hover { background: var(--accent); transform: translateY(-1px); }
.section-back {
  background: #fff;
  color: var(--ink);
  border: 1px solid var(--line-strong);
}
.section-back:hover { background: var(--cream-darker); color: var(--ink); border-color: var(--ink-soft); }
@media (max-width: 640px) {
  .section-head-title { font-size: 17px; }
  .section-browse, .section-back { padding: 9px 16px; font-size: 12px; }
}

.filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.filter-bar .label { font-size: 13px; color: var(--ink-muted); font-weight: 500; }
.filter-pill {
  padding: 8px 16px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--ink-soft);
  font-family: var(--font-body);
}
.filter-pill:hover { border-color: var(--ink-soft); }
.filter-pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.campaigns-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

.campaign-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.campaign-card:hover { transform: translateY(-3px); border-color: var(--ink-soft); }
.campaign-card .top { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
.brand-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-muted); }
.brand-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--cream-darker);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600; font-size: 11px;
  color: var(--ink-soft);
}
.budget-tag { background: var(--cream-darker); padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; color: var(--ink); }

.campaign-card h3 { font-family: var(--font-display); font-size: 19px; font-weight: 600; line-height: 1.3; letter-spacing: 0; }

.campaign-card .desc {
  font-size: 14px; color: var(--ink-soft); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.meta-row { display: flex; gap: 12px; flex-wrap: wrap; }
.meta-item { font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; gap: 4px; }

.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--line); }
.tags-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 4px 10px; background: var(--cream-darker); border-radius: 100px; color: var(--accent-ink); font-weight: 500; }

.btn-apply {
  background: var(--ink); color: #fff;
  padding: 10px 20px; border: none; border-radius: 100px;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.btn-apply:hover { background: var(--accent); }
.btn-apply.applied { background: var(--cream-darker); color: var(--ink-muted); cursor: not-allowed; }
.btn-apply.chat { background: var(--accent); color: #fff; cursor: pointer; }
.btn-apply.chat:hover { background: var(--accent-ink); }

.empty { text-align: center; padding: 80px 32px; color: var(--ink-muted); }
.empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty h3 { font-family: var(--font-display); font-size: 20px; color: var(--ink); margin-bottom: 8px; }

.applications-list { display: flex; flex-direction: column; gap: 16px; }
.application-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
}
.app-info h4 { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.app-info .meta { font-size: 13px; color: var(--ink-muted); }
.app-status { padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 500; }
.status-pending { background: rgba(10, 10, 10, 0.06); color: var(--ink-muted); }
.status-pending_approval { background: rgba(19, 185, 178, 0.10); color: #0c4f4b; }
.status-active { background: rgba(19, 185, 178, 0.14); color: var(--accent-ink); }
.status-closed { background: var(--ink); color: #fff; }
.status-rejected { background: var(--cream-darker); color: var(--ink-muted); }
.stage-badge { white-space: nowrap; }
.stage-badge.mine { background: var(--accent); color: #fff; }
.stage-badge.waiting { background: rgba(10,10,10,0.05); color: var(--ink-muted); }

/* ============ Accordion offer cards (مختصرة + توسّع) ============ */
.applications-list { gap: 12px; }
.unified-list { display: flex; flex-direction: column; gap: 12px; }
.deal-card { background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden; }
.dc-head { padding:13px 15px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line); }
.dc-av { width:34px;height:34px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:inline-flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0; }
.dc-main { flex:1; min-width:0; }
.dc-title { font-weight:600; font-size:15px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dc-sub { font-size:12px; color:var(--ink-muted); }
.dc-badge { font-size:11px; padding:4px 10px; border-radius:100px; white-space:nowrap; }
.dc-badge.mine { background:var(--accent); color:#fff; }
.dc-badge.wait, .dc-badge.neutral { background:var(--line); color:var(--ink-muted); }
.dc-badge.done { background:#E1F5EE; color:#0F6E56; font-weight:600; }
.dc-badge.amber { background:#FBF3E2; color:#854F0B; }
.dc-badge.success { background:#E1F5EE; color:#0F6E56; font-weight:600; }
.dc-badge.full { background:var(--line); color:var(--ink-soft); font-weight:600; }
.dc-note.full { background:var(--cream-darker); color:var(--ink-soft); }
.ac-card.campaign-full { background:var(--cream-darker); }
.ac-card.campaign-full .ac-title { color:var(--ink-soft); }
.full-badge { background:var(--line); color:var(--ink-muted); font-size:12px; font-weight:600; padding:7px 14px; border-radius:100px; white-space:nowrap; }
.deal-card.completed { background:var(--cream-darker); border-color:var(--line-strong); }
.deal-card.completed .dc-head { border-bottom-color:var(--line-strong); }
.deal-card.completed .dc-title { color:var(--ink-soft); }
.dc-done-banner { display:flex; align-items:center; gap:8px; margin:0 14px 14px; padding:11px 13px; border-radius:11px;
  background:#E1F5EE; color:#0F6E56; font-size:13px; font-weight:600; }
.dc-strip { display:flex; gap:4px; padding:12px 14px 4px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.dc-step { flex:1; min-width:32px; text-align:center; }
.dc-box { height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; }
.dc-box.done { background:#CDEEDF; color:#0F6E56; }
.dc-box.final { background:#1D9E75; color:#fff; }
.dc-box.act { background:var(--accent); color:#fff; font-size:12px; }
.dc-box.wait { background:#FBF3E2; color:#854F0B; }
.dc-box.future { background:#f1f1ee; color:#cfcfca; }
.dc-lbl { font-size:9px; color:var(--ink-muted); margin-top:3px; white-space:nowrap; }
.dc-lbl.on { color:#0c4f4b; font-weight:600; }
.dc-action { padding:4px 14px 14px; }
.dc-note { padding:14px; font-size:13px; color:var(--ink-soft); }
.dc-note.amber { color:#854F0B; }
.mx-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
.mx-table { border-collapse: collapse; font-size: 12px; min-width: 800px; width: 100%; }
.mx-table th, .mx-table td { border: 1px solid var(--line); padding: 0; text-align: center; white-space: nowrap; }
.mx-table thead th { background: #eaf5f4; color: #0c4f4b; font-weight: 600; font-size: 11px; padding: 7px 4px; }
.mx-idx { color: var(--ink-muted); width: 30px; text-align: center; }
.mx-name { text-align: right; padding: 8px 10px; min-width: 150px; }
.mx-cell { width: 64px; height: 44px; }
.mx-cell.click { cursor: pointer; }
.mx-in { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.mx-done { background: #CDEEDF; color: #0F6E56; }
.mx-final { background: #1D9E75; color: #fff; }
.mx-act { background: var(--accent); color: #fff; font-size: 13px; }
.mx-wait { background: #FBF3E2; color: #854F0B; }
.mx-future { color: #cfcfca; }
.mx-cell.click:hover .mx-in { filter: brightness(0.96); }
.mx-av { width: 26px; height: 26px; border-radius: 50%; background: #E1F5EE; color: #0F6E56; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.mx-detail > td { padding: 0; background: rgba(19,185,178,0.03); }
.mx-detail .ac-body { border-top: none; }
.ac-applybtn {
  background: var(--ink); color: #fff; border: 0;
  padding: 9px 18px; border-radius: 100px;
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  transition: background .2s, transform .15s;
}
.ac-applybtn:hover { background: var(--accent); transform: translateY(-1px); }
.ac-metarow {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 0 16px 14px;
  margin-top: -4px;
}
.ac-metarow .meta-item { font-size: 12px; color: var(--ink-muted); }
.ac-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .25s;
}
.ac-card.open { border-color: rgba(19,185,178,0.45); box-shadow: 0 0 0 3px rgba(19,185,178,0.07); }
.ac-card.no-expand .ac-head { cursor: default; }
.ac-head {
  width: 100%;
  background: transparent;
  border: 0;
  cursor: pointer;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 14px 16px;
  text-align: right;
  font-family: var(--font-body);
}
.ac-avatar {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(19,185,178,0.12);
  color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600; font-size: 16px;
  flex-shrink: 0;
}
.ac-main { min-width: 0; }
.ac-title {
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ac-brand { font-size: 12px; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-side { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
.ac-price {
  font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--accent);
  white-space: nowrap; display: flex; flex-direction: column; line-height: 1.15;
}
.ac-price-lbl { font-family: var(--font-body); font-size: 10px; font-weight: 400; color: var(--ink-faint); }
.ac-chatbtn {
  display: inline-flex; align-items: center;
  background: var(--accent); color: #fff;
  padding: 6px 13px; border-radius: 100px;
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  white-space: nowrap; cursor: pointer;
  transition: background .2s, transform .15s;
}
.ac-chatbtn:hover { background: var(--accent-ink); transform: translateY(-1px); }
.ac-chev { color: var(--ink-muted); font-size: 13px; transition: transform .25s; flex-shrink: 0; }
.ac-card.open .ac-chev { transform: rotate(180deg); }
.ac-miniwrap {
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px 12px;
}
.mini-prog { flex: 1; height: 5px; background: rgba(19,185,178,0.12); border-radius: 100px; overflow: hidden; }
.mini-prog-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width .5s cubic-bezier(0.22,1,0.36,1); }
.mini-prog-txt { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--accent-ink); white-space: nowrap; }
.ac-body {
  padding: 4px 16px 16px;
  border-top: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 10px;
  animation: acIn .2s ease-out;
}
@keyframes acIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.ac-body .wf-card,
.ac-body .stage-history,
.ac-body .stage-action { margin-top: 0; }
.ac-nego { display: flex; flex-direction: column; gap: 12px; padding-top: 6px; }
.ac-nego-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.6; margin: 0; }
.ac-nego-btn {
  align-self: flex-start;
  background: var(--accent); color: #fff; border: 0;
  padding: 10px 20px; border-radius: 100px;
  font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background .2s, transform .15s;
}
.ac-nego-btn:hover { background: var(--accent-ink); transform: translateY(-1px); }
@media (max-width: 480px) {
  .ac-head { grid-template-columns: auto 1fr auto; gap: 10px; }
  .ac-chev { display: none; }
}

/* ============ Approval gate (deal waiting for brand confirmation) ============ */
.approval-gate {
  margin-top: 8px;
  background: rgba(19, 185, 178, 0.04);
  border: 1px solid rgba(19, 185, 178, 0.28);
  border-radius: 14px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.ag-info { flex: 1; min-width: 200px; }
.ag-price { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.ag-price .num { color: var(--accent); font-size: 16px; }
.ag-desc { font-size: 12px; color: var(--ink-soft); line-height: 1.6; }

/* ============ Payment pledge note (تعهّد الدفع — يظهر للمعلن) ============ */
.pay-pledge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--accent-ink);
  background: rgba(19, 185, 178, 0.10);
  border: 1px solid rgba(19, 185, 178, 0.28);
  border-radius: 100px;
  padding: 4px 12px;
}

/* ============ Payment tracking card (بعد إكمال الحملة) ============ */
.pay-deadline {
  font-size: 12px;
  color: var(--ink-muted);
  margin-top: 8px;
}
.pay-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}
.pay-btn-ghost {
  background: #fff;
  color: var(--ink-soft);
  border: 1px solid var(--line-strong);
  padding: 11px 20px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.pay-btn-ghost:hover { border-color: #c93030; color: #c93030; }

/* ============ Workflow progress strip ============ */
.workflow-strip {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 22px 18px 18px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  margin-top: 8px;
  position: relative;
  gap: 4px;
}
.ws-step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  min-width: 0;
}
.ws-step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 17px;
  right: 50%;
  width: 100%;
  height: 2px;
  background: var(--line-strong);
  z-index: 0;
}
.ws-step.done::after { background: var(--accent); }
.ws-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--cream-darker);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-faint);
  position: relative;
  z-index: 1;
  transition: all 0.25s;
  border: 1.5px solid var(--line-strong);
  font-family: var(--font-display);
}
.ws-step.done .ws-circle {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.ws-step.current .ws-circle {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
  box-shadow: 0 0 0 4px rgba(10, 10, 10, 0.08);
}
.ws-label {
  font-size: 12px;
  color: var(--ink-muted);
  margin-top: 10px;
  white-space: nowrap;
  font-family: var(--font-body);
  text-align: center;
}
.ws-step.done .ws-label,
.ws-step.current .ws-label {
  color: var(--ink);
  font-weight: 500;
}

/* ============ Workflow progress (الخيار ١: حلقة + شريط رفيع) ============ */
.wf-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px 20px;
  margin-top: 12px;
}
.wf-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 14px;
}
.wf-counter { font-size: 12px; color: var(--ink-muted); margin-bottom: 3px; }
.wf-stage { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--ink); letter-spacing: -0.2px; }
.wf-ring {
  --p: 0;
  width: 52px; height: 52px;
  border-radius: 50%;
  flex-shrink: 0;
  background: conic-gradient(var(--accent) calc(var(--p) * 1%), rgba(19,185,178,0.15) 0);
  display: flex; align-items: center; justify-content: center;
}
.wf-ring span {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 600;
  color: var(--accent-ink);
}
.wf-bar {
  height: 7px;
  background: rgba(19,185,178,0.12);
  border-radius: 100px;
  overflow: hidden;
}
.wf-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 100px;
  transition: width .5s cubic-bezier(0.22,1,0.36,1);
}
.wf-ends {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 7px;
}

/* ============ Stage action card ============ */
.stage-action {
  margin-top: 10px;
  padding: 18px 20px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid var(--line);
}
.stage-action.mine {
  background: rgba(19, 185, 178, 0.05);
  border-color: rgba(19, 185, 178, 0.30);
}
.stage-action.waiting { background: var(--cream-darker); }
.stage-action.complete {
  background: rgba(19, 185, 178, 0.08);
  border-color: rgba(19, 185, 178, 0.35);
}
.sa-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--ink);
}
.sa-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.65;
  margin-bottom: 0;
}
.stage-action.mine .sa-desc { margin-bottom: 14px; }
.sa-btn {
  background: var(--ink);
  color: #fff;
  border: 0;
  padding: 11px 22px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.sa-btn:hover { background: var(--accent); transform: translateY(-1px); }

/* Form inside action card */
.sa-form { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
.sa-field { display: flex; flex-direction: column; gap: 6px; }
.sa-field label { font-size: 12px; color: var(--ink-soft); font-weight: 500; }
.sa-field input, .sa-field textarea {
  padding: 10px 12px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  background: #fff;
  color: var(--ink);
  width: 100%;
}
.sa-field input:focus, .sa-field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(19, 185, 178, 0.14);
}
.sa-field textarea { resize: vertical; min-height: 60px; }
.sa-form .sa-btn { align-self: flex-start; margin-top: 4px; }

/* Stage history (قابل للطيّ) */
.stage-history {
  margin-top: 10px;
  padding: 6px 18px 14px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid var(--line);
}
.hist-toggle {
  width: 100%;
  background: transparent;
  border: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  text-align: right;
}
.hist-ic::before { content: '✓'; color: var(--accent); margin-left: 6px; font-weight: 700; }
.hist-chev { transition: transform .25s; color: var(--ink-muted); font-size: 12px; }
.stage-history.collapsed .hist-chev { transform: rotate(-90deg); }
.stage-history.collapsed .hist-body { display: none; }
.hist-body { padding-top: 6px; }
.stage-history h4 {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--ink-soft);
}
.history-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 9px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--line);
}
.history-item:last-child { border-bottom: 0; padding-bottom: 0; }
.history-item:first-child { padding-top: 0; }
.history-item .hi-tick {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(19,185,178,0.15);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  margin-top: 2px;
  font-weight: 600;
}
.hi-name { font-weight: 600; color: var(--ink); }
.hi-fields { color: var(--ink-soft); font-size: 12px; margin-top: 2px; line-height: 1.6; word-break: break-word; overflow-wrap: anywhere; }
.hi-fields a { color: var(--accent-ink); text-decoration: underline; word-break: break-all; }

/* Brief / long-text field with copy + read more */
.hi-blocks { margin-top: 8px; display: flex; flex-direction: column; gap: 12px; }
.brief-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 6px;
}
.brief-header strong { font-size: 12px; color: var(--ink); font-weight: 600; }
.brief-copy {
  background: transparent;
  border: 1px solid var(--line-strong);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--ink-soft);
  cursor: pointer;
  font-family: var(--font-body);
  transition: background .15s, color .15s, border-color .15s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.brief-copy:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.brief-content {
  background: var(--cream-darker);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.brief-content.truncated {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 3;
  overflow: hidden;
}
.brief-content.expanded {
  display: block;
  -webkit-line-clamp: unset;
  overflow: visible;
}
.brief-toggle {
  background: transparent;
  border: 0;
  color: var(--accent-ink);
  font-size: 12px;
  cursor: pointer;
  padding: 6px 0 0;
  font-family: var(--font-body);
  font-weight: 500;
}
.brief-toggle:hover { color: var(--accent); }

/* زر البريف السريع تحت اسم الحملة + مودال عرض البريف */
.brief-pill {
  margin-top: 7px; display: inline-flex; align-items: center; gap: 5px;
  background: var(--accent); color: #fff; border: 0; border-radius: 100px;
  padding: 5px 14px; font-family: var(--font-display); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: filter .15s, transform .15s;
}
.brief-pill:hover { filter: brightness(.95); transform: translateY(-1px); }
.brief-modal {
  position: fixed; inset: 0; background: rgba(10, 10, 10, .55); backdrop-filter: blur(4px);
  display: none; align-items: flex-end; justify-content: center; z-index: 3000;
}
.brief-modal.show { display: flex; }
.brief-modal-card {
  background: #fff; width: 100%; max-width: 560px; max-height: 85vh;
  border-radius: 20px 20px 0 0; display: flex; flex-direction: column; animation: briefRise .25s ease;
}
@keyframes briefRise { from { transform: translateY(20px); opacity: 0 } to { transform: none; opacity: 1 } }
.brief-modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px; border-bottom: 1px solid var(--line);
}
.brief-modal-head strong { font-size: 16px; font-weight: 600; color: var(--ink); font-family: var(--font-display); }
.brief-modal-x {
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--line);
  background: #fff; font-size: 18px; color: var(--ink-muted); cursor: pointer; flex-shrink: 0;
}
.brief-modal-x:hover { border-color: var(--ink); color: var(--ink); }
.brief-modal-body {
  padding: 18px 20px; overflow-y: auto; flex: 1; white-space: pre-wrap;
  line-height: 1.9; font-size: 14.5px; color: var(--ink);
}
.brief-modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); }
.brief-modal-copy {
  width: 100%; justify-content: center; display: inline-flex; align-items: center; gap: 7px;
  background: var(--accent); color: #fff; border: 0; border-radius: 12px; padding: 13px;
  font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer;
}
.brief-modal-copy:hover { filter: brightness(.96); }
@media (min-width: 560px) { .brief-modal { align-items: center; } .brief-modal-card { border-radius: 20px; } }
@media (max-width: 640px) {
  .workflow-strip { padding: 18px 8px 14px; gap: 2px; }
  .ws-circle { width: 28px; height: 28px; font-size: 12px; }
  .ws-step:not(:last-child)::after { top: 13px; }
  .ws-label { font-size: 10px; margin-top: 6px; }
}

.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(10, 10, 10, 0.5);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal-backdrop.show { display: flex; }

/* ============ Toast (إشعار لطيف يختفي تلقائياً) ============ */
.toast-wrap {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 2000; display: flex; flex-direction: column; gap: 10px;
  width: max-content; max-width: calc(100vw - 32px); pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 10px;
  background: #fff; color: var(--ink);
  border: 1px solid var(--line); border-right: 4px solid var(--accent);
  border-radius: 14px; padding: 13px 18px;
  font-family: var(--font-body); font-size: 14px; font-weight: 500; line-height: 1.5;
  box-shadow: 0 14px 36px -12px rgba(10,10,10,0.28);
  pointer-events: auto; opacity: 0; transform: translateY(-12px);
  transition: opacity .28s cubic-bezier(0.22,1,0.36,1), transform .28s cubic-bezier(0.22,1,0.36,1);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-right-color: #c93030; }
.toast .toast-ic {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(19,185,178,0.14); color: var(--accent-ink); font-size: 13px; font-weight: 700;
}
.toast.error .toast-ic { background: rgba(201,48,48,0.12); color: #c93030; }

.modal { background: #fff; border-radius: 24px; padding: 36px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.modal .sub { color: var(--ink-muted); font-size: 14px; margin-bottom: 24px; }
.field { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; }
input, textarea {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--line-strong); border-radius: 10px;
  font-family: var(--font-body); font-size: 14px;
  background: #fff; color: var(--ink);
}
input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(19,185,178,0.14); }
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.btn-secondary { flex: 1; padding: 12px; background: #fff; border: 1px solid var(--line-strong); color: var(--ink); border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary { flex: 1; padding: 12px; background: var(--ink); color: #fff; border: none; border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: var(--accent); }
.btn-primary:disabled { background: var(--ink-faint); cursor: not-allowed; }

@media (max-width: 640px) {
  .container { padding: 0 16px; }
  .campaigns-grid { grid-template-columns: 1fr; }
  .modal { padding: 24px; }
  .hero-title { font-size: 28px; }
  .hero-sub { font-size: 15px; }
  .hero { padding: 40px 16px 36px; }
  .logo-eye { width: 36px; height: 36px; }
  .logo-mark { font-size: 14px; }
  .user-pill .user-name { display: none; }
  .hero-link { display: block; margin: 14px 0 0; }
}
/* ===== كرت ثقة المؤثر ===== */
.mt-card{max-width:560px;margin:0 auto 8px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px 20px;}
.mt-head{display:flex;align-items:center;gap:16px;margin-bottom:6px;}
.mt-rankbig{text-align:center;margin-bottom:12px;}
.mt-rank-local{font-family:var(--font-display);font-size:17px;color:var(--ink);font-weight:600;line-height:1.3;}

<script>
let currentUser = null;
let allCampaigns = [];
let myApplications = [];
let currentFilter = 'all';
let expandedAppId = null;
let campaignApprovedCount = {}; // عدد الصفقات المعتمدة لكل حملة (أفضل جهد — قد تحدّه سياسات الحماية)

const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
const toArabic = n => String(n).split('').map(d => arabicDigits[parseInt(d)] ?? d).join('');

// ====== إشعار لطيف يختفي تلقائياً (بديل alert) ======
function showToast(message, type = 'success', duration = 3500) {
  const wrap = document.getElementById('toast-wrap');
  if (!wrap) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type === 'error' ? 'error' : '');
  toast.innerHTML = `<span class="toast-ic">${type === 'error' ? '!' : '✓'}</span><span>${message}</span>`;
  wrap.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 320);
  }, duration);
}

// ====== خرائط عرض الحقول الجديدة ======
const PUBLISH_TIMING_LABELS = {
  '24h': 'خلال ٢٤ ساعة (مستعجل)',
  '3d': 'خلال ٣ أيام',
  '1w': 'خلال أسبوع',
  '2w': 'خلال أسبوعين',
  'custom': 'تاريخ محدّد'
};
const PLATFORM_LABELS = {
  tiktok: 'تيك توك', snapchat: 'سناب شات', x: 'إكس', instagram: 'انستقرام', youtube: 'يوتيوب'
};
const FOLLOWER_RANGE_LABELS = {
  '20-50k': 'من ٢٠ ألف إلى ٥٠ ألف متابع',
  '50-200k': 'من ٥٠ ألف إلى ٢٠٠ ألف متابع',
  '200-500k': 'من ٢٠٠ ألف إلى ٥٠٠ ألف متابع',
  '500k+': 'أكثر من ٥٠٠ ألف متابع',
  '10000': 'من ١٠ آلاف إلى ٢٠ ألف متابع',
  '20000': 'من ٢٠ ألف إلى ٥٠ ألف متابع',
  '50000': 'من ٥٠ ألف إلى ١٠٠ ألف متابع',
  '100000': 'من ١٠٠ ألف إلى ٢٠٠ ألف متابع',
  '200000': 'من ٢٠٠ ألف إلى ٣٠٠ ألف متابع',
  '300000': 'من ٣٠٠ ألف إلى ٥٠٠ ألف متابع',
  '500000': 'من ٥٠٠ ألف إلى ٧٠٠ ألف متابع',
  '700000': 'من ٧٠٠ ألف إلى مليون متابع',
  '1000000': 'من مليون إلى مليونين',
  '2000000': 'فوق ٢ مليون',
  '3000000': 'فوق ٣ مليون',
  '4000000': 'فوق ٤ مليون'
};
const CITY_LABELS = { riyadh: 'الرياض', jeddah: 'جدة', dammam: 'الدمام', all: 'كل المناطق' };
function publishTimingText(c) {
  if (!c) return '';
  if (c.publish_timing === 'custom' && c.publish_date) {
    try { return 'بتاريخ ' + new Date(c.publish_date).toLocaleDateString('ar-SA'); }
    catch (e) { return c.publish_date; }
  }
  return PUBLISH_TIMING_LABELS[c.publish_timing] || c.publish_timing || '';
}
function followerRangeText(c) {
  if (!c || !c.follower_range) return '';
  return String(c.follower_range).split(',').map(s => s.trim()).filter(Boolean)
    .map(v => FOLLOWER_RANGE_LABELS[v] || v).join('، ');
}

// ====== تعهّد الدفع: نص يظهر للمعلن (نطاق أيام الدفع بعد إكمال الحملة) ======
function paymentPledgeText(c) {
  if (!c) return '';
  const mn = parseInt(c.payment_min_days, 10);
  const mx = parseInt(c.payment_max_days, 10);
  const hasMn = !isNaN(mn) && mn > 0;
  const hasMx = !isNaN(mx) && mx > 0;
  if (!hasMn && !hasMx) return '';
  if (hasMn && hasMx && mn !== mx) {
    return `الدفع خلال ${toArabic(mn)}–${toArabic(mx)} يوم بعد إكمال الحملة`;
  }
  const d = hasMx ? mx : mn;
  return `الدفع خلال ${toArabic(d)} يوم بعد إكمال الحملة`;
}

// نص الـ pill يعتمد على عدد العروض المقدّمة (غير المرفوضة):
// لا يظهر "لا يوجد لديك عروض حالياً" إلا إذا كان العدد صفر فعلاً.
function offersWaitingLabel(n) {
  if (n === 0) return 'لا يوجد لديك عروض حالياً';
  if (n === 1) return 'لديك عرض بانتظارك';
  return `لديك ${toArabic(n)} عروض بانتظارك`;
}

function goToList() {
  document.getElementById('app-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function startNegotiation(applicationId) {
  window.location.href = '/campaign.html?app=' + applicationId;
}

// ===== كرت ثقة المؤثر: نفس منطق صفحة النخبة =====
var MT_PS=4, MT_RR=6;
function mtHash(id){ var h=0,s=String(id||''); for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function mtSeedScore(id){ return 82+(mtHash(id)%14); }
function mtFollowerBonus(f){ f=parseInt(f)||0; if(f<=0) return 0; return Math.max(0,Math.min(5,Math.log10(f+1)-3)); }
function mtSeedRating(id){ return 4.3+(mtHash(id+'r')%7)/10; }
function mtDisplayRating(c){ var r=Number(c.ratings_count)||0, a=Number(c.avg_rating)||0, s=mtSeedRating(c.id); return (MT_PS*s+a*r)/(MT_PS+r); }
function mtTrustScore(c){ var seed=mtSeedScore(c.id)+mtFollowerBonus(c.followers); var r=Number(c.ratings_count)||0; var rs=(mtDisplayRating(c)/5)*100; var w=r/(r+MT_RR); var db=Math.min(Number(c.deals_count)||0,20)*0.4; return Math.max(0,Math.min(100,(1-w)*seed+w*rs+db)); }
function mtStars(c){ var r=Number(c.ratings_count)||0, dr=mtDisplayRating(c), full=Math.round(dr); var s=''; for(var i=1;i<=5;i++) s+='<span class="cstar'+(i<=full?' on':'')+'">★</span>'; var tail=r>0?('<span class="cstar-c">('+r+' تقييم)</span>'):''; return '<span class="cstars">'+s+'</span><span class="cstar-v">'+dr.toFixed(1)+'</span>'+tail; }
function mtCritSeed(id,key){ return 4.2+(mtHash(key+':'+id)%8)/10; }
function mtCritBars(c){ var r=Number(c.ratings_count)||0; var crits=[['جودة المحتوى','content',c.avg_content],['الالتزام بالمواعيد','punct',c.avg_punctuality],['التواصل والاحترافية','comm',c.avg_communication],['النتائج والتفاعل','res',c.avg_results]]; return crits.map(function(it){ var seed=mtCritSeed(c.id,it[1]); var real=Number(it[2])||0; var v=r>0?(MT_PS*seed+real*r)/(MT_PS+r):seed; var pct=Math.max(0,Math.min(100,(v/5)*100)); return '<div class="cbar-row"><span class="cbar-label">'+it[0]+'</span><span class="cbar-track"><span class="cbar-fill" style="width:'+pct+'%"></span></span><span class="cbar-val">'+v.toFixed(1)+'</span></div>'; }).join(''); }

// ===== ترتيب موحّد مع صفحة النخبة top.html (نفس الخوارزمية والمصدر: simbl_creator_performance) =====
var MT2_PRIOR_MEAN=4.4, MT2_PRIOR_STRENGTH=4, MT2_MAX_ACH=0;
function mt2Hash(id){ var h=0,s=String(id||''); for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function mt2SeedRating(id){ return 4.3+(mt2Hash(id+'r')%7)/10; }
function mt2DisplayRating(c){ var r=Number(c.ratings_count)||0, a=Number(c.avg_rating)||0, s=mt2SeedRating(c.id); return (MT2_PRIOR_STRENGTH*s+a*r)/(MT2_PRIOR_STRENGTH+r); }
function mt2FollowerBonus(f){ f=parseInt(f)||0; if(f<=0) return 0; return Math.max(0,Math.min(5,Math.log10(f+1)-3)); }
function mt2PerfTier(c){ if((Number(c.completed_deals)||0)>0) return 2; if((Number(c.active_deals)||0)>0) return 1; return 0; }
function mt2TrustScore(c){
  var tier=mt2PerfTier(c);
  if(tier===2){ var norm=MT2_MAX_ACH>0?(Number(c.achievement)||0)/MT2_MAX_ACH:0; var s=72+28*Math.pow(Math.max(0,Math.min(1,norm)),0.6); if((Number(c.ratings_count)||0)>0){ s+=(mt2DisplayRating(c)-MT2_PRIOR_MEAN)*2; } return Math.max(70,Math.min(100,s)); }
  if(tier===1){ return 56+Math.min(Number(c.active_deals)||0,3)*3.3; }
  return 40+mt2FollowerBonus(c.followers)*2.8;
}
function mt2Sort(a,b){
  return (b.tier-a.tier)
    || ((Number(b.achievement)||0)-(Number(a.achievement)||0))
    || ((Number(b.completed_deals)||0)-(Number(a.completed_deals)||0))
    || (((a.avg_hours==null?1e12:a.avg_hours))-((b.avg_hours==null?1e12:b.avg_hours)))
    || ((Number(b.active_deals)||0)-(Number(a.active_deals)||0))
    || (b.score-a.score)
    || ((parseInt(b.followers)||0)-(parseInt(a.followers)||0));
}

async function loadMyTrust(){
  var box=document.getElementById('my-trust'); if(!box||!currentUser) return;
  try{
    var rr=await Promise.all([
      supabaseClient.from('creator_directory').select('id, followers'),
      supabaseClient.from('creator_trust').select('creator_id, deals_count, ratings_count, avg_rating, avg_content, avg_punctuality, avg_communication, avg_results'),
      supabaseClient.from('simbl_creator_performance').select('creator_id, completed_deals, active_deals, avg_hours, speed_points, achievement')
    ]);
    var dir=(rr[0]&&rr[0].data)||[]; var tr=(rr[1]&&rr[1].data)||[]; var pf=(rr[2]&&!rr[2].error&&rr[2].data)||[];
    var tmap={}; tr.forEach(function(t){ tmap[t.creator_id]=t; });
    var pmap={}; pf.forEach(function(p){ pmap[p.creator_id]=p; });
    function mt2Hydrate(c){
      var t=tmap[c.id]||{};
      c.ratings_count=Number(t.ratings_count)||0; c.avg_rating=Number(t.avg_rating)||0; c.deals_count=Number(t.deals_count)||0;
      c.avg_content=Number(t.avg_content)||0; c.avg_punctuality=Number(t.avg_punctuality)||0; c.avg_communication=Number(t.avg_communication)||0; c.avg_results=Number(t.avg_results)||0;
      var p=pmap[c.id]||{};
      c.completed_deals=Number(p.completed_deals)||0; c.active_deals=Number(p.active_deals)||0;
      c.avg_hours=(p.avg_hours==null)?null:Number(p.avg_hours); c.speed_points=Number(p.speed_points)||0; c.achievement=Number(p.achievement)||0;
    }
    dir.forEach(mt2Hydrate);
    var inDir=false; for(var k=0;k<dir.length;k++){ if(dir[k].id===currentUser.id){ inDir=true; break; } }
    if(!inDir){ var meRow={id:currentUser.id, followers:currentUser.followers}; mt2Hydrate(meRow); dir.push(meRow); }
    // أعلى إنجاز لتطبيع درجات المكمّلين — ثم الدرجة والترتيب بنفس منطق صفحة النخبة تمامًا
    MT2_MAX_ACH=dir.reduce(function(m,c){ return Math.max(m, Number(c.achievement)||0); },0);
    dir.forEach(function(c){ c.tier=mt2PerfTier(c); c.score=mt2TrustScore(c); });
    dir.sort(mt2Sort);
    var me=null, rank=0; for(var i=0;i<dir.length;i++){ if(dir[i].id===currentUser.id){ me=dir[i]; rank=i+1; break; } }
    if(!me){ box.innerHTML=''; return; }
    var total=dir.length;
    var regional = rank; // الشرق الأوسط حاليًا = نفس الترتيب المحلي (كل المؤثرين من السعودية)، ويتوسّع مع انضمام دول أخرى
    box.innerHTML='<div class="mt-card">'
      + '<div class="mt-rankbig">'
      +   '<div class="mt-rank-local">أنت رقم <b>'+toArabic(rank)+'</b><span>في التصنيف المحلي</span></div>'
      +   '<div class="mt-rank-region">ورقم <b>'+toArabic(regional)+'</b> في تصنيف الشرق الأوسط</div>'
      + '</div>'
      + '<div class="mt-sub"><span class="mt-stars">'+mtStars(me)+'</span><span class="mt-score-inline">درجة الثقة '+toArabic(Math.round(me.score))+'/١٠٠</span></div>'

function shareMyKit(){
  if(!currentUser) return;
  var h = currentUser.handle ? String(currentUser.handle).replace(/^@/,'') : '';
  var q = h ? ('u='+encodeURIComponent(h)) : ('id='+encodeURIComponent(currentUser.id));
  var url = location.origin + '/c.html?' + q;
  if(navigator.share){ navigator.share({title:'ملفي على سيمبل', text:'شوف ملفي وترتيبي على سيمبل', url:url}).catch(function(){}); return; }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){ kitToast('✓ تم نسخ رابط ملفك'); }).catch(function(){ kitToast(url); });
  } else { kitToast(url); }
}
function kitToast(msg){
  var t=document.getElementById('kit-toast');
  if(!t){ t=document.createElement('div'); t.id='kit-toast'; document.body.appendChild(t); }
  t.textContent=msg; t.className='show';
  clearTimeout(window._ktt); window._ktt=setTimeout(function(){ t.className=''; },2400);
}

async function loadData() {
  const box = document.getElementById('unified-list');
  box.innerHTML = '<div class="loading-wrap"><div class="loading-pill"><span class="loading-pill-dot"></span>جاري تحميل الإعلانات...</div></div>';
  // إعادة محاولة حتى ٣ مرات مع تراجع تدريجي (يعالج اختفاء الحملة عند الفتح البارد على شبكة الجوال)
  const backoff = [600, 1200, 2000];
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      [allCampaigns, myApplications] = await Promise.all([
        dbGetCampaigns(),
        dbGetMyApplications(currentUser.id)
      ]);
      await loadCampaignApprovedCounts();
      updateHeroStats();
      renderUnified();
      _lastLoadAt = Date.now();
      return; // نجح — نخرج
    } catch (err) {
      console.error('loadData attempt ' + (attempt + 1) + ' failed:', err);
      if (attempt < 2) await new Promise(r => setTimeout(r, backoff[attempt]));
    }
  }
  // فشل بعد كل المحاولات → زر إعادة محاولة بدل رسالة ميتة (ما نطالبه يسجّل خروج ودخول)
  box.innerHTML = '<div style="text-align:center; padding:60px 20px; color:var(--ink-soft)">'

    + '</div>';
}

// ====== اكتمال الحملة: إخفاء الحملات المكتملة ومنع الدخول ======
// يُحسب ضمن العدد: الصفقة المقفلة والمعتمدة من الشركة فقط
async function loadCampaignApprovedCounts() {
  campaignApprovedCount = {};
  try {
    const ids = (allCampaigns || []).map(c => c.id);
    if (!ids.length) return;
    // أفضل جهد: قد تحدّ سياسات الحماية (RLS) رؤية عروض الآخرين — وفي هذه الحالة نعتمد على حالة الحملة (status)
    const { data, error } = await supabaseClient
      .from('applications')
      .select('campaign_id')
      .eq('status', 'closed')
      .eq('brand_approved', true)
      .in('campaign_id', ids);
    if (error) return;
    (data || []).forEach(a => {
      campaignApprovedCount[a.campaign_id] = (campaignApprovedCount[a.campaign_id] || 0) + 1;
    });
  } catch (e) { /* صامت — نعتمد على status */ }
}

function campaignTargetSize(c) {
  const n = parseInt(c && c.campaign_size, 10);
  return (!isNaN(n) && n > 0) ? n : 0;
}
// الحملة مكتملة لو: الشركة أقفلتها (status) أو وصل عدد المعتمدين للحد (لو كان مقروءًا)
function campaignIsFull(c) {
  if (!c) return false;
  if (c.status === 'closed' || c.status === 'completed') return true;
  const target = campaignTargetSize(c);
  if (!target) return false;
  return (campaignApprovedCount[c.id] || 0) >= target;
}
// عرض متوقف/منتهٍ لا يظهر للمعلن (مرفوض يدويًا أو متوقف لاكتمال الحملة)
function isDeadApp(a) {
  return !a || a.status === 'rejected' || a.status === 'campaign_full';
}

function updateHeroStats() {
  const activeApps = myApplications.filter(a => !isDeadApp(a)).length;
  const hs = document.getElementById('hero-status'); if (hs) hs.textContent = offersWaitingLabel(activeApps);
  const hc = document.getElementById('hero-app-count'); if (hc) hc.textContent = toArabic(activeApps);
}

// مراحل مرئية (نتخطّى البريف=4). الزيارة تعرض 5 فقط.
const HOME_FLOW = [{s:1,n:'العنوان'},{s:2,n:'الشحن'},{s:3,n:'الاستلام'},{s:5,n:'المحتوى'},{s:6,n:'الموافقة'},{s:7,n:'النشر'},{s:8,n:'البنكية'},{s:9,n:'مكتمل'}];
const VISIT_FLOW = [{s:5,n:'بانتظار التصوير'},{s:6,n:'الموافقة'},{s:7,n:'النشر'},{s:8,n:'البنكية'},{s:9,n:'مكتمل'}];
function flowFor(type){ return type === 'visit' ? VISIT_FLOW : HOME_FLOW; }

// بطاقة صفقة مستقلة للمعلن: رأس + شريط المراحل التسع + المرحلة الحالية فقط
function renderCreatorDealCard(c, a) {
  const brandName = c.brand || a.campaigns?.users?.company_name || 'شركة';
  const initial = (c.title || 'ح')[0];
  const isClosed = a.status === 'closed';

  const awaitingApproval = isClosed && !isApproved;
  const isNegotiating = !isClosed;
  const isWaitlisted = a.status === 'waitlisted';
  const campClosed = !!(c && (c.status === 'closed' || c.status === 'completed'));
  const didntWin = campClosed && !isClosed;
  const stageNow = a.stage || 1;
  const price = (a.final_price || a.price || 0);
  const briefText = getBriefText(a);
  const briefBtnHtml = briefText ? `<button class="brief-pill" onclick="event.stopPropagation(); openBriefModal('${a.id}')">📋 البريف</button>` : '';

  let badge;
  const isCompleted = isApproved && stageNow >= 9;
  if (didntWin) {
    badge = `<span class="dc-badge full">اكتمل العدد</span>`;
  } else if (isWaitlisted) {
    badge = `<span class="dc-badge" style="background:#FCE9D2;color:#9A4B06;border:1px solid #F0C79A;">🕓 قائمة الانتظار</span>`;
  } else if (isApproved) {
    if (stageNow >= 9) badge = `<span class="dc-badge success">✓ مكتملة بنجاح</span>`;
    else if (isCreatorTurn(stageNow)) badge = `<span class="dc-badge mine">دورك</span>`;
    else badge = `<span class="dc-badge wait">بانتظار الشركة</span>`;
  } else if (awaitingApproval) {
    badge = `<span class="dc-badge amber">بانتظار التعميد</span>`;
  } else {
    if (a.status === 'pending' && a.pending_since && Date.now() >= new Date(a.pending_since).getTime() + 15 * 60000) {
      badge = `<span class="dc-badge" style="background:#FDECEA;color:#a93226;border:1px solid #f0b4b4;">⌛ انتهت المهلة</span>`;
    } else if (a.status === 'pending' && a.pending_since) {
      badge = `<span class="dc-badge" style="background:#E8850C;color:#fff;cursor:pointer;" onclick="event.stopPropagation(); startNegotiation('${a.id}')">🔔 دورك الآن — افتح المحادثة</span>`;
    } else {
      badge = `<span class="dc-badge neutral" style="cursor:pointer;" onclick="event.stopPropagation(); startNegotiation('${a.id}')">💬 قيد التفاوض — افتح المحادثة</span>`;
    }
  }

  let body = '';
  if (didntWin) {
    body = `<div class="dc-note full">اكتمل العدد المطلوب لهذي الحملة قبل ما يوصل دورك. تابع الحملات الجديدة وقدّم بسرعة — حظ أوفر 🌟</div>`;
  } else if (isWaitlisted) {
    body = `<div class="dc-note" style="background:#FFF6EC;color:#9A4B06;border-right:3px solid #E8850C;">🕓 أنت في قائمة الانتظار لهذي الحملة<span data-wpos="${a.id}"></span>. العدد المطلوب اكتمل حالياً، وبمجرد ما ينفتح مكان بننبّهك فورًا ويبدأ الوكيل يفاوضك. خلّك متابع 🌿</div>`;
  } else if (isApproved) {
    const flow = flowFor(c.campaign_type);
    let strip = '';
    flow.forEach((st) => {
      const s = st.s;
      let cls = 'future', ic = '·';
      if (s < stageNow) { cls = 'done'; ic = '✓'; }
      else if (s === stageNow) {
        if (stageNow >= 9) { cls = 'final'; ic = '✓'; }
        else if (isCreatorTurn(s)) { cls = 'act'; ic = '✎'; }
        else { cls = 'wait'; ic = '⏳'; }
      }
      strip += `<div class="dc-step"><div class="dc-box ${cls}">${ic}</div><div class="dc-lbl${s === stageNow ? ' on' : ''}">${st.n}</div></div>`;
    });
    body = `${isCompleted ? '<div class="dc-done-banner">🎉 تمّت الحملة بنجاح — شكرًا لجهودك!</div>' : ''}<div class="dc-strip">${strip}</div><div class="dc-action">${renderStageAction(a.id, stageNow, 'creator')}</div>`;
  } else if (awaitingApproval) {
    body = `<div class="dc-note amber">⏳ بانتظار الشركة لاعتماد الصفقة وبدء التنفيذ.</div>`;
  } else if (a.status === 'pending' && a.pending_since) {
    const _deadlineMs = new Date(a.pending_since).getTime() + 15 * 60000;
    const _expired = Date.now() >= _deadlineMs;
    if (_expired) {

    } else {
      const _dl = new Date(_deadlineMs).toISOString();
      body = `<div class="dc-note" style="background:#FFF6EC;color:#9A4B06;border-right:3px solid #E8850C;">🔔 <b>جاك دورك!</b> افتح المحادثة وابدأ التفاوض مع الوكيل الآن.<br>باقي لك <span class="cd-timer" data-deadline="${_dl}" style="font-weight:700;">--:--</span> قبل ما يُلغى دورك ويُعطى للتالي في قائمة الانتظار.</div>`

      + `<button class="btn-negotiation" onclick="startNegotiation('${a.id}')" style="margin:0 14px 14px;">💬 عرض المفاوضة</button>`;
  }

  return `
    <div class="deal-card${(isCompleted || didntWin) ? ' completed' : ''}" id="ac-${a.id}">
      <div class="dc-head">
        <span class="dc-av">${escHtml(initial)}</span>
        <div class="dc-main"><div class="dc-title">${escHtml(c.title || 'حملة')}</div><div class="dc-sub">${escHtml(brandName)}${(!isNegotiating) ? ' · ' + price.toLocaleString('ar-SA') + ' ر.س' : ''}</div>${briefBtnHtml}</div>
        ${badge}
      </div>
      ${body}
    </div>`;
}

function renderUnified() {
  const list = document.getElementById('unified-list');
  if (!list) return;
  if (!Array.isArray(allCampaigns)) allCampaigns = [];
  if (!Array.isArray(myApplications)) myApplications = [];

  // ===== صفقاتي: كل التطبيقات (غير مرفوضة) — مستقلة عن التصنيف =====
  const allCampIds = new Set(allCampaigns.map(c => c.id));
  const appliedCampIds = new Set(myApplications.filter(a => !isDeadApp(a)).map(a => a.campaign_id));

  // نعرض تطبيقًا واحدًا فقط لكل حملة (دفاع ضد التكرار) — نبقي الأكثر تقدّمًا
  const appRank = (a) => {
    if (a.status === 'closed' && a.brand_approved === true) return 5;
    if (a.status === 'closed') return 4;
    if (a.status === 'active') return 3;
    if (a.status === 'pending') return 2;
    if (a.status === 'waitlisted') return 1;
    return 0;
  };
  const bestByCampaign = new Map();
  myApplications.forEach(a => {
    if (isDeadApp(a)) return;
    // نجيب بيانات الحملة من القائمة النشطة، وإلا من بيانات الصفقة نفسها (للحملات المكتملة/المقفلة)
    const c = allCampaigns.find(x => x.id === a.campaign_id) || a.campaigns;
    if (!c) return;
    const key = a.campaign_id;
    const prev = bestByCampaign.get(key);
    if (!prev) { bestByCampaign.set(key, { c, myApp: a }); return; }
    const diff = (appRank(a) - appRank(prev.myApp)) ||
                 (new Date(a.created_at || 0) - new Date(prev.myApp.created_at || 0));
    if (diff > 0) bestByCampaign.set(key, { c, myApp: a });
  });
  const appliedItems = Array.from(bestByCampaign.values());

  // ===== عروض متاحة: حسب التصنيف، وما قدّمت عليها =====
  const filtered = currentFilter === 'all'
    ? allCampaigns
    : allCampaigns.filter(c => c.brand_industry === currentFilter);
  const openAll = filtered.filter(c => !appliedCampIds.has(c.id));
  openAll.sort((a, b) => (campaignIsFull(a) ? 1 : 0) - (campaignIsFull(b) ? 1 : 0));
  const openItems = openAll.map(c => ({ c }));

  const myDeals = document.getElementById('my-deals');

  if (appliedItems.length === 0 && openItems.length === 0) {
    if (myDeals) myDeals.innerHTML = '';
    list.innerHTML = `
      <div class="empty">
        <div class="icon">○</div>
        <h3>لا توجد إعلانات</h3>
        <p>لا توجد إعلانات في هذا التصنيف حالياً</p>
      </div>`;
    return;
  }

  let matrixHtml = '';
  if (appliedItems.length > 0) {
    const cardsHtml = appliedItems.map(({ c, myApp }) => {
      try { return renderCreatorDealCard(c, myApp); }
      catch (e) { console.error('deal card render error:', e, c, myApp); return ''; }
    }).join('');
    matrixHtml = `
      <div style="font-size:15px;font-weight:600;color:var(--ink);margin:2px 0 10px;">صفقاتي</div>
      <div style="display:flex;flex-direction:column;gap:12px;">${cardsHtml}</div>`;
  }

  let openHtml = '';
  if (openItems.length > 0) {
    openHtml = openItems.map(({ c }) => {
      try { return renderBrowseCard(c); }
      catch (e) { console.error('browse card render error:', e, c); return ''; }
    }).join('');
  } else {
    openHtml = `<div style="text-align:center;padding:30px;color:var(--ink-muted);font-size:13px;">لا توجد عروض جديدة في هذا التصنيف حاليًا</div>`;
  }

  if (myDeals) myDeals.innerHTML = matrixHtml;
  list.innerHTML = openHtml;
  // بعد رسم النماذج: استرجع أي مسودّات محفوظة + فعّل الحفظ التلقائي
  try { restoreStageDrafts(); } catch (e) { console.warn('restoreStageDrafts:', e); }
  try { refreshWaitPositions(); } catch (e) { /* تجاهل */ }
}

// يعبّئ رقم ترتيب المعلن في قائمة الانتظار (لكل بطاقة انتظار)
async function refreshWaitPositions() {
  const els = document.querySelectorAll('[data-wpos]');
  for (const el of els) {
    const id = el.getAttribute('data-wpos');
    if (!id) continue;
    try {
      const { data, error } = await supabaseClient.rpc('waitlist_position', { p_application_id: id });
      if (!error && data != null) el.textContent = ' — ترتيبك رقم ' + toArabic(data);
    } catch (e) { /* تجاهل بهدوء */ }
  }
}

// مؤقّت تنازلي حيّ لمهلة «جاك دورك» (يحدّث كل ثانية)
if (!window._simblCountdownTick) {
  window._simblCountdownTick = setInterval(function () {
    document.querySelectorAll('.cd-timer').forEach(function (el) {
      const dl = new Date(el.getAttribute('data-deadline')).getTime();
      if (isNaN(dl)) return;
      let ms = dl - Date.now();
      if (ms <= 0) { el.textContent = 'انتهت المهلة'; el.style.color = '#a93226'; return; }
      const m = Math.floor(ms / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      el.textContent = toArabic(m) + ':' + toArabic(String(s).padStart(2, '0'));
    });
  }, 1000);
}

// ============ حفظ مؤقّت لحقول المرحلة (يمنع ضياعها لو المتصفح أعاد تحميل الصفحة) ============
// المشكلة: على الجوال (خصوصًا iOS)، لو المعلن طلع من المنصة (ينسخ كود/رابط) ورجع،
// المتصفح أحيانًا يعيد بناء الصفحة، فيضيع اللي كتبه. الحل: نحفظ كل حقل تلقائيًا في
// localStorage عند الكتابة، ونرجّعه عند إعادة رسم النموذج. يُمسح بعد التأكيد الناجح.
function draftKey(appId) { return 'simbl_stage_draft_' + appId; }

function saveStageDraft(appId) {
  try {
    const form = document.getElementById('stage-form-' + appId);
    if (!form) return;
    const draft = {};
    form.querySelectorAll('input, textarea').forEach(el => {
      // نتجاهل الحقول المخفية الخاصة بالفيديو (تُدار تلقائيًا)
      if (el.type === 'hidden') return;
      if (el.name) draft[el.name] = el.value;
    });
    localStorage.setItem(draftKey(appId), JSON.stringify(draft));
  } catch (e) { /* localStorage غير متاح — نتجاهل بهدوء */ }
}

function restoreStageDrafts() {
  document.querySelectorAll('form[id^="stage-form-"]').forEach(form => {
    const appId = form.id.replace('stage-form-', '');
    let draft = null;
    try {
      const raw = localStorage.getItem(draftKey(appId));
      if (raw) draft = JSON.parse(raw);
    } catch (e) { draft = null; }
    form.querySelectorAll('input, textarea').forEach(el => {
      if (el.type === 'hidden') return;
      // استرجاع القيمة المحفوظة (لو موجودة والحقل فاضٍ حاليًا)
      if (draft && el.name && draft[el.name] && !el.value) {
        el.value = draft[el.name];
      }
      // فعّل الحفظ التلقائي عند كل تعديل (مرّة واحدة لكل حقل)
      if (!el.dataset.draftBound) {
        el.dataset.draftBound = '1';
        el.addEventListener('input', () => saveStageDraft(appId));
      }
    });
  });
}

function clearStageDraft(appId) {
  try { localStorage.removeItem(draftKey(appId)); } catch (e) { /* تجاهل */ }
}

function renderOfferCard(c, a) {
  const brandName = c.brand || a.campaigns?.users?.company_name || 'شركة';
  const brandInitial = brandName[0] || '؟';
  const campaignTitle = c.title || a.campaigns?.title || 'إعلان';
  const isClosed = a.status === 'closed';
  const isApproved = isClosed && a.brand_approved === true;
  const awaitingApproval = isClosed && !isApproved;
  const isNegotiating = !isClosed && !isDeadApp(a);
  const statusLabels = { pending: 'قيد المراجعة', active: 'تفاوض نشط', closed: 'مقفلة', rejected: 'مرفوضة' };
  const statusKey = awaitingApproval ? 'pending_approval' : a.status;
  const statusLabel = awaitingApproval ? '⏳ بانتظار التعميد' : statusLabels[a.status];
  const isExpanded = expandedAppId === a.id;
  const price = (a.final_price && isClosed) ? a.final_price : a.price;
  const priceLabel = (a.final_price && isClosed) ? 'السعر النهائي' : 'عرضك';
  const briefText = getBriefText(a);
  const briefBtnHtml = briefText ? `<button class="brief-pill" onclick="event.stopPropagation(); openBriefModal('${a.id}')">📋 البريف</button>` : '';

  // الشارة على اليمين: تفاوض=زر، بانتظار التعميد=شارة، معمّدة=المطلوب الحالي
  let headRight;
  if (isNegotiating) {
    headRight = `<span class="ac-chatbtn" onclick="event.stopPropagation(); startNegotiation('${a.id}')">💬 المحادثة مع الوكيل</span>`;
  } else if (isApproved) {
    const stg = a.stage || 1;
    const myTurn = isCreatorTurn(stg);
    headRight = `<span class="app-status stage-badge ${myTurn ? 'mine' : 'waiting'}">${creatorStageBadge(stg)}</span>`;
  } else {
    headRight = `<span class="app-status status-${statusKey}">${statusLabel}</span>`;
  }

  let expandedInner = '';
  if (awaitingApproval) {
    expandedInner = `
      <div class="approval-gate" onclick="event.stopPropagation()">
        <div class="ag-info">
          <div class="ag-price">السعر النهائي: <span class="num">${(a.final_price || a.price).toLocaleString('ar-SA')} ر.س</span></div>
          <div class="ag-desc">تم التوصّل لاتفاق، بانتظار تعميد الشركة لبدء التنفيذ.</div>
        </div>
      </div>`;
  } else if (isApproved) {
    expandedInner = renderStageHistory(a.stage_data, a.stage || 1, (a.stage || 1) >= 9)
      + renderStageAction(a.id, a.stage || 1, 'creator');
  }

  const expandable = !isNegotiating;
  return `
    <div class="ac-card applied ${isExpanded ? 'open' : ''} ${expandable ? '' : 'no-expand'}" id="ac-${a.id}">
      <div class="ac-head" ${expandable ? `onclick="toggleAppCard('${a.id}')" style="cursor:pointer;"` : 'style="cursor:default;"'}>
        <div class="ac-avatar">${brandInitial}</div>
        <div class="ac-main">
          <div class="ac-title">${campaignTitle}</div>
          <div class="ac-brand">${brandName}</div>
          ${briefBtnHtml}
        </div>
        <div class="ac-side">
          ${isNegotiating ? '' : `<div class="ac-price"><span class="ac-price-lbl">${priceLabel}</span>${price.toLocaleString('ar-SA')} ر.س</div>`}
          ${headRight}
        </div>
        ${expandable ? '<span class="ac-chev">▾</span>' : ''}
      </div>
      ${isApproved ? `<div class="ac-miniwrap">${miniProgress(a.stage || 1)}</div>` : ''}
      ${(expandable && isExpanded) ? `<div class="ac-body" onclick="event.stopPropagation()">${expandedInner}</div>` : ''}
    </div>
  `;
}

  return `<div class="mini-prog"><div class="mini-prog-fill" style="width:${pct}%"></div></div>
          <span class="mini-prog-txt">${toArabic(stage >= total ? total : stage)}/${toArabic(total)}</span>`;
}

function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderWorkflowStrip(currentStage) {
  const total = WORKFLOW_STAGES.length; // 9
  const isComplete = currentStage >= total;
  const current = WORKFLOW_STAGES.find(s => s.id === currentStage) || WORKFLOW_STAGES[total - 1];
  // النسبة = المراحل المكتملة ÷ الإجمالي (المرحلة الحالية تُحتسب جارية مو مكتملة)
  const doneCount = Math.min(currentStage - 1, total);
  const pct = Math.round((doneCount / total) * 100);
  const stepLabel = isComplete ? 'الصفقة مكتملة' : current.name;
  const stepCounter = isComplete ? `كل المراحل (${toArabic(total)})` : `المرحلة ${toArabic(currentStage)} من ${toArabic(total)}`;
  const ringPct = isComplete ? 100 : pct;
  return `
    <div class="wf-card">
      <div class="wf-top">
        <div class="wf-info">
          <div class="wf-counter">${stepCounter}</div>
          <div class="wf-stage">${stepLabel}</div>
        </div>
        <div class="wf-ring" style="--p:${ringPct}">
          <span>${toArabic(ringPct)}٪</span>
        </div>
      </div>
      <div class="wf-bar"><div class="wf-bar-fill" style="width:${ringPct}%"></div></div>
      <div class="wf-ends">
        <span>${toArabic(doneCount)} مكتملة</span>
        <span>${isComplete ? 'تمّت بنجاح' : 'باقي ' + toArabic(total - doneCount)}</span>
      </div>
    </div>`;
}

function renderStageHistory(stageData, currentStage, expanded) {
  if (!stageData) return '';
  const completedStages = Object.keys(stageData)
    .map(k => parseInt(k))
    .filter(n => n < currentStage)
    .sort((a, b) => a - b);
  if (completedStages.length === 0) return '';

  const items = completedStages.map(stageId => {
    const data = stageData[stageId] || {};
    const stageName = WORKFLOW_STAGES.find(s => s.id === stageId)?.name || '';
    const fields = STAGE_FIELDS[stageId] || [];

    const inlineFields = [];
    const blockFields = [];
    fields.forEach(f => {
      if (data[f.name] !== undefined && data[f.name] !== '') {
        if (f.type === 'textarea' || f.type === 'url') blockFields.push(f);
        else inlineFields.push(f);
      }
    });

    const inlineHtml = inlineFields.map(f => {
      const val = data[f.name];
      return `<div><strong>${f.label}:</strong> ${escHtml(val)}</div>`;
    }).join('');

    const blockHtml = blockFields.map(f => {
      const val = data[f.name];
      const isUrl = f.type === 'url';
      const longText = !isUrl && val.length > 200;
      const cid = 'brf-' + stageId + '-' + f.name + '-' + Math.random().toString(36).slice(2, 8);
      const content = isUrl
        ? `<a href="${escHtml(val)}" target="_blank" rel="noopener">${escHtml(val)}</a>`
        : escHtml(val);
      return `
        <div class="brief-field">
          <div class="brief-header">
            <strong>${f.label}:</strong>
            <button class="brief-copy" onclick="event.stopPropagation(); copyBrief(this)">📋 نسخ</button>
          </div>
          <div class="brief-content${longText ? ' truncated' : ''}" id="${cid}">${content}</div>
          ${longText ? `<button class="brief-toggle" onclick="event.stopPropagation(); toggleBrief('${cid}', this)">قراءة المزيد ↓</button>` : ''}
        </div>
      `;
    }).join('');

    return `
      <div class="history-item">
        <div class="hi-tick">✓</div>
        <div style="min-width:0; flex:1;">
          <div class="hi-name">${toArabic(stageId)}. ${stageName}</div>
          ${inlineHtml ? `<div class="hi-fields">${inlineHtml}</div>` : ''}
          ${blockHtml ? `<div class="hi-blocks">${blockHtml}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  const completedCount = completedStages.length;
  const hid = 'hist-' + Math.random().toString(36).slice(2, 8);
  return `<div class="stage-history ${expanded ? '' : 'collapsed'}" id="${hid}" onclick="event.stopPropagation()">
    <button type="button" class="hist-toggle" onclick="event.stopPropagation(); toggleHistory('${hid}')">
      <span><i class="hist-ic"></i> سجلّ المراحل المكتملة (${toArabic(completedCount)})</span>
      <span class="hist-chev">▾</span>
    </button>
    <div class="hist-body">${items}</div>
  </div>`;
}

// ===== بريف الحملة: زر سريع جنب اسم الحملة يفتح البريف وينسخه =====
function getBriefText(a) {
  if (!a) return '';
  // البريف الحقيقي = وصف الحملة (يُكتب عند إطلاق الحملة في حقل description)
  const c = a.campaigns || {};
  const desc = c.description || c.brief || a.description || '';
  if (desc && String(desc).trim()) return String(desc);
  // احتياط: لو وُجد بريف داخل مراحل التطبيق (نسخ قديمة)
  let sd = a.stage_data;
  if (!sd) return '';
  if (typeof sd === 'string') { try { sd = JSON.parse(sd); } catch (e) { return ''; } }
  if (typeof sd !== 'object') return '';
  const keys = Object.keys(sd).sort();
  for (const k of keys) {
    const entry = sd[k];
    if (entry && typeof entry === 'object' && entry.brief && String(entry.brief).trim()) {
      return String(entry.brief);
    }
  }
  return '';
}
function openBriefModal(appId) {
  const a = (Array.isArray(myApplications) ? myApplications : []).find(x => x.id === appId);
  if (!a) return;
  const text = getBriefText(a);
  if (!text) { kitToast('البريف ما وصل بعد من الشركة'); return; }
  const c = a.campaigns || {};
  document.getElementById('briefModalTitle').textContent = c.title || a.title || 'بريف الحملة';
  document.getElementById('briefModalBody').textContent = text;
  document.getElementById('briefModal').classList.add('show');
}
function closeBriefModal() { document.getElementById('briefModal').classList.remove('show'); }
function copyBriefModal() {
  const text = document.getElementById('briefModalBody').textContent || '';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){ kitToast('✓ تم نسخ البريف'); }).catch(function(){ fallbackCopyBriefModal(text); });
  } else { fallbackCopyBriefModal(text); }
}
function fallbackCopyBriefModal(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); kitToast('✓ تم نسخ البريف'); } catch (e) { kitToast('انسخ البريف يدويًا'); }
  document.body.removeChild(ta);
}

function copyBrief(btn) {
  const wrap = btn.closest('.brief-field');
  if (!wrap) return;
  const content = wrap.querySelector('.brief-content');
  if (!content) return;
  const text = content.textContent;
  const original = btn.innerHTML;
  const done = () => {
    btn.innerHTML = '✓ نُسخ';
    setTimeout(() => { btn.innerHTML = original; }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, onDone) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    onDone && onDone();
  } catch (e) {
    alert('فشل النسخ. انسخ يدويًا.');
  }
}
function toggleBrief(id, btn) {
  const content = document.getElementById(id);
  if (!content) return;
  const isExpanded = content.classList.toggle('expanded');
  content.classList.toggle('truncated', !isExpanded);
  btn.textContent = isExpanded ? 'إخفاء ↑' : 'قراءة المزيد ↓';
}

// آخر موعد للدفع = وقت الإكمال + payment_max_days (لو متوفّرة)
function paymentDeadlineText(app) {
  const c = app && app.campaigns;
  const days = c ? parseInt(c.payment_max_days, 10) : NaN;
  if (!app || !app.completed_at || isNaN(days) || days <= 0) return '';
  const d = new Date(app.completed_at);
  if (isNaN(d.getTime())) return '';
  d.setDate(d.getDate() + days);
  try { return d.toLocaleDateString('ar-SA'); } catch (e) { return ''; }
}

async function submitStageForm(applicationId) {
  const app = myApplications.find(a => a.id === applicationId);
  if (!app) return;
  const oldStage = app.stage || 1;
  let newStage = oldStage + 1;
  // تصحيح مرحلة: لو الشركة طلبت تصحيح هذي المرحلة، بعد ما يصلّحها المعلن نكمل مباشرة (باقي المراحل معبّأة)
  const _fixPending = app.stage_data && app.stage_data[oldStage] && app.stage_data[oldStage]._fix_requested;
  if (_fixPending) newStage = 9;

  // اجمع بيانات النموذج
  const form = document.getElementById(`stage-form-${applicationId}`);
  const fd = new FormData(form);
  const data = {};
  for (const [key, value] of fd.entries()) {
    if (value && value.toString().trim()) data[key] = value.toString().trim();
  }

  // ادمج مع stage_data الحالي
  const existing = (typeof app.stage_data === 'object' && app.stage_data) ? { ...app.stage_data } : {};
  existing[oldStage] = { ...data, _at: new Date().toISOString() };

  const submitBtn = form.querySelector('button[type="submit"]');
  const original = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الحفظ...';

  // عند الوصول للمرحلة ٩ (مكتمل) نسجّل وقت الإكمال — منه تُحسب مهلة الدفع
  const stageUpdate = { stage: newStage, stage_data: existing };
  if (newStage >= 9) {
    stageUpdate.completed_at = new Date().toISOString();
  }

  try {
    const { data: updated, error } = await supabaseClient
      .from('applications')
      .update(stageUpdate)
      .eq('id', applicationId)
      .select('*, campaigns(brand_id, title)');
    if (error) throw error;
    if (!updated || updated.length === 0) {
      throw new Error('لم يتم التحديث. تحقق من سياسات الحماية.');
    }

    // إشعار الشركة
    const brandId = updated[0]?.campaigns?.brand_id;
    const campaignTitle = updated[0]?.campaigns?.title || 'صفقة';
    const notif = STAGE_NOTIFICATIONS[newStage];
    if (brandId && notif) {
      createNotification(brandId, 'workflow_update', notif.title, `${campaignTitle}: ${notif.body}`, '/brand.html').catch(console.error);
      fetch('https://rdzzzasbyzugxogbgwwn.supabase.co/functions/v1/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + supabaseClient.supabaseKey },
        body: JSON.stringify({ title: notif.title, body: `${campaignTitle}: ${notif.body}`, url: '/brand.html', target_users: [brandId] })
      }).catch(console.error);
    }

    await loadData();
    // نجح الإرسال والحفظ في القاعدة → امسح المسودّة المؤقتة لهذي الصفقة
    clearStageDraft(applicationId);
  } catch (err) {
    console.error('Failed to submit stage:', err);
    submitBtn.disabled = false;
    submitBtn.textContent = original;
    showToast('حصل خطأ: ' + (err.message || 'حاول مرة أخرى'), 'error');
  }
}
