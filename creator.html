<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المؤثرة - سيمبل</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#D4523A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="سيمبل">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #F7F3EC;
  --cream-darker: #EFE9DD;
  --ink: #1A1714;
  --ink-soft: #3D3833;
  --ink-muted: #6B645B;
  --ink-faint: #A8A095;
  --accent: #D4523A;
  --accent-soft: #E8917E;
  --olive: #5B6042;
  --gold: #B8915E;
  --line: rgba(26, 23, 20, 0.1);
  --line-strong: rgba(26, 23, 20, 0.2);
  --success: #5B6042;
  --warning: #B8915E;
  --font-display: 'Reem Kufi', sans-serif;
  --font-serif: 'Noto Naskh Arabic', serif;
  --font-body: 'Tajawal', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.3;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' seed='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.35 0 0 0 0 0.3 0 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

.nav {
  background: var(--cream);
  padding: 20px 0;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}
.nav-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--ink);
}
.logo-mark {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -1px;
  position: relative;
}
.logo-mark::after {
  content: '';
  position: absolute;
  bottom: 4px;
  inset-inline-end: -8px;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

.user-menu {
  display: flex;
  align-items: center;
  gap: 16px;
}
.user-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
  padding: 8px 14px 8px 8px;
  border-radius: 100px;
  border: 1px solid var(--line);
  cursor: pointer;
}
.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 13px;
}
.user-name {
  font-size: 14px;
  font-weight: 500;
}
.btn-logout {
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink-muted);
  padding: 8px 16px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { color: var(--accent); border-color: var(--accent); }

.page-header {
  padding: 48px 0 32px;
}
.welcome {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 600;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.welcome .italic {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--accent);
}
.welcome-sub {
  color: var(--ink-soft);
  font-size: 16px;
}

.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 32px;
}
.tab {
  padding: 14px 24px;
  background: transparent;
  border: none;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--ink-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  margin-bottom: -1px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab .count {
  background: var(--cream-darker);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}
.tab.active .count {
  background: var(--accent);
  color: white;
}

.tab-panel {
  display: none;
}
.tab-panel.active {
  display: block;
}

.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar .label {
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 500;
}
.filter-pill {
  padding: 8px 16px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--ink-soft);
  font-family: var(--font-body);
}
.filter-pill:hover { border-color: var(--ink-soft); }
.filter-pill.active {
  background: var(--ink);
  color: var(--cream);
  border-color: var(--ink);
}

.campaigns-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

.campaign-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.campaign-card:hover {
  transform: translateY(-3px);
  border-color: var(--ink-soft);
}
.campaign-card .top {
  display: flex;
  justify-content: space-between;
  align-items: start;
  gap: 12px;
}
.brand-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--ink-muted);
}
.brand-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--cream-darker);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 11px;
  color: var(--gold);
}
.budget-tag {
  background: var(--cream-darker);
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  color: var(--gold);
}

.campaign-card h3 {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.3px;
}

.campaign-card .desc {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.meta-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.meta-item {
  font-size: 12px;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
.tags-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tag {
  font-size: 11px;
  padding: 4px 10px;
  background: var(--cream-darker);
  border-radius: 100px;
  color: var(--olive);
  font-weight: 500;
}

.btn-apply {
  background: var(--ink);
  color: var(--cream);
  padding: 10px 20px;
  border: none;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-apply:hover { background: var(--accent); }
.btn-apply.applied {
  background: var(--cream-darker);
  color: var(--ink-muted);
  cursor: not-allowed;
}

.empty {
  text-align: center;
  padding: 80px 32px;
  color: var(--ink-muted);
}
.empty .icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty h3 {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--ink);
  margin-bottom: 8px;
}

.applications-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.application-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
}
.app-info h4 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}
.app-info .meta {
  font-size: 13px;
  color: var(--ink-muted);
}
.app-status {
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
}
.status-pending { background: rgba(184, 145, 94, 0.15); color: var(--gold); }
.status-active { background: rgba(212, 82, 58, 0.12); color: var(--accent); }
.status-closed { background: rgba(91, 96, 66, 0.15); color: var(--olive); }
.status-rejected { background: var(--cream-darker); color: var(--ink-muted); }

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26, 23, 20, 0.5);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: white;
  border-radius: 24px;
  padding: 36px;
  max-width: 520px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
}
.modal .sub {
  color: var(--ink-muted);
  font-size: 14px;
  margin-bottom: 24px;
}
.field { margin-bottom: 20px; }
label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
input, textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  background: white;
}
input:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.btn-secondary {
  flex: 1;
  padding: 12px;
  background: white;
  border: 1px solid var(--line-strong);
  color: var(--ink);
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.btn-primary {
  flex: 1;
  padding: 12px;
  background: var(--ink);
  color: var(--cream);
  border: none;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.btn-primary:hover { background: var(--accent); }

@media (max-width: 640px) {
  .container { padding: 0 16px; }
  .campaigns-grid { grid-template-columns: 1fr; }
  .modal { padding: 24px; }
  .welcome { font-size: 26px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <span class="logo-mark">سيمبل</span>
    </a>
    <div class="user-menu" id="user-menu">
      <div class="user-pill">
        <div class="user-avatar" id="user-initial">م</div>
        <span class="user-name" id="user-name">مؤثرة</span>
      </div>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <h1 class="welcome">أهلاً <span class="italic" id="welcome-name">بك</span></h1>
    <p class="welcome-sub">تصفحي الحملات المتاحة وقدمي عروضك</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')" id="tab-browse">
      <span>الحملات المتاحة</span>
      <span class="count" id="count-browse">0</span>
    </button>
    <button class="tab" onclick="switchTab('applications')" id="tab-applications">
      <span>تقديماتي</span>
      <span class="count" id="count-applications">0</span>
    </button>
  </div>

  <div class="tab-panel active" id="panel-browse">
    <div class="filter-bar">
      <span class="label">التصنيف:</span>
      <button class="filter-pill active" onclick="filterCampaigns('all', this)">الكل</button>
      <button class="filter-pill" onclick="filterCampaigns('perfumes', this)">عطور</button>
      <button class="filter-pill" onclick="filterCampaigns('fashion', this)">موضة</button>
      <button class="filter-pill" onclick="filterCampaigns('beauty', this)">جمال</button>
      <button class="filter-pill" onclick="filterCampaigns('food', this)">طعام</button>
      <button class="filter-pill" onclick="filterCampaigns('tech', this)">تقنية</button>
    </div>

    <div class="campaigns-grid" id="campaigns-list"></div>
  </div>

  <div class="tab-panel" id="panel-applications">
    <div class="applications-list" id="applications-list"></div>
  </div>
</main>

<div class="modal-backdrop" id="apply-modal">
  <div class="modal">
    <h3 id="modal-title">تقديم عرض</h3>
    <p class="sub" id="modal-sub">قدمي عرضك على هذه الحملة. الوكيل الذكي راح يتفاوض معك بناءً على عرضك.</p>

    <form onsubmit="submitApplication(event)">
      <div class="field">
        <label>السعر المعروض (ر.س)</label>
        <input type="number" name="price" required placeholder="مثال: 800">
      </div>

      <div class="field">
        <label>ملاحظة إضافية (اختياري)</label>
        <textarea name="note" rows="3" placeholder="مثل: أقدر أصور خلال 3 أيام، أو لدي اقتراحات إضافية..."></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn-primary">إرسال العرض</button>
      </div>
    </form>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="notifications.js"></script>
<script>
let currentUser = null;
let allCampaigns = [];
let myApplications = [];
let currentFilter = 'all';
let currentCampaignId = null;

async function init() {
  // محاولة استعادة الجلسة من cookie لو localStorage فاضي
  await tryRestoreSession();

  currentUser = getCurrentUser();
  if (!currentUser) {
    alert('يرجى تسجيل الدخول أولاً');
    window.location.href = '/signup.html';
    return;
  }

  if (currentUser.role !== 'creator') {
    alert('هذه الصفحة مخصصة للمؤثرات. سيتم تحويلك للوحة الشركة.');
    window.location.href = '/brand.html';
    return;
  }

  const firstName = (currentUser.name || 'مؤثرة').split(' ')[0];
  document.getElementById('user-name').textContent = firstName;
  document.getElementById('user-initial').textContent = firstName[0];
  document.getElementById('welcome-name').textContent = firstName;

  // تفعيل الإشعارات
  initNotifications('user-menu');

  await loadData();
}

async function loadData() {
  try {
    document.getElementById('campaigns-list').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--ink-muted)">جاري تحميل الحملات...</div>';
    [allCampaigns, myApplications] = await Promise.all([
      dbGetCampaigns(),
      dbGetMyApplications(currentUser.id)
    ]);
    renderCampaigns();
    renderApplications();
  } catch (err) {
    console.error(err);
    document.getElementById('campaigns-list').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--accent)">حصل خطأ في تحميل البيانات. حدّث الصفحة وحاول مرة أخرى.</div>';
  }
}

function renderCampaigns() {
  const filtered = currentFilter === 'all'
    ? allCampaigns
    : allCampaigns.filter(c => c.brand_industry === currentFilter);

  document.getElementById('count-browse').textContent = filtered.length;
  const list = document.getElementById('campaigns-list');

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty" style="grid-column: 1/-1">
        <div class="icon">○</div>
        <h3>لا توجد حملات</h3>
        <p>لا توجد حملات في هذا التصنيف حالياً</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const applied = myApplications.some(a => a.campaign_id === c.id);
    const brandName = c.brand || 'شركة';
    const brandInitial = brandName[0];
    const tags = c.tags || [];
    return `
      <div class="campaign-card">
        <div class="top">
          <div class="brand-badge">
            <div class="brand-avatar">${brandInitial}</div>
            <span>${brandName}</span>
          </div>
          <div class="budget-tag">${c.budget} ر.س</div>
        </div>
        <h3>${c.title}</h3>
        <p class="desc">${c.description}</p>
        <div class="meta-row">
          ${c.duration ? `<div class="meta-item">⏱ ${c.duration}</div>` : ''}
          ${c.package ? `<div class="meta-item">◇ ${c.package}</div>` : ''}
        </div>
        <div class="card-footer">
          <div class="tags-row">
            ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <button class="btn-apply ${applied ? 'applied' : ''}"
                  onclick="${applied ? '' : `openApplyModal('${c.id}')`}"
                  ${applied ? 'disabled' : ''}>
            ${applied ? 'تم التقديم ✓' : 'قدمي عرضك'}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function renderApplications() {
  document.getElementById('count-applications').textContent = myApplications.length;
  const list = document.getElementById('applications-list');

  if (myApplications.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="icon">◌</div>
        <h3>لم تقدمي على أي حملة بعد</h3>
        <p>تصفحي الحملات المتاحة وقدمي عرضك على ما يناسبك</p>
      </div>`;
    return;
  }

  const statusLabels = {
    pending: 'قيد المراجعة',
    active: 'تفاوض نشط',
    closed: 'مقفلة',
    rejected: 'مرفوضة'
  };

  list.innerHTML = myApplications.map(a => {
    const campaignTitle = a.campaigns?.title || 'حملة';
    const brandName = a.campaigns?.users?.company_name || '';
    return `
      <div class="application-card" onclick="window.location.href='/campaign.html?app=${a.id}'" style="cursor: pointer">
        <div class="app-info">
          <h4>${campaignTitle}</h4>
          <div class="meta">${brandName} · عرضك: ${a.price.toLocaleString('ar-SA')} ر.س · ${new Date(a.created_at).toLocaleDateString('ar-SA')}</div>
        </div>
        <span class="app-status status-${a.status}">${statusLabels[a.status]}</span>
      </div>
    `;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

function filterCampaigns(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderCampaigns();
}

function openApplyModal(campaignId) {
  currentCampaignId = campaignId;
  const campaign = allCampaigns.find(c => c.id === campaignId);
  if (!campaign) return;
  document.getElementById('modal-title').textContent = 'تقديم على: ' + campaign.title;
  document.getElementById('modal-sub').textContent = `${campaign.brand} · الميزانية: ${campaign.budget} ر.س`;
  document.getElementById('apply-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('apply-modal').classList.remove('show');
}

async function submitApplication(event) {
  event.preventDefault();
  const form = event.target;
  const submitBtn = form.querySelector('button[type="submit"]');
  const original = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الإرسال...';

  const fd = new FormData(form);
  const applicationData = {
    campaign_id: currentCampaignId,
    creator_id: currentUser.id,
    price: parseInt(fd.get('price')),
    note: fd.get('note') || null,
    status: 'pending'
  };

  try {
    await dbApply(applicationData);

    // إرسال إشعار للشركة
    const campaign = allCampaigns.find(c => c.id === currentCampaignId);
    if (campaign && campaign.brand_id) {
      createNotification(
        campaign.brand_id,
        'new_application',
        `📨 ${currentUser.name || 'مؤثرة'} قدّمت عرضاً`,
        `على حملة: ${campaign.title} · بسعر ${applicationData.price} ر.س`,
        '/brand.html'
      ).catch(err => console.error(err));
    }

    closeModal();
    form.reset();
    await loadData();
    setTimeout(() => alert('تم إرسال عرضك بنجاح! الشركة سترى عرضك الآن.'), 100);
  } catch (err) {
    console.error(err);
    submitBtn.disabled = false;
    submitBtn.textContent = original;
    alert('حصل خطأ أثناء إرسال العرض. حاولي مرة أخرى.');
  }
}

function logout() {
  if (confirm('متأكدة من تسجيل الخروج؟')) {
    clearCurrentUser();
    window.location.href = '/';
  }
}

init();
</script>
