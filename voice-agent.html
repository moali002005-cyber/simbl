<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكالمة مع وكيل التفاوض - سيمبل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #F7F3EC;
  --cream-darker: #EFE9DD;
  --ink: #1A1714;
  --ink-soft: #3D3833;
  --ink-muted: #6B645B;
  --ink-faint: #A8A095;
  --accent: #D4523A;
  --accent-soft: #E8917E;
  --olive: #5B6042;
  --gold: #B8915E;
  --line: rgba(26, 23, 20, 0.1);
  --line-strong: rgba(26, 23, 20, 0.2);
  --font-display: 'Reem Kufi', sans-serif;
  --font-body: 'Tajawal', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 300;
  min-height: 100vh;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  opacity: 0.3; mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' seed='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.35 0 0 0 0 0.3 0 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.nav {
  background: var(--cream);
  padding: 16px 0;
  border-bottom: 1px solid var(--line);
  position: relative;
  z-index: 2;
}
.nav-inner {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo-mark {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -1px;
  position: relative;
}
.logo-mark::after {
  content: '';
  position: absolute;
  bottom: 4px;
  inset-inline-end: -8px;
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
}
.back-link { color: var(--ink-muted); text-decoration: none; font-size: 14px; }

.call-container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
  height: calc(100vh - 60px);
  display: flex;
  flex-direction: column;
}

/* بطاقة معلومات الحملة */
.campaign-info {
  background: linear-gradient(135deg, var(--olive), #6E7550);
  color: white;
  padding: 16px 20px;
  border-radius: 16px;
  margin-bottom: 16px;
  text-align: center;
}
.campaign-info .title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}
.campaign-info .budget {
  font-size: 14px;
  opacity: 0.9;
}

/* دائرة الوكيل (Avatar) */
.agent-visual {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  min-height: 0;
}
.agent-orb {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, var(--accent-soft), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 64px;
  color: white;
  position: relative;
  transition: all 0.3s;
  box-shadow: 0 8px 40px rgba(212, 82, 58, 0.25);
}
.agent-orb.speaking {
  animation: pulse 1.2s ease-in-out infinite;
}
.agent-orb.listening {
  background: radial-gradient(circle at 30% 30%, #7A8060, var(--olive));
  box-shadow: 0 8px 40px rgba(91, 96, 66, 0.35);
}
.agent-orb.thinking {
  background: radial-gradient(circle at 30% 30%, #D4AF6E, var(--gold));
}
@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 8px 40px rgba(212, 82, 58, 0.25); }
  50% { transform: scale(1.06); box-shadow: 0 12px 56px rgba(212, 82, 58, 0.4); }
}
/* حلقات صوتية حول الـ orb */
.agent-orb::before,
.agent-orb::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 2px solid var(--accent);
  opacity: 0;
}
.agent-orb.speaking::before {
  inset: -12px;
  animation: ring 1.6s ease-out infinite;
}
.agent-orb.speaking::after {
  inset: -12px;
  animation: ring 1.6s ease-out infinite 0.5s;
}
@keyframes ring {
  0% { opacity: 0.6; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.3); }
}

.agent-status {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  min-height: 28px;
  text-align: center;
}
.agent-substatus {
  font-size: 13px;
  color: var(--ink-muted);
  text-align: center;
  margin-top: -16px;
}

/* نص آخر رسالة */
.transcript {
  background: white;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 16px;
  max-height: 140px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink-soft);
  min-height: 60px;
}
.transcript .label {
  font-size: 11px;
  color: var(--ink-faint);
  font-weight: 500;
  margin-bottom: 4px;
}
.transcript-empty {
  color: var(--ink-faint);
  text-align: center;
  padding: 20px 0;
}

/* أزرار التحكم */
.controls {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  padding-bottom: 8px;
}
.mic-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(212, 82, 58, 0.3);
}
.mic-btn:hover { transform: scale(1.05); }
.mic-btn:active { transform: scale(0.95); }
.mic-btn.recording {
  background: #C0392B;
  animation: micpulse 1s ease-in-out infinite;
}
@keyframes micpulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(192, 57, 43, 0.4); }
  50% { box-shadow: 0 4px 32px rgba(192, 57, 43, 0.7); }
}
.mic-btn:disabled {
  background: var(--ink-faint);
  cursor: not-allowed;
  transform: none;
}
.control-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: white;
  color: var(--ink-soft);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.control-btn:hover { border-color: var(--accent); color: var(--accent); }
.control-btn.active { background: var(--olive); color: white; border-color: var(--olive); }

/* شاشة الاتفاق */
.deal-closed-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26, 23, 20, 0.85);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.deal-closed-overlay.show { display: flex; }
.deal-closed-card {
  background: var(--cream);
  border-radius: 24px;
  padding: 40px 32px;
  max-width: 440px;
  width: 100%;
  text-align: center;
}
.deal-closed-card .icon { font-size: 56px; margin-bottom: 16px; }
.deal-closed-card h2 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--olive);
}
.deal-closed-card .details {
  background: white;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px 20px;
  margin: 20px 0;
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink-soft);
  text-align: start;
}
.deal-closed-card .btn {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 14px 32px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
}
.deal-closed-card .btn:hover { background: var(--accent); }

/* رسالة تحميل / خطأ */
.full-msg {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
  color: var(--ink-muted);
  padding: 20px;
  font-size: 15px;
}

/* تنبيه عدم الدعم */
.unsupported {
  background: rgba(212, 82, 58, 0.1);
  border: 1px solid rgba(212, 82, 58, 0.3);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--accent);
  text-align: center;
  display: none;
}
.unsupported.show { display: block; }

@media (max-width: 480px) {
  .agent-orb { width: 130px; height: 130px; font-size: 52px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <span class="logo-mark">سيمبل</span>
    <a href="javascript:history.back()" class="back-link">← إنهاء المكالمة</a>
  </div>
</nav>

<div id="app">
  <div class="full-msg">جاري التحميل...</div>
</div>

<script src="supabase-config.js"></script>
<script>
let currentUser = null;
let application = null;
let campaign = null;
let conversationHistory = [];
let recognition = null;
let isRecording = false;
let isProcessing = false;
let voiceEnabled = true;
let arabicVoice = null;

// ===== التهيئة =====
async function init() {
  currentUser = getCurrentUser();
  if (!currentUser) {
    window.location.href = '/login.html';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const applicationId = params.get('app');
  if (!applicationId) {
    showError('رابط غير صحيح - لا يوجد معرّف للتقديم');
    return;
  }

  try {
    const { data: appData, error: appErr } = await supabaseClient
      .from('applications')
      .select('*, users!applications_creator_id_fkey(name, platform, handle, followers), campaigns(*, users!campaigns_brand_id_fkey(company_name, name))')
      .eq('id', applicationId)
      .single();

    if (appErr || !appData) {
      showError('لم يتم العثور على التقديم');
      return;
    }

    application = {
      ...appData,
      creator_name: appData.users?.name,
      platform: appData.users?.platform,
      followers: appData.users?.followers
    };
    campaign = {
      ...appData.campaigns,
      brand_name: appData.campaigns?.users?.company_name
    };

    // جلب سجل المحادثة السابق (إن وُجد)
    await loadHistory();

    // تجهيز الأصوات
    setupVoices();

    // التحقق من دعم المتصفح
    if (!setupSpeechRecognition()) {
      renderUI(true);
      return;
    }

    renderUI(false);

    // لو ما فيه محادثة سابقة، الوكيل يبدأ الترحيب
    if (conversationHistory.length === 0) {
      setTimeout(() => startNegotiation(), 600);
    }
  } catch (err) {
    console.error(err);
    showError('حصل خطأ في تحميل البيانات');
  }
}

async function loadHistory() {
  try {
    const { data } = await supabaseClient
      .from('negotiations')
      .select('*')
      .eq('application_id', application.id)
      .order('created_at', { ascending: true });

    if (data && data.length > 0) {
      conversationHistory = data.map(n => ({
        from: n.from_role === 'agent' ? 'agent' : 'creator',
        text: n.message
      }));
    }
  } catch (err) {
    console.error('Failed to load history:', err);
  }
}

// ===== الأصوات =====
function setupVoices() {
  function pickVoice() {
    const voices = window.speechSynthesis.getVoices();
    // نبحث عن صوت عربي
    arabicVoice = voices.find(v => v.lang.startsWith('ar')) || null;
  }
  pickVoice();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = pickVoice;
  }
}

function speak(text, onEnd) {
  if (!voiceEnabled || !window.speechSynthesis) {
    if (onEnd) onEnd();
    return;
  }
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ar-SA';
  if (arabicVoice) utterance.voice = arabicVoice;
  utterance.rate = 1.0;
  utterance.pitch = 1.0;
  utterance.onstart = () => setOrbState('speaking', 'الوكيل يتحدث...');
  utterance.onend = () => {
    if (onEnd) onEnd();
  };
  utterance.onerror = () => {
    if (onEnd) onEnd();
  };
  window.speechSynthesis.speak(utterance);
}

// ===== التعرف على الصوت =====
function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    return false;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'ar-SA';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    handleCreatorSpeech(transcript);
  };

  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    isRecording = false;
    updateMicButton();
    if (event.error === 'no-speech') {
      setOrbState('idle', 'ما سمعت شي، اضغطي الميك وحاولي مرة ثانية');
    } else if (event.error === 'not-allowed') {
      setOrbState('idle', 'لازم تسمحي بالوصول للميكروفون');
    } else {
      setOrbState('idle', 'اضغطي الميك للتحدث');
    }
  };

  recognition.onend = () => {
    isRecording = false;
    updateMicButton();
  };

  return true;
}

// ===== واجهة المستخدم =====
function renderUI(unsupported) {
  document.getElementById('app').innerHTML = `
    <div class="call-container">
      <div class="campaign-info">
        <div class="title">${escapeHtml(campaign.title)}</div>
        <div class="budget">${campaign.brand_name || 'الشركة'} · الميزانية ${(campaign.budget || 0).toLocaleString('ar-SA')} ر.س</div>
      </div>

      <div class="unsupported ${unsupported ? 'show' : ''}">
        متصفحك ما يدعم المكالمة الصوتية. استخدمي Chrome على الكمبيوتر أو Android.
        <br>تقدري تتفاوضي كتابياً من <a href="/campaign.html?app=${application.id}" style="color:var(--accent); text-decoration:underline">هنا</a>
      </div>

      <div class="agent-visual">
        <div class="agent-orb" id="agent-orb">و</div>
        <div class="agent-status" id="agent-status">جاهز للمكالمة</div>
        <div class="agent-substatus" id="agent-substatus">اضغطي زر الميكروفون وابدئي الحديث</div>
      </div>

      <div class="transcript" id="transcript">
        <div class="transcript-empty">الوكيل بيرحب فيك ويبدأ التفاوض...</div>
      </div>

      <div class="controls">
        <button class="control-btn ${voiceEnabled ? 'active' : ''}" id="voice-toggle" onclick="toggleVoice()" title="تشغيل/إيقاف الصوت">
          ${voiceEnabled ? '🔊' : '🔇'}
        </button>
        <button class="mic-btn" id="mic-btn" onclick="toggleRecording()" ${unsupported ? 'disabled' : ''}>
          🎤
        </button>
        <button class="control-btn" onclick="repeatLast()" title="إعادة آخر رسالة">
          ↻
        </button>
      </div>
    </div>

    <div class="deal-closed-overlay" id="deal-overlay">
      <div class="deal-closed-card">
        <div class="icon">🤝</div>
        <h2>تم الاتفاق بنجاح!</h2>
        <div class="details" id="deal-details"></div>
        <button class="btn" onclick="goToWorkflow()">ابدأ تنفيذ الصفقة ←</button>
      </div>
    </div>
  `;

  // عرض آخر رسالة من السجل لو موجودة
  if (conversationHistory.length > 0) {
    const lastAgent = [...conversationHistory].reverse().find(m => m.from === 'agent');
    if (lastAgent) {
      updateTranscript('agent', lastAgent.text);
    }
  }
}

function setOrbState(state, statusText, subText) {
  const orb = document.getElementById('agent-orb');
  const status = document.getElementById('agent-status');
  const sub = document.getElementById('agent-substatus');
  if (!orb) return;

  orb.classList.remove('speaking', 'listening', 'thinking');
  if (state === 'speaking') orb.classList.add('speaking');
  else if (state === 'listening') orb.classList.add('listening');
  else if (state === 'thinking') orb.classList.add('thinking');

  if (status && statusText) status.textContent = statusText;
  if (sub && subText !== undefined) sub.textContent = subText;
}

function updateTranscript(from, text) {
  const el = document.getElementById('transcript');
  if (!el) return;
  const label = from === 'agent' ? 'وكيل سيمبل' : 'أنتِ';
  el.innerHTML = `
    <div class="label">${label}</div>
    <div>${escapeHtml(text)}</div>
  `;
  el.scrollTop = 0;
}

function updateMicButton() {
  const btn = document.getElementById('mic-btn');
  if (!btn) return;
  if (isRecording) {
    btn.classList.add('recording');
    btn.textContent = '⏹';
  } else {
    btn.classList.remove('recording');
    btn.textContent = '🎤';
  }
  btn.disabled = isProcessing;
}

// ===== التحكم في التسجيل =====
function toggleRecording() {
  if (isProcessing) return;
  if (isRecording) {
    recognition.stop();
    isRecording = false;
    updateMicButton();
  } else {
    // نوقف صوت الوكيل لو يتحدث
    window.speechSynthesis.cancel();
    try {
      recognition.start();
      isRecording = true;
      updateMicButton();
      setOrbState('listening', 'أسمعك...', 'تكلمي الحين، واضغطي الزر لما تخلصي');
    } catch (err) {
      console.error('Failed to start recognition:', err);
    }
  }
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('voice-toggle');
  btn.textContent = voiceEnabled ? '🔊' : '🔇';
  btn.classList.toggle('active', voiceEnabled);
  if (!voiceEnabled) window.speechSynthesis.cancel();
}

function repeatLast() {
  const lastAgent = [...conversationHistory].reverse().find(m => m.from === 'agent');
  if (lastAgent) {
    speak(lastAgent.text, () => setOrbState('idle', 'اضغطي الميك للرد'));
  }
}

// ===== منطق التفاوض =====
async function startNegotiation() {
  isProcessing = true;
  updateMicButton();
  setOrbState('thinking', 'الوكيل يجهّز...', '');

  try {
    const reply = await callNegotiateAPI(null);
    if (reply) {
      conversationHistory.push({ from: 'agent', text: reply.text });
      updateTranscript('agent', reply.text);
      isProcessing = false;
      updateMicButton();
      speak(reply.text, () => {
        setOrbState('idle', 'دورك الحين', 'اضغطي الميك وردي على الوكيل');
      });
      if (reply.dealClosed) handleDealClosed(reply.dealDetails);
    }
  } catch (err) {
    console.error(err);
    setOrbState('idle', 'حصل خطأ', 'حاولي مرة ثانية');
    isProcessing = false;
    updateMicButton();
  }
}

async function handleCreatorSpeech(transcript) {
  if (!transcript || transcript.trim().length === 0) return;

  updateTranscript('creator', transcript);
  conversationHistory.push({ from: 'creator', text: transcript });

  isProcessing = true;
  updateMicButton();
  setOrbState('thinking', 'الوكيل يفكر...', '');

  try {
    const reply = await callNegotiateAPI(transcript);
    if (reply) {
      conversationHistory.push({ from: 'agent', text: reply.text });
      updateTranscript('agent', reply.text);
      isProcessing = false;
      updateMicButton();
      speak(reply.text, () => {
        if (!reply.dealClosed) {
          setOrbState('idle', 'دورك الحين', 'اضغطي الميك وردي على الوكيل');
        }
      });
      if (reply.dealClosed) handleDealClosed(reply.dealDetails);
    }
  } catch (err) {
    console.error(err);
    setOrbState('idle', 'حصل خطأ', 'حاولي مرة ثانية');
    isProcessing = false;
    updateMicButton();
  }
}

async function callNegotiateAPI(creatorMessage) {
  const response = await fetch('/api/negotiate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      campaign: campaign,
      application: application,
      history: conversationHistory,
      creatorMessage: creatorMessage,
      voiceMode: true
    })
  });

  if (!response.ok) {
    throw new Error('API error: ' + response.status);
  }

  const data = await response.json();
  return {
    text: data.reply,
    dealClosed: data.dealClosed,
    dealDetails: data.dealDetails
  };
}

function handleDealClosed(details) {
  setOrbState('idle', 'تم الاتفاق! 🎉', '');
  setTimeout(() => {
    const overlay = document.getElementById('deal-overlay');
    const detailsEl = document.getElementById('deal-details');
    if (detailsEl) detailsEl.textContent = details || 'تم الاتفاق على الصفقة بنجاح';
    if (overlay) overlay.classList.add('show');
  }, 1500);
}

function goToWorkflow() {
  window.location.href = '/workflow.html?app=' + application.id;
}

// ===== أدوات =====
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function showError(msg) {
  document.getElementById('app').innerHTML = `<div class="full-msg">${escapeHtml(msg)}</div>`;
}

window.addEventListener('beforeunload', () => {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (recognition && isRecording) recognition.stop();
});

init();
</script>
