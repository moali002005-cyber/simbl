function renderEpAvatar(){
  var el = document.getElementById('ep-avatar'); if(!el) return;
  if (currentUser.avatar_url) { el.innerHTML = '<img src="'+currentUser.avatar_url+'" alt="" style="width:100%;height:100%;object-fit:cover;">'; }
  else { el.textContent = ((currentUser.name||'م').trim().charAt(0)) || 'م'; }
}

function openEditProfile(){
  buildEditProfile();
  document.getElementById('ep-name').value = currentUser.name || '';
  document.getElementById('ep-handle').value = currentUser.handle || '';
  document.getElementById('ep-website').value = currentUser.website || '';
  if (currentUser.country) document.getElementById('ep-country').value = currentUser.country;
  if (currentUser.city) document.getElementById('ep-city').value = currentUser.city;
  if (currentUser.platform) document.getElementById('ep-platform').value = currentUser.platform;
  if (currentUser.category) document.getElementById('ep-category').value = currentUser.category;
  if (currentUser.followers) document.getElementById('ep-followers').value = String(currentUser.followers);
  document.getElementById('ep-price').value = currentUser.price ? String(currentUser.price) : '';
  document.getElementById('ep-bio').value = currentUser.bio || '';
  var _c = document.getElementById('ep-bio-count'); if (_c) _c.textContent = (currentUser.bio||'').length + ' / 300';
  renderEpAvatar();
  document.getElementById('edit-profile').style.display = 'block';
  window.scrollTo(0, 0);
}

function closeEditProfile(){ var m=document.getElementById('edit-profile'); if(m) m.style.display='none'; }

async function saveProfile(){
  var btn = document.getElementById('ep-save'); var orig = btn.textContent;
  btn.disabled = true; btn.textContent = 'جاري الحفظ...';
  var priceVal = parseInt(String(document.getElementById('ep-price').value).replace(/[^\d]/g,''), 10);
  var follVal = parseInt(document.getElementById('ep-followers').value, 10);
  var payload = {
    p_name: document.getElementById('ep-name').value.trim(),
    p_handle: document.getElementById('ep-handle').value.trim().replace(/^@+/, ''),
    p_website: document.getElementById('ep-website').value.trim(),
    p_platform: document.getElementById('ep-platform').value,
    p_category: document.getElementById('ep-category').value,
    p_bio: document.getElementById('ep-bio').value.trim(),
    p_country: document.getElementById('ep-country').value || null,
    p_city: document.getElementById('ep-city').value || null,
    p_price: isNaN(priceVal) ? null : priceVal,
    p_followers: isNaN(follVal) ? null : follVal
  };
  // تصحيح الرابط: لو بدون https نضيفها
  if (payload.p_website && !/^https?:\/\//i.test(payload.p_website)) {
    payload.p_website = 'https://' + payload.p_website.replace(/^\/+/, '');
  }
  try {
    var res = await supabaseClient.rpc('update_my_profile', payload);
    if (res.error) throw res.error;
    currentUser.name = payload.p_name || currentUser.name;
    currentUser.handle = payload.p_handle;
    currentUser.website = payload.p_website;
    currentUser.platform = payload.p_platform;
    currentUser.category = payload.p_category;
    currentUser.bio = payload.p_bio;
    if (payload.p_country) currentUser.country = payload.p_country;
    if (payload.p_city) currentUser.city = payload.p_city;
    if (payload.p_price != null) currentUser.price = payload.p_price;
    if (payload.p_followers != null) currentUser.followers = payload.p_followers;
    saveCurrentUser(currentUser);
    updateHeroStats();
    renderMyAvatar();
    closeEditProfile();
    showToast('تم تحديث ملفك ✓');
  } catch (err) {
    console.error('profile save error', err);
    showToast('تعذّر الحفظ. حاول مرة ثانية.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
}

// ===== ربط تيك توك (سحب أرقام المنشورات تلقائيًا) =====
function handleTiktokReturn(){
  try {
    var p = new URLSearchParams(window.location.search);
    var tk = p.get('tiktok');
    if (!tk) return;
    if (tk === 'connected') {
      if (currentUser) { currentUser.tiktok_connected = true; saveCurrentUser(currentUser); }
      showToast('تم ربط تيك توك ✓');
    } else if (tk === 'denied') {
      showToast('أُلغي ربط تيك توك', 'error');
    } else {
      showToast('تعذّر ربط تيك توك، حاول مرة ثانية', 'error');
    }
    history.replaceState(null, '', window.location.pathname);
  } catch (e) { /* تجاهل */ }
}

function connectTiktok(){
  if (!currentUser || !currentUser.id) { showToast('سجّل الدخول أولاً', 'error'); return; }
  window.location.href = 'https://rdzzzasbyzugxogbgwwn.supabase.co/functions/v1/tiktok-auth-start?creator=' + encodeURIComponent(currentUser.id);
}
