<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساحة العمل - سيمبل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #ffffff;
  --cream-darker: #f5f5f4;
  --ink: #0a0a0a;
  --ink-soft: #3a3a3a;
  --ink-muted: #6b6b6b;
  --ink-faint: #a0a0a0;
  --accent: #13B9B2;
  --accent-soft: #7fd6d2;
  --accent-ink: #0c4f4b;
  --olive: #13B9B2;
  --gold: #6b6b6b;
  --line: rgba(10, 10, 10, 0.08);
  --line-strong: rgba(10, 10, 10, 0.16);
  --success: #13B9B2;
  --font-display: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-serif: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 400;
  min-height: 100vh;
}
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
.nav { background: var(--cream); padding: 18px 0; border-bottom: 1px solid var(--line); }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); }
.logo-eye { width: 42px; height: 42px; display: block; flex-shrink: 0; }
.logo-mark {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 600; letter-spacing: 0;
  position: relative;
}
.logo-mark::after {
  content: ''; position: absolute; bottom: 5px; inset-inline-end: -8px;
  width: 5px; height: 5px; background: var(--accent); border-radius: 50%;
}
.back-link { color: var(--ink-muted); text-decoration: none; font-size: 14px; }
.back-link:hover { color: var(--accent); }

.page { padding: 40px 0 80px; }

.deal-summary {
  background: linear-gradient(135deg, var(--olive), #0e9a94);
  color: #fff;
  padding: 24px 28px;
  border-radius: 20px;
  margin-bottom: 32px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: center;
}
.deal-summary h2 { font-family: var(--font-display); font-size: 18px; font-weight: 500; margin-bottom: 6px; opacity: 0.9; }
.deal-summary .campaign-name { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.deal-summary .parties { font-size: 13px; opacity: 0.9; }
.deal-price { font-family: var(--font-display); font-size: 28px; font-weight: 600; text-align: end; }

.stages-bar { background: #fff; border: 1px solid var(--line); border-radius: 20px; padding: 24px; margin-bottom: 32px; }
.stages-track { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; position: relative; }
.stage-item { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
.stage-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--cream-darker);
  color: var(--ink-faint);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  border: 2px solid var(--line);
  transition: all 0.3s;
  position: relative;
  z-index: 2;
}
.stage-item.done .stage-circle { background: var(--olive); color: #fff; border-color: var(--olive); }
.stage-item.active .stage-circle {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
  box-shadow: 0 0 0 4px rgba(10, 10, 10, 0.10);
}
.stage-label { font-size: 11px; color: var(--ink-muted); text-align: center; font-weight: 500; }
.stage-item.done .stage-label, .stage-item.active .stage-label { color: var(--ink); }
.stage-line { position: absolute; top: 18px; left: 50%; width: 100%; height: 2px; background: var(--line); z-index: 1; }
.stage-item.done .stage-line { background: var(--olive); }
.stage-item:last-child .stage-line { display: none; }

.current-stage-card { background: #fff; border: 1px solid var(--line); border-radius: 20px; padding: 32px; margin-bottom: 24px; }
.stage-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
.stage-icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
}
.stage-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-bottom: 4px; letter-spacing: 0; }
.stage-desc { font-size: 14px; color: var(--ink-soft); }

.agent-message { background: var(--cream-darker); padding: 16px 20px; border-radius: 14px; margin-bottom: 24px; display: flex; gap: 12px; }
.agent-bubble-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 600;
  flex-shrink: 0;
}
.agent-message-content { flex: 1; font-size: 14px; line-height: 1.7; color: var(--ink-soft); }
.agent-message-content strong { color: var(--ink); font-weight: 500; }

.field { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; }
input, textarea {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--line-strong);
  border-radius: 12px;
  font-family: var(--font-body);
  font-size: 14px;
  background: #fff;
  color: var(--ink);
}
textarea { resize: vertical; min-height: 100px; }
input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(19,185,178,0.14); }
.hint { font-size: 12px; color: var(--ink-muted); margin-top: 6px; }

.actions { display: flex; gap: 12px; margin-top: 24px; }
.btn { padding: 14px 28px; border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background: var(--ink); color: #fff; flex: 1; }
.btn-primary:hover { background: var(--accent); }
.btn-primary:disabled { background: var(--ink-faint); cursor: not-allowed; }
.btn-success { background: var(--olive); color: #fff; flex: 1; }
.btn-success:hover { background: #0e9a94; }
.btn-secondary { background: #fff; border: 1px solid var(--line-strong); color: var(--ink-soft); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.waiting-card { text-align: center; padding: 40px 24px; color: var(--ink-muted); }
.waiting-card .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.waiting-card h3 { font-family: var(--font-display); font-size: 18px; color: var(--ink); margin-bottom: 8px; }

.history-section { margin-top: 32px; }
.history-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--ink-muted); }
.history-item { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px 20px; margin-bottom: 10px; display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; }
.history-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(19, 185, 178, 0.12);
  color: var(--accent-ink);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
}
.history-content h4 { font-family: var(--font-display); font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.history-content .meta { font-size: 12px; color: var(--ink-muted); }
.history-content .data { font-size: 13px; color: var(--ink-soft); margin-top: 6px; background: var(--cream-darker); padding: 8px 10px; border-radius: 8px; }
.history-time { font-size: 11px; color: var(--ink-faint); white-space: nowrap; }

.completed-banner {
  background: linear-gradient(135deg, var(--olive), #0e9a94);
  color: #fff;
  padding: 40px;
  border-radius: 24px;
  text-align: center;
}
.completed-banner h2 { font-family: var(--font-display); font-size: 28px; font-weight: 600; margin-bottom: 12px; }
.completed-banner p { font-size: 15px; opacity: 0.95; }

.loading { text-align: center; padding: 60px; color: var(--ink-muted); }

@media (max-width: 740px) {
  .container { padding: 0 16px; }
  .deal-summary { grid-template-columns: 1fr; text-align: center; }
  .deal-price { text-align: center; }
  .stages-track { grid-template-columns: repeat(7, 1fr); gap: 0; }
  .stage-label { font-size: 9px; }
  .stage-circle { width: 28px; height: 28px; font-size: 11px; }
  .current-stage-card { padding: 24px; }
  .stage-title { font-size: 18px; }
  .actions { flex-direction: column; }
  .logo-eye { width: 36px; height: 36px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg class="logo-eye" viewBox="0 0 200 200" aria-hidden="true">
        <g fill="none" stroke-linejoin="miter" stroke-miterlimit="6" stroke-linecap="round">
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="8" transform="rotate(25 100 100)"/>
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="8" transform="rotate(-25 100 100)"/>
          <path d="M76 100 Q100 88 124 100 Q100 112 76 100 Z" fill="#ffffff" stroke="#13B9B2" stroke-width="6"/>
          <circle cx="100" cy="100" r="7" fill="#0a0a0a"/>
        </g>
      </svg>
      <span class="logo-mark">سيمبل</span>
    </a>
    <a href="javascript:history.back()" class="back-link">← العودة</a>
  </div>
</nav>

<main class="page">
  <div class="container" id="content">
    <div class="loading">جاري التحميل...</div>
  </div>
</main>

<script src="supabase-config.js"></script>
<script>
let currentUser = null;
let application = null;
let campaign = null;
let workflow = null;
let pollInterval = null;

const STAGES = [
  { key: 'address', label: 'العنوان', num: '١', actor: 'creator' },
  { key: 'shipping', label: 'الشحن', num: '٢', actor: 'brand' },
  { key: 'received', label: 'الاستلام', num: '٣', actor: 'creator' },
  { key: 'content_upload', label: 'المحتوى', num: '٤', actor: 'creator' },
  { key: 'approval', label: 'الموافقة', num: '٥', actor: 'brand' },
  { key: 'published', label: 'النشر', num: '٦', actor: 'creator' },
  { key: 'completed', label: 'مكتمل', num: '✓', actor: null }
];

async function init() {
  currentUser = getCurrentUser();
  if (!currentUser) {
    window.location.href = '/login.html';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const applicationId = params.get('app');
  if (!applicationId) {
    document.getElementById('content').innerHTML = '<div class="loading">رابط غير صحيح</div>';
    return;
  }

  try {
    const { data: appData, error: appErr } = await supabaseClient
      .from('applications')
      .select('*, users!applications_creator_id_fkey(name, platform, handle, followers, whatsapp), campaigns(*, users!campaigns_brand_id_fkey(company_name, name, phone))')
      .eq('id', applicationId)
      .single();

    if (appErr || !appData) {
      document.getElementById('content').innerHTML = '<div class="loading">لم يتم العثور على الصفقة</div>';
      return;
    }

    if (appData.status !== 'closed') {
      document.getElementById('content').innerHTML = '<div class="loading">هذه الصفقة لم تكتمل بعد. <a href="/campaign.html?app=' + applicationId + '" style="color:var(--accent-ink)">العودة للتفاوض</a></div>';
      return;
    }

    application = {
      ...appData,
      creator_name: appData.users?.name,
      creator_whatsapp: appData.users?.whatsapp,
      platform: appData.users?.platform,
      handle: appData.users?.handle
    };
    campaign = {
      ...appData.campaigns,
      brand_name: appData.campaigns?.users?.company_name,
      brand_phone: appData.campaigns?.users?.phone
    };

    const isOwner = (currentUser.role === 'brand' && currentUser.id === campaign.brand_id) ||
                    (currentUser.role === 'creator' && currentUser.id === application.creator_id);
    if (!isOwner) {
      document.getElementById('content').innerHTML = '<div class="loading">ليس لديك صلاحية</div>';
      return;
    }

    await loadOrCreateWorkflow();
    render();

    pollInterval = setInterval(loadAndRender, 30000);
  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = '<div class="loading">حصل خطأ. حدث الصفحة.</div>';
  }
}

async function loadOrCreateWorkflow() {
  const { data } = await supabaseClient
    .from('workflow_stages')
    .select('*')
    .eq('application_id', application.id)
    .maybeSingle();

  if (data) {
    workflow = data;
  } else {
    const { data: created } = await supabaseClient
      .from('workflow_stages')
      .insert([{ application_id: application.id, current_stage: 'address' }])
      .select()
      .single();
    workflow = created;
  }
}

async function loadAndRender() {
  const activeEl = document.activeElement;
  const isTyping = activeEl && (activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'INPUT');

  const previousStage = workflow ? workflow.current_stage : null;
  await loadOrCreateWorkflow();

  const stageChanged = previousStage !== workflow.current_stage;

  if (stageChanged || !isTyping) {
    render();
  }
}

async function updateWorkflow(updates) {
  const { data, error } = await supabaseClient
    .from('workflow_stages')
    .update({ ...updates, updated_at: new Date().toISOString() })
    .eq('id', workflow.id)
    .select()
    .single();
  if (error) throw error;
  workflow = data;
}

function getCurrentStageIndex() {
  return STAGES.findIndex(s => s.key === workflow.current_stage);
}

function isMyTurn() {
  const stage = STAGES.find(s => s.key === workflow.current_stage);
  if (!stage || !stage.actor) return false;
  return currentUser.role === stage.actor;
}

function render() {
  const currentStageIdx = getCurrentStageIndex();
  const myTurn = isMyTurn();

  document.getElementById('content').innerHTML = `
    <div class="deal-summary">
      <div>
        <h2>صفقة مكتملة</h2>
        <div class="campaign-name">${campaign.title}</div>
        <div class="parties">${campaign.brand_name} × ${application.creator_name}</div>
      </div>
      <div class="deal-price">${(application.final_price || application.price).toLocaleString('ar-SA')} ر.س</div>
    </div>

    <div class="stages-bar">
      <div class="stages-track">
        ${STAGES.map((s, i) => {
          const done = i < currentStageIdx;
          const active = i === currentStageIdx;
          return `
            <div class="stage-item ${done ? 'done' : ''} ${active ? 'active' : ''}">
              ${i < STAGES.length - 1 ? '<div class="stage-line"></div>' : ''}
              <div class="stage-circle">${done ? '✓' : s.num}</div>
              <div class="stage-label">${s.label}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    ${workflow.current_stage === 'completed' ? renderCompleted() : renderCurrentStage(myTurn)}

    ${renderHistory()}
  `;
}

function renderCurrentStage(myTurn) {
  const stage = STAGES.find(s => s.key === workflow.current_stage);

  const stageContent = {
    address: {
      icon: '○',
      title: 'عنوان الشحن',
      desc: 'المؤثرة تدخل عنوانها لاستلام المنتج',
      agentMsg: myTurn
        ? 'يا هلا! عشان نبدأ الصفقة، أحتاج <strong>عنوان الشحن</strong>. اكتبي عنوانك الكامل (المدينة، الحي، الشارع، رقم المبنى، رقم الجوال للمندوب).'
        : `في انتظار <strong>${application.creator_name}</strong> ترسل عنوان الشحن. راح ننبهك لما تخلص.`,
      form: myTurn ? `
        <div class="field">
          <label>العنوان الكامل</label>
          <textarea id="address-input" placeholder="مثل: الرياض، حي الياسمين، شارع الأمير سلطان، مبنى 245، شقة 12. رقم الجوال: 0501234567"></textarea>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="submitAddress()">حفظ وإرسال العنوان</button>
        </div>
      ` : ''
    },
    shipping: {
      icon: '↗',
      title: 'الشحن',
      desc: 'الشركة تشحن المنتج وتحدد رقم التتبع',
      agentMsg: myTurn
        ? `ممتاز! وصلنا عنوان ${application.creator_name}. <strong>اشحنوا المنتج الحين</strong>، وأدخلوا رقم التتبع لما يكون جاهز.`
        : 'الشركة قاعدة تجهز الشحنة. راح نخبرك بمجرد ما يتم الشحن مع رقم التتبع.',
      addressDisplay: `<div class="agent-message" style="background:rgba(19,185,178,0.08); border:1px solid rgba(19,185,178,0.2)">
        <div class="agent-bubble-avatar" style="background:var(--olive)">📍</div>
        <div class="agent-message-content">
          <strong>عنوان الشحن:</strong><br>
          ${escapeHtml(workflow.shipping_address || '')}
        </div>
      </div>`,
      form: myTurn ? `
        <div class="field">
          <label>رقم التتبع <span style="color:var(--ink-faint)">(اختياري)</span></label>
          <input type="text" id="tracking-input" placeholder="مثل: SP123456789SA">
        </div>
        <div class="field">
          <label>ملاحظات إضافية <span style="color:var(--ink-faint)">(اختياري)</span></label>
          <textarea id="shipping-note" placeholder="شركة الشحن، الوقت المتوقع، أي تفاصيل..."></textarea>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="submitShipping()">تم الشحن ✓</button>
        </div>
      ` : ''
    },
    received: {
      icon: '◉',
      title: 'استلام المنتج',
      desc: 'تأكيد استلام المؤثرة للمنتج',
      agentMsg: myTurn
        ? 'تم الشحن! بمجرد ما يوصلك المنتج، اضغطي زر <strong>"تم الاستلام"</strong> عشان نكمل للمرحلة الجاية (التصوير).'
        : `في انتظار <strong>${application.creator_name}</strong> تستلم المنتج وتأكد ذلك.`,
      shippingInfo: workflow.tracking_number || workflow.shipping_note ? `<div class="agent-message" style="background:rgba(10,10,10,0.04); border:1px solid rgba(10,10,10,0.12)">
        <div class="agent-bubble-avatar" style="background:var(--gold)">↗</div>
        <div class="agent-message-content">
          <strong>معلومات الشحن:</strong><br>
          ${workflow.tracking_number ? `رقم التتبع: ${escapeHtml(workflow.tracking_number)}<br>` : ''}
          ${workflow.shipping_note ? escapeHtml(workflow.shipping_note) : ''}
        </div>
      </div>` : '',
      form: myTurn ? `
        <div class="actions">
          <button class="btn btn-success" onclick="confirmReceived()">تم الاستلام ✓</button>
        </div>
      ` : ''
    },
    content_upload: {
      icon: '◇',
      title: 'رفع المحتوى',
      desc: 'المؤثرة ترفع المحتوى للمراجعة',
      agentMsg: myTurn
        ? 'حلو! استلمتي المنتج. الحين <strong>صوري المحتوى</strong> ولما تخلصين، ارفعي رابط الفيديو/الصور (Google Drive, Dropbox, أي رابط). الشركة راح تراجعه قبل النشر.'
        : `في انتظار ${application.creator_name} تصور المحتوى وترفعه للمراجعة.`,
      form: myTurn ? `
        <div class="field">
          <label>رابط المحتوى</label>
          <input type="url" id="content-url" placeholder="https://drive.google.com/...">
          <div class="hint">رابط Google Drive, Dropbox, أو أي خدمة مشاركة ملفات</div>
        </div>
        <div class="field">
          <label>ملاحظات <span style="color:var(--ink-faint)">(اختياري)</span></label>
          <textarea id="content-note" placeholder="وصف بسيط للمحتوى، أي معلومات تحبين تضيفينها..."></textarea>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="submitContent()">رفع المحتوى للمراجعة</button>
        </div>
      ` : ''
    },
    approval: {
      icon: '✓',
      title: 'مراجعة الشركة',
      desc: 'الشركة تراجع المحتوى وتوافق أو تطلب تعديل',
      agentMsg: myTurn
        ? `${application.creator_name} رفعت المحتوى! <strong>راجعوه</strong>، ولو كل شي تمام وافقوا. أو اطلبوا تعديل لو فيه شي يحتاج تغيير.`
        : 'الشركة قاعدة تراجع محتواك الحين. راح نخبرك بالرد قريباً.',
      contentDisplay: `<div class="agent-message" style="background:rgba(19,185,178,0.08); border:1px solid rgba(19,185,178,0.2)">
        <div class="agent-bubble-avatar">◇</div>
        <div class="agent-message-content">

async function loadPaymentSection() {
  const section = document.getElementById('payment-section');
  if (!section) return;

  try {
    const { data: payment } = await supabaseClient
      .from('payments')
      .select('*')
      .eq('campaign_id', campaign.id)
      .eq('creator_id', application.creator_id)
      .maybeSingle();

    if (!payment) {
      section.innerHTML = '<div class="loading">لم يتم إنشاء سجل دفع بعد</div>';
      return;
    }

    const isCreator = currentUser.role === 'creator';
    const isBrand = currentUser.role === 'brand';
    const dueDate = new Date(payment.due_date);
    const today = new Date();
    const daysLeft = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));

    let html = '';

    if (payment.status === 'awaiting_bank_details') {
      html = isCreator ? renderBankDetailsForm(payment) : renderWaitingForBankDetails(payment);
    } else if (payment.status === 'awaiting_payment') {
      html = isBrand ? renderBrandPaymentView(payment, daysLeft) : renderCreatorWaitingPayment(payment, daysLeft);
    } else if (payment.status === 'paid_by_brand') {
      html = isCreator ? renderConfirmReceiptForm(payment) : renderBrandPaidView(payment);
    } else if (payment.status === 'completed') {
      html = renderPaymentCompleted(payment);
    }

    section.innerHTML = html;
  } catch (err) {
    console.error('Payment section error:', err);
    section.innerHTML = '<div class="loading">حصل خطأ في تحميل بيانات الدفع</div>';
  }
}

async function submitBankDetails(paymentId) {
  const bankName = document.getElementById('bank-name').value.trim();
  const iban = document.getElementById('iban').value.trim().replace(/\s/g, '').toUpperCase();
  const accountHolder = document.getElementById('account-holder').value.trim();

  if (!bankName || !iban || !accountHolder) {
    alert('الرجاء تعبئة جميع الحقول');
    return;
  }
  if (!iban.startsWith('SA') || iban.length !== 24) {
    alert('الآيبان غير صحيح. يجب أن يبدأ بـ SA ويتكون من 24 رقم');
    return;
  }
  try {
    const { error } = await supabaseClient
      .from('payments')
      .update({
        bank_name: bankName,
        iban: iban,
        account_holder_name: accountHolder,
        bank_details_submitted_at: new Date().toISOString(),
        status: 'awaiting_payment'
      })
      .eq('id', paymentId);
    if (error) throw error;
    alert('تم حفظ بيانات التحويل بنجاح ✓');
    loadPaymentSection();
  } catch (err) {
    console.error(err);
    alert('حصل خطأ. حاولي مرة أخرى');
  }
}

function copyIban(iban, btn) {

  });
}

          `;
        } else if (item.type === 'link' && item.data) {
          dataHtml = `<a href="${escapeHtml(item.data)}" target="_blank" rel="noopener" style="display:inline-flex; align-items:center; gap:6px; background:var(--accent); color:#fff; padding:8px 14px; border-radius:100px; text-decoration:none; font-weight:500; font-size:12px; font-family:var(--font-body); margin-top:6px">${item.label || 'فتح الرابط ↗'}</a>`;
        } else if (item.data) {
          dataHtml = `<div class="data">${escapeHtml(item.data)}</div>`;
        }
        return `
          <div class="history-item">
            <div class="history-icon">${item.icon}</div>
            <div class="history-content">
              <h4>${item.title}</h4>
              ${dataHtml}
            </div>
            <div class="history-time">${formatDate(item.time)}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function escapeHtmlAttr(text) {
  return (text || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function copyPromoCode(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    const original = btn.textContent;
    btn.textContent = 'تم النسخ ✓';
    btn.style.background = 'var(--accent)';
    setTimeout(() => {
      btn.textContent = original;
      btn.style.background = 'var(--ink)';
    }, 2000);
  }).catch(() => {
    const textarea = document.createElement('textarea');
    textarea.value = code;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    const original = btn.textContent;
    btn.textContent = 'تم النسخ ✓';
    setTimeout(() => { btn.textContent = original; }, 2000);
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('ar-SA', {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}
