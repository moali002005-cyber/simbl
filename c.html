<style>
:root{--cream:#ffffff;--cream-darker:#f5f5f4;--ink:#0a0a0a;--ink-soft:#3a3a3a;--ink-muted:#6b6b6b;--ink-faint:#a0a0a0;--accent:#13B9B2;--accent-ink:#0c4f4b;--gold:#E8B84B;--line:rgba(10,10,10,0.08);--font-display:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;--font-body:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(180deg,#f7fbfb,#eef6f5);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.7;min-height:100vh;}
.topbar{display:flex;justify-content:center;padding:18px;}
.logo{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--ink);}
.logo-eye{width:38px;height:38px;display:block;}
.logo-mark{font-family:var(--font-display);font-size:15px;font-weight:500;position:relative;padding-left:10px;line-height:1;}
.logo-mark::after{content:'';position:absolute;bottom:0;left:0;width:4px;height:4px;background:var(--accent);border-radius:50%;}
.wrap{max-width:440px;margin:0 auto;padding:6px 16px 50px;}
.mk-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:0 22px 24px;text-align:center;box-shadow:0 20px 50px -28px rgba(12,79,75,0.45);position:relative;overflow:hidden;}
.mk-band{height:74px;margin:0 -22px 0;background:linear-gradient(120deg,#13B9B2,#0c4f4b);}
.mk-ring{width:104px;height:104px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;margin:-52px auto 10px;box-shadow:0 6px 18px -8px rgba(0,0,0,0.3);}
.mk-ring img,.mk-ring>div{width:96px!important;height:96px!important;font-size:36px!important;}
.mk-name{font-family:var(--font-display);font-size:21px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.mk-handle{color:var(--ink-muted);font-size:14px;margin-top:2px;}
.cflag{width:20px;height:14px;border-radius:2px;overflow:hidden;object-fit:cover;display:inline-block;vertical-align:middle;box-shadow:0 0 0 1px rgba(10,10,10,0.10);}
.vbadge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:100px;}
.vbadge.verified{background:rgba(19,185,178,0.14);color:var(--accent-ink);}
.vbadge.promising{background:rgba(232,184,75,0.16);color:#8a6500;}
.mk-medal{display:flex;justify-content:center;margin:14px 0 2px;}
.mk-rank-t{font-family:var(--font-display);font-weight:700;color:var(--accent-ink);font-size:15px;margin-bottom:6px;}
.mk-rankpill{display:inline-block;background:rgba(19,185,178,0.12);color:var(--accent-ink);font-weight:600;font-size:13px;padding:6px 14px;border-radius:100px;margin:14px 0 4px;}
.mk-score{margin:16px 0 6px;}
.mk-score-n{font-family:var(--font-display);font-weight:800;font-size:46px;color:var(--accent-ink);display:block;line-height:1;}
.mk-score-l{font-size:12px;color:var(--ink-muted);}
.mk-stars{margin-bottom:6px;}
.row-stars{display:inline-flex;align-items:center;gap:2px;font-size:16px;}
.ts{color:#dde1e4;}.ts.on{color:var(--gold);}
.row-ravg{font-weight:700;color:var(--accent-ink);margin-inline-start:6px;font-size:14px;}
.row-rcount{color:var(--ink-muted);font-size:12px;margin-inline-start:4px;}
.mk-stats{display:flex;justify-content:center;gap:0;margin:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 0;}
.mk-stat{flex:1;}
.mk-stat .n{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--ink);}
.mk-stat .l{font-size:11px;color:var(--ink-muted);}
.mk-stat+.mk-stat{border-right:1px solid var(--line);}
.mk-crit{text-align:right;margin:14px 2px;}
.cbar-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;margin:8px 0;}
.cbar-label{font-size:13px;color:var(--ink-soft);white-space:nowrap;}
.cbar-track{height:7px;background:var(--cream-darker);border-radius:100px;overflow:hidden;}
.cbar-fill{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#0c8f89);border-radius:100px;}
.cbar-val{font-size:12.5px;font-weight:700;color:var(--accent-ink);min-width:26px;text-align:left;}
.mk-bio{font-size:14px;color:var(--ink-soft);background:var(--cream-darker);border-radius:14px;padding:12px 14px;margin:8px 0 4px;text-align:center;}
.mk-cta{display:block;background:var(--accent);color:#fff;text-decoration:none;font-weight:700;font-size:16px;padding:15px;border-radius:14px;margin-top:18px;box-shadow:0 10px 24px -10px rgba(19,185,178,0.7);}
.mk-cta2{display:block;color:var(--accent-ink);text-decoration:none;font-weight:600;font-size:14px;padding:12px;margin-top:8px;}
.mk-foot{margin-top:14px;font-size:12px;color:var(--ink-faint);}
.mk-foot a{color:var(--ink-faint);text-decoration:none;}
.nf{text-align:center;padding:50px 20px;color:var(--ink-muted);}
.nf a{color:var(--accent-ink);font-weight:700;}
.mkload{text-align:center;padding:60px 20px;color:var(--ink-muted);}
/* الميدالية (مطابقة للنخبة) */
.medal{position:relative;width:90px;height:84px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.medal::before{content:'';position:absolute;inset:2px;border-radius:50%;z-index:0;}
.m1::before{background:radial-gradient(circle,rgba(232,184,75,0.40),transparent 64%);}
.m2::before{background:radial-gradient(circle,rgba(199,204,209,0.46),transparent 64%);}
.m3::before{background:radial-gradient(circle,rgba(205,139,92,0.40),transparent 64%);}
.emblem{position:relative;z-index:2;width:90px;height:84px;overflow:visible;filter:drop-shadow(0 4px 6px rgba(60,40,0,0.30));}
</style>

function avatarInner(c, size, fs){

  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:rgba(19,185,178,0.14);color:#0c4f4b;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:'+fs+'px;">'+escHtml(initial)+'</div>';

/* ===================== درجة الثقة (0–100) ===================== */
// خلطة الإطلاق: درجة بداية عالية للكل (ثابتة لكل مؤثر) + إشارة متابعين بسيطة،
// وأول ما تجي تقييمات حقيقية تبدأ تسحب الدرجة لمكانها الصح (القوي يطلع، الضعيف ينزل).
const PRIOR_MEAN = 4.4;     // متوسط مبدئي افتراضي (من 5)
const PRIOR_STRENGTH = 4;   // قوة المتوسط المبدئي (يسحب قليل التقييمات نحوه)
const REAL_RAMP = 6;        // كل ما زادت التقييمات، طغى التقييم الحقيقي على درجة البداية

function hashId(id){ let h=0; const s=String(id||''); for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function seedScore(id){ return 82 + (hashId(id)%14); } // 82..95 ثابتة لكل مؤثر
function followerBonus(f){ f=parseInt(f)||0; if(f<=0) return 0; return Math.max(0, Math.min(5, Math.log10(f+1)-3)); }

// تقييم مبدئي عالٍ وثابت لكل مؤثر (4.3..4.9) — يظهر وقت الإطلاق قبل أي تقييم حقيقي
function seedRating(id){ return 4.3 + (hashId(id + 'r') % 7) / 10; }

// التقييم المعروض: يبدأ من المبدئي وينجذب تلقائيًا للتقييم الحقيقي كل ما زادت التقييمات
function displayRating(c){
  const ratings = Number(c.ratings_count)||0;
  const avg = Number(c.avg_rating)||0;
  const seed = seedRating(c.id);
  return (PRIOR_STRENGTH*seed + avg*ratings) / (PRIOR_STRENGTH + ratings);
}

function trustScore(c){
  const seed = seedScore(c.id) + followerBonus(c.followers); // درجة بداية (~82..100)
  const ratings = Number(c.ratings_count)||0;
  const avg = Number(c.avg_rating)||0;
  const deals = Number(c.deals_count)||0;

  // تقييم بايز المرجّح (يبدأ من التقييم المبدئي للمؤثر وينجذب لتقييمه الحقيقي)
  const bayes = displayRating(c);
  const ratingScore = (bayes/5)*100;

  // وزن الجزء الحقيقي يكبر مع عدد التقييمات
  const wReal = ratings / (ratings + REAL_RAMP);

  // مكوّن الإثبات: صفقات مكتملة (بسقف عشان ما يطغى على الجودة)
  const dealsBoost = Math.min(deals, 20) * 0.4; // حتى +8

  let s = (1 - wReal) * seed + wReal * ratingScore + dealsBoost;
  return Math.max(0, Math.min(100, s));
}

function badgeHtml(c){
  const deals = Number(c.deals_count)||0;
  if (deals >= 1) return '<span class="vbadge verified">موثّق ✓</span>';
  return '<span class="vbadge promising">واعد</span>';
}
function starsHtml(c){
  const ratings = Number(c.ratings_count)||0;
  const dr = displayRating(c);
  const full = Math.round(dr);
  let s=''; for(let i=1;i<=5;i++) s += '<span class="ts'+(i<=full?' on':'')+'">★</span>';
  const tail = ratings > 0
    ? '<span class="row-rcount">('+toArabic(ratings)+' تقييم)</span>'
    : '';
  return '<div class="row-stars">'+s+'<span class="row-ravg">'+dr.toFixed(1)+'</span>'+tail+'</div>';
}


function critSeed(id, key){ return 4.2 + (hashId(key + ':' + id) % 8) / 10; } // 4.2..4.9 ثابتة لكل معيار
function critBars(c){
  const ratings = Number(c.ratings_count)||0;
  const crits = [
    ['جودة المحتوى', 'content', c.avg_content],
    ['الالتزام بالمواعيد', 'punct', c.avg_punctuality],
    ['التواصل والاحترافية', 'comm', c.avg_communication],
    ['النتائج والتفاعل', 'res', c.avg_results]
  ];
  return crits.map(function(it){
    const seed = critSeed(c.id, it[1]);
    const real = Number(it[2])||0;
    const v = ratings>0 ? (PRIOR_STRENGTH*seed + real*ratings)/(PRIOR_STRENGTH+ratings) : seed;
    const pct = Math.max(0, Math.min(100, (v/5)*100));
    return '<div class="cbar-row"><span class="cbar-label">'+it[0]+'</span>'
      + '<span class="cbar-track"><span class="cbar-fill" style="width:'+pct+'%"></span></span>'
      + '<span class="cbar-val">'+v.toFixed(1)+'</span></div>';
  }).join('');
}

    +   '</g>'

}



const params = new URLSearchParams(location.search);
const qU = (params.get('u')||'').replace(/^@/,'').trim().toLowerCase();
const qId = (params.get('id')||'').trim();

function render(c){
  const catLabel = CAT[c.category]||c.category||'';
  const platLabel = PLAT[c.platform]||c.platform||'';
  const rank = c.rank;
  let rankBlock='';
  if(rank>=1 && rank<=3){
    rankBlock = '<div class="mk-medal">'+medallion(rank)+'</div>'
      + '<div class="mk-rank-t">'+['المركز الأول','المركز الثاني','المركز الثالث'][rank-1]+' على سيمبل هذا الأسبوع</div>';
  } else if(rank>=1 && rank<=100){
    rankBlock = '<div class="mk-rankpill">ضمن أفضل ١٠٠ مؤثر · المركز '+toArabic(rank)+'</div>';
  }
  document.getElementById('mk').innerHTML =
    '<div class="mk-card">'
    + '<div class="mk-band"></div>'
    + '<div class="mk-ring">'+avatarInner(c,96,36)+'</div>'
    + '<div class="mk-name">'+flagOf(c.country||'SA')+' '+escHtml(c.name||'')+' '+badgeHtml(c)+'</div>'
    + (c.handle?'<div class="mk-handle">'+escHtml(c.handle)+'</div>':'')
    + rankBlock
    + '<div class="mk-score"><span class="mk-score-n">'+Math.round(c.score)+'</span><span class="mk-score-l">درجة الثقة من ١٠٠</span></div>'
    + '<div class="mk-stars">'+starsHtml(c)+'</div>'
    + '<div class="mk-stats">'
    +   '<div class="mk-stat"><div class="n">'+fmtFollowers(c.followers)+'</div><div class="l">متابع</div></div>'
    +   '<div class="mk-stat"><div class="n">'+escHtml(platLabel)+'</div><div class="l">المنصة</div></div>'
    +   (catLabel?'<div class="mk-stat"><div class="n">'+escHtml(catLabel)+'</div><div class="l">التصنيف</div></div>':'')
    + '</div>'
    + '<div class="mk-crit">'+critBars(c)+'</div>'
    + (c.bio?'<div class="mk-bio">'+escHtml(c.bio)+'</div>':'')
    + '<a class="mk-cta" href="/creators.html?id='+encodeURIComponent(c.id)+'">تواصل عبر سيمبل</a>'
    + '<a class="mk-cta2" href="/signup.html">سجّل كمؤثر مثلهم على سيمبل</a>'
    + '<div class="mk-foot"><a href="/">مدعوم بمنصة سيمبل</a></div>'
    + '</div>';
  document.title = (c.name||'مؤثر')+' · سيمبل';
}

async function init(){
  const mk = document.getElementById('mk');
  const key = (qId || (params.get('u')||'')).trim();
  if(!key){ mk.innerHTML='<div class="nf">رابط غير مكتمل.<br><a href="/creators.html">تصفّح كل المؤثرين ←</a></div>'; return; }
  try{
    const profRes = await supabaseClient.rpc('public_creator', { p_key: key });
    let prof = (profRes && profRes.data && profRes.data[0]) ? profRes.data[0] : null;
    if(!prof){ mk.innerHTML='<div class="nf">ما لقينا هذا المؤثر.<br><a href="/creators.html">تصفّح كل المؤثرين ←</a></div>'; return; }
    prof.deals_count=Number(prof.deals_count)||0; prof.ratings_count=Number(prof.ratings_count)||0; prof.avg_rating=Number(prof.avg_rating)||0;
    prof.avg_content=Number(prof.avg_content)||0; prof.avg_punctuality=Number(prof.avg_punctuality)||0; prof.avg_communication=Number(prof.avg_communication)||0; prof.avg_results=Number(prof.avg_results)||0;
    prof.score = trustScore(prof);

    let rank = 0;
    try{
      const [dirRes, trustRes] = await Promise.all([
        supabaseClient.from('creator_directory').select('id, followers'),
        supabaseClient.from('creator_trust').select('creator_id, ratings_count, avg_rating, deals_count')
      ]);
      const dir = (dirRes.data||[]).slice();
      const tmap={}; (trustRes.data||[]).forEach(function(t){ tmap[t.creator_id]=t; });
      dir.forEach(function(c){ var t=tmap[c.id]||{}; c.ratings_count=Number(t.ratings_count)||0; c.avg_rating=Number(t.avg_rating)||0; c.deals_count=Number(t.deals_count)||0; c.score=trustScore(c); });
      if(!dir.some(function(c){ return String(c.id)===String(prof.id); })){
        dir.push({ id: prof.id, followers: prof.followers, ratings_count: prof.ratings_count, avg_rating: prof.avg_rating, deals_count: prof.deals_count, score: prof.score });
      }
      dir.sort(function(a,b){ return (b.score-a.score)||(b.ratings_count-a.ratings_count)||((parseInt(b.followers)||0)-(parseInt(a.followers)||0)); });
      for(var i=0;i<dir.length;i++){ if(String(dir[i].id)===String(prof.id)){ rank=i+1; break; } }
    }catch(e){ console.error('rank', e); }
    prof.rank = rank;
    render(prof);
  }catch(e){ console.error(e); mk.innerHTML='<div class="nf">صار خطأ في التحميل. حدّث الصفحة وحاول مرة ثانية.</div>'; }
}
init();

</script>
