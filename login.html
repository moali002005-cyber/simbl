<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول - سيمبل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #ffffff;
  --cream-darker: #f5f5f4;
  --ink: #0a0a0a;
  --ink-soft: #3a3a3a;
  --ink-muted: #6b6b6b;
  --ink-faint: #a0a0a0;
  --accent: #13B9B2;
  --accent-soft: #7fd6d2;
  --accent-ink: #0c4f4b;
  --line: rgba(10, 10, 10, 0.08);
  --line-strong: rgba(10, 10, 10, 0.16);
  --font-display: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-serif: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 400;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; width: 100%; position: relative; z-index: 2; }

.nav { padding: 24px 0; border-bottom: 1px solid var(--line); }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); }
.logo-eye { width: 44px; height: 44px; display: block; flex-shrink: 0; }
.logo-mark {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0;
  position: relative;
}
.logo-mark::after {
  content: '';
  position: absolute;
  bottom: 6px;
  inset-inline-end: -8px;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
}
.back-link { color: var(--ink-soft); text-decoration: none; font-size: 14px; }
.back-link:hover { color: var(--accent); }

.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  position: relative;
  z-index: 2;
}

.login-card {
  background: #fff;
  border-radius: 24px;
  padding: 48px;
  max-width: 480px;
  width: 100%;
  border: 1px solid var(--line);
  box-shadow: 0 18px 50px -28px rgba(10,10,10,.2);
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0;
  color: var(--accent-ink);
  margin-bottom: 16px;
}
.eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--accent); }

h1 {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin-bottom: 12px;
}
h1 .italic { font-family: var(--font-display); font-style: normal; color: var(--accent); }

.subtitle { font-size: 15px; color: var(--ink-soft); margin-bottom: 32px; }

.field { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; }
input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 15px;
  background: #fff;
  color: var(--ink);
  transition: all 0.2s;
}
input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(19, 185, 178, 0.14);
}
input::placeholder { color: var(--ink-faint); }

.btn-submit {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-submit:hover { background: var(--accent); transform: translateY(-1px); }
.btn-submit:disabled { background: var(--ink-faint); cursor: not-allowed; transform: none; }

.error-box {
  display: none;
  padding: 14px 16px;
  background: var(--cream-darker);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  color: var(--ink);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 20px;
}
.error-box.show { display: block; }
.error-box a { color: var(--accent-ink); font-weight: 500; text-decoration: underline; }

.bottom-link {
  text-align: center;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  font-size: 14px;
  color: var(--ink-muted);
}
.bottom-link a { color: var(--accent-ink); text-decoration: none; font-weight: 500; }

.info-note {
  font-size: 13px;
  color: var(--ink-muted);
  background: var(--cream-darker);
  padding: 14px 16px;
  border-radius: 10px;
  margin-bottom: 24px;
  line-height: 1.6;
}

@media (max-width: 540px) {
  .login-card { padding: 32px 24px; }
  h1 { font-size: 28px; }
  .logo-eye { width: 38px; height: 38px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg class="logo-eye" viewBox="0 0 200 200" aria-hidden="true">
        <g fill="none" stroke-linejoin="miter" stroke-miterlimit="6" stroke-linecap="round">
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="8" transform="rotate(25 100 100)"/>
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="8" transform="rotate(-25 100 100)"/>
          <path d="M76 100 Q100 88 124 100 Q100 112 76 100 Z" fill="#ffffff" stroke="#13B9B2" stroke-width="6"/>
          <circle cx="100" cy="100" r="7" fill="#0a0a0a"/>
        </g>
      </svg>
      <span class="logo-mark">سيمبل</span>
    </a>
    <a href="/" class="back-link">← العودة للرئيسية</a>
  </div>
</nav>

<main class="main">
  <div class="login-card">
    <div class="eyebrow">تسجيل دخول</div>
    <h1>أهلاً بعودتك <span class="italic">إلى سيمبل</span></h1>
    <p class="subtitle">أدخل بريدك الإلكتروني للدخول إلى حسابك.</p>

    <div class="info-note">
      🔐 حالياً نستخدم تسجيل دخول مبسط بالبريد الإلكتروني فقط. سيتم إضافة كلمات السر قريباً.
    </div>

    <div class="error-box" id="error-box"></div>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email-input" required placeholder="example@email.com" autocomplete="email">
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">دخول</button>
    </form>

    <p class="bottom-link">ما عندك حساب بعد؟ <a href="/signup.html">سجل الآن</a></p>
  </div>
</main>

<script src="supabase-config.js"></script>
<script>
async function handleLogin(event) {
  event.preventDefault();
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  const submitBtn = document.getElementById('submit-btn');
  const errorBox = document.getElementById('error-box');

  errorBox.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري التحقق...';

  try {
    const { data, error } = await supabaseClient
      .from('users')
      .select('*')
      .eq('email', email)
      .maybeSingle();

    if (error) throw error;

    if (!data) {
      errorBox.innerHTML = 'لا يوجد حساب بهذا البريد الإلكتروني. <a href="/signup.html">سجل حساب جديد</a>';
      errorBox.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'دخول';
      return;
    }

    saveCurrentUser(data);

    if (data.role === 'creator') {
      window.location.href = '/creator.html';
    } else if (data.role === 'brand') {
      window.location.href = '/brand.html';
    } else {
      throw new Error('نوع الحساب غير معروف');
    }
  } catch (err) {
    console.error(err);
    errorBox.textContent = 'حصل خطأ. حاول مرة أخرى.';
    errorBox.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'دخول';
  }
}
</script>

</body>
</html>
