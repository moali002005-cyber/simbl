<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول - سيمبل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #ffffff;
  --cream-darker: #f5f5f4;
  --ink: #0a0a0a;
  --ink-soft: #3a3a3a;
  --ink-muted: #6b6b6b;
  --ink-faint: #a0a0a0;
  --accent: #13B9B2;
  --accent-soft: #7fd6d2;
  --accent-ink: #0c4f4b;
  --line: rgba(10, 10, 10, 0.08);
  --line-strong: rgba(10, 10, 10, 0.16);
  --font-display: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-serif: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 400;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; width: 100%; position: relative; z-index: 2; }

.nav { padding: 24px 0; border-bottom: 1px solid var(--line); }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); }
.logo-eye { width: 44px; height: 44px; display: block; flex-shrink: 0; }
.logo-mark {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0;
  position: relative;
}
.logo-mark::after {
  content: '';
  position: absolute;
  bottom: 6px;
  inset-inline-end: -8px;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
}
.back-link { color: var(--ink-soft); text-decoration: none; font-size: 14px; }
.back-link:hover { color: var(--accent); }

.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  position: relative;
  z-index: 2;
}

.login-card {
  background: #fff;
  border-radius: 24px;
  padding: 48px;
  max-width: 480px;
  width: 100%;
  border: 1px solid var(--line);
  box-shadow: 0 18px 50px -28px rgba(10,10,10,.2);
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0;
  color: var(--accent-ink);
  margin-bottom: 16px;
}
.eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--accent); }

h1 {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin-bottom: 12px;
}
h1 .italic { font-family: var(--font-display); font-style: normal; color: var(--accent); }

.subtitle { font-size: 15px; color: var(--ink-soft); margin-bottom: 32px; }

.field { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; }
input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 15px;
  background: #fff;
  color: var(--ink);
  transition: all 0.2s;
}
input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(19, 185, 178, 0.14);
}
input::placeholder { color: var(--ink-faint); }

.btn-submit {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-submit:hover { background: var(--accent); transform: translateY(-1px); }
.btn-submit:disabled { background: var(--ink-faint); cursor: not-allowed; transform: none; }

.tabs {
  display: flex;
  gap: 6px;
  background: var(--cream-darker);
  padding: 5px;
  border-radius: 12px;
  margin-bottom: 24px;
}
.tab {
  flex: 1;
  padding: 11px;
  border: none;
  background: transparent;
  border-radius: 9px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(10,10,10,0.06); }
.pane { display: none; }
.pane.active { display: block; }
.muted-link {
  display: inline;
  background: none;
  border: none;
  color: var(--accent-ink);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.field-hint { font-size: 12px; color: var(--ink-muted); margin-top: 6px; }

.error-box {
  display: none;
  padding: 14px 16px;
  background: var(--cream-darker);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  color: var(--ink);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 20px;
}
.error-box.show { display: block; }
.error-box a { color: var(--accent-ink); font-weight: 500; text-decoration: underline; }

.bottom-link {
  text-align: center;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  font-size: 14px;
  color: var(--ink-muted);
}
.bottom-link a { color: var(--accent-ink); text-decoration: none; font-weight: 500; }

.info-note {
  font-size: 13px;
  color: var(--ink-muted);
  background: var(--cream-darker);
  padding: 14px 16px;
  border-radius: 10px;
  margin-bottom: 24px;
  line-height: 1.6;
}

@media (max-width: 540px) {
  .login-card { padding: 32px 24px; }
  h1 { font-size: 28px; }
  .logo-eye { width: 38px; height: 38px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg class="logo-eye" viewBox="0 0 200 200" aria-hidden="true">
        <g fill="none" stroke-linejoin="miter" stroke-miterlimit="6" stroke-linecap="round">
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="8" transform="rotate(25 100 100)"/>
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="8" transform="rotate(-25 100 100)"/>
          <path d="M76 100 Q100 88 124 100 Q100 112 76 100 Z" fill="#ffffff" stroke="#13B9B2" stroke-width="6"/>
          <circle cx="100" cy="100" r="7" fill="#0a0a0a"/>
        </g>
      </svg>
      <span class="logo-mark">سيمبل</span>
    </a>
    <a href="/" class="back-link">← العودة للرئيسية</a>
  </div>
</nav>

<main class="main">
  <div class="login-card">
    <div class="eyebrow">تسجيل دخول</div>
    <h1>أهلاً بعودتك <span class="italic">إلى سيمبل</span></h1>
    <p class="subtitle">اختر طريقة الدخول إلى حسابك.</p>

    <div class="error-box" id="error-box"></div>

    <div class="tabs">
      <button type="button" class="tab active" id="tab-password" onclick="switchTab('password')">كلمة السر</button>
      <button type="button" class="tab" id="tab-otp" onclick="switchTab('otp')">كود على الإيميل</button>
    </div>

    <!-- طريقة كلمة السر -->
    <div class="pane active" id="pane-password">
      <form onsubmit="loginWithPassword(event)">
        <div class="field">
          <label>البريد الإلكتروني</label>
          <input type="email" id="pw-email" required placeholder="example@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>كلمة السر</label>
          <input type="password" id="pw-password" required placeholder="كلمة السر" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit" id="pw-btn">دخول</button>
      </form>
    </div>

    <!-- طريقة كود الإيميل (OTP) -->
    <div class="pane" id="pane-otp">
      <!-- الخطوة ١: إدخال الإيميل -->
      <form onsubmit="sendOtp(event)" id="otp-email-form">
        <div class="field">
          <label>البريد الإلكتروني</label>
          <input type="email" id="otp-email" required placeholder="example@email.com" autocomplete="email">
          <div class="field-hint">نرسل لك كود مكوّن من ٦ أرقام على بريدك.</div>
        </div>
        <button type="submit" class="btn-submit" id="otp-send-btn">إرسال الكود</button>
      </form>
      <!-- الخطوة ٢: إدخال الكود -->
      <form onsubmit="verifyOtp(event)" id="otp-code-form" style="display:none">
        <div class="field">
          <label>الكود المرسل إلى <span id="otp-email-label" style="color:var(--accent-ink)"></span></label>
          <input type="text" id="otp-code" required placeholder="••••••" inputmode="numeric" maxlength="6" autocomplete="one-time-code" style="text-align:center; letter-spacing:8px; font-size:20px">
          <div class="field-hint">
            ما وصلك الكود؟ <button type="button" class="muted-link" onclick="resendOtp()">إعادة الإرسال</button>
            · <button type="button" class="muted-link" onclick="resetOtp()">تغيير الإيميل</button>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="otp-verify-btn">تأكيد ودخول</button>
      </form>
    </div>

    <p class="bottom-link">ما عندك حساب بعد؟ <a href="/signup.html">سجل الآن</a></p>
  </div>
</main>

<script src="supabase-config.js"></script>
<script>
function switchTab(which) {
  const isPw = which === 'password';
  document.getElementById('tab-password').classList.toggle('active', isPw);
  document.getElementById('tab-otp').classList.toggle('active', !isPw);
  document.getElementById('pane-password').classList.toggle('active', isPw);
  document.getElementById('pane-otp').classList.toggle('active', !isPw);
  hideError();
}

function showError(html) {
  const box = document.getElementById('error-box');
  box.innerHTML = html;
  box.classList.add('show');
}
function hideError() {
  document.getElementById('error-box').classList.remove('show');
}

// بعد نجاح المصادقة: نجيب ملف المستخدم من جدول users ونوجّهه
async function finishLogin(email, authUser) {
  let profile = null;

  // نحاول الربط عبر auth_id أولاً
  if (authUser && authUser.id) {
    const { data } = await supabaseClient
      .from('users').select('id, role, name, platform, handle, followers, category, price, bio, company_name, industry, size, position, website, created_at, auth_id, approval_status, cr_number, is_test').eq('auth_id', authUser.id).maybeSingle();
    profile = data || null;
  }
  // احتياطي: عبر الإيميل (ونربط auth_id لو ناقص)
  if (!profile && email) {
    const { data } = await supabaseClient
      .from('users').select('id, role, name, platform, handle, followers, category, price, bio, company_name, industry, size, position, website, created_at, auth_id, approval_status, cr_number, is_test').eq('email', email).maybeSingle();
    profile = data || null;
    if (profile && authUser && authUser.id && !profile.auth_id) {
      try {
        await supabaseClient.from('users').update({ auth_id: authUser.id }).eq('id', profile.id);
      } catch (e) {}
    }
  }

  if (!profile) {
    showError('لا يوجد ملف حساب مرتبط بهذا البريد. <a href="/signup.html">سجل حساب جديد</a>');
    return false;
  }

  saveCurrentUser(profile);
  if (profile.role === 'creator') {
    window.location.href = '/creator.html';
  } else if (profile.role === 'brand') {
    window.location.href = '/brand.html';
  } else {
    showError('نوع الحساب غير معروف.');
    return false;
  }
  return true;
}

// ===== طريقة كلمة السر =====
async function loginWithPassword(event) {
  event.preventDefault();
  hideError();
  const email = document.getElementById('pw-email').value.trim().toLowerCase();
  const password = document.getElementById('pw-password').value;
  const btn = document.getElementById('pw-btn');
  btn.disabled = true; btn.textContent = 'جاري التحقق...';

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      if ((error.message || '').toLowerCase().includes('invalid')) {
        showError('البريد الإلكتروني أو كلمة السر غير صحيحة.');
      } else {
        showError('حصل خطأ. حاول مرة أخرى.');
      }
      btn.disabled = false; btn.textContent = 'دخول';
      return;
    }
    await finishLogin(email, data.user);
  } catch (err) {
    console.error(err);
    showError('حصل خطأ. حاول مرة أخرى.');
    btn.disabled = false; btn.textContent = 'دخول';
  }
}

// ===== طريقة كود الإيميل (OTP) =====
let otpEmail = '';

async function sendOtp(event) {
  if (event) event.preventDefault();
  hideError();
  otpEmail = document.getElementById('otp-email').value.trim().toLowerCase();
  const btn = document.getElementById('otp-send-btn');
  btn.disabled = true; btn.textContent = 'جاري الإرسال...';

  try {
    // shouldCreateUser:false → لا ننشئ حساب جديد من صفحة الدخول
    const { error } = await supabaseClient.auth.signInWithOtp({
      email: otpEmail,
      options: { shouldCreateUser: false }
    });
    if (error) {
      const m = (error.message || '').toLowerCase();
      if (m.includes('not') && (m.includes('found') || m.includes('exist') || m.includes('signups'))) {
        showError('لا يوجد حساب بهذا البريد. <a href="/signup.html">سجل حساب جديد</a>');
      } else {
        showError('تعذّر إرسال الكود. تأكد من البريد وحاول مرة أخرى.');
      }
      btn.disabled = false; btn.textContent = 'إرسال الكود';
      return;
    }
    document.getElementById('otp-email-label').textContent = otpEmail;
    document.getElementById('otp-email-form').style.display = 'none';
    document.getElementById('otp-code-form').style.display = 'block';
    document.getElementById('otp-code').focus();
    btn.disabled = false; btn.textContent = 'إرسال الكود';
  } catch (err) {
    console.error(err);
    showError('حصل خطأ. حاول مرة أخرى.');
    btn.disabled = false; btn.textContent = 'إرسال الكود';
  }
}

function resendOtp() { if (otpEmail) sendOtp(); }
function resetOtp() {
  hideError();
  document.getElementById('otp-code-form').style.display = 'none';
  document.getElementById('otp-email-form').style.display = 'block';
  document.getElementById('otp-code').value = '';
}

async function verifyOtp(event) {
  event.preventDefault();
  hideError();
  const token = document.getElementById('otp-code').value.trim();
  const btn = document.getElementById('otp-verify-btn');
  btn.disabled = true; btn.textContent = 'جاري التحقق...';

  try {
    const { data, error } = await supabaseClient.auth.verifyOtp({
      email: otpEmail,
      token,
      type: 'email'
    });
    if (error) {
      showError('الكود غير صحيح أو منتهي. أعد المحاولة.');
      btn.disabled = false; btn.textContent = 'تأكيد ودخول';
      return;
    }
    await finishLogin(otpEmail, data.user);
  } catch (err) {
    console.error(err);
    showError('حصل خطأ. حاول مرة أخرى.');
    btn.disabled = false; btn.textContent = 'تأكيد ودخول';
  }
}
</script>

</body>
</html>
