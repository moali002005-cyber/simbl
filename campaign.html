<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحملة - سيمبل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #ffffff;
  --cream-darker: #f5f5f4;
  --ink: #0a0a0a;
  --ink-soft: #3a3a3a;
  --ink-muted: #6b6b6b;
  --ink-faint: #a0a0a0;
  --accent: #13B9B2;
  --accent-soft: #7fd6d2;
  --accent-ink: #0c4f4b;
  --olive: #13B9B2;
  --gold: #6b6b6b;
  --line: rgba(10, 10, 10, 0.08);
  --line-strong: rgba(10, 10, 10, 0.16);
  --success: #13B9B2;
  --font-display: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-serif: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 400;
  min-height: 100vh;
}
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
.nav { background: var(--cream); padding: 18px 0; border-bottom: 1px solid var(--line); }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); }
.logo-eye { width: 42px; height: 42px; display: block; flex-shrink: 0; }
.logo-mark {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 600; letter-spacing: 0;
  position: relative;
}
.logo-mark::after {
  content: ''; position: absolute; bottom: 5px; inset-inline-end: -8px;
  width: 5px; height: 5px; background: var(--accent); border-radius: 50%;
}
.back-link { color: var(--ink-muted); text-decoration: none; font-size: 14px; }
.back-link:hover { color: var(--accent); }

.page { padding: 40px 0 80px; }

.campaign-header {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 32px;
  margin-bottom: 24px;
}
.brand-line { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink-muted); margin-bottom: 12px; }
.brand-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--cream-darker); color: var(--ink-soft);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600;
}
h1 { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 12px; }
.desc { color: var(--ink-soft); margin-bottom: 24px; line-height: 1.7; }
.meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  padding-top: 20px; border-top: 1px solid var(--line);
}
.meta-item .label { font-size: 12px; color: var(--ink-muted); letter-spacing: 0; margin-bottom: 6px; }
.meta-item .val { font-family: var(--font-display); font-weight: 500; font-size: 15px; }

.section-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600;
  margin: 32px 0 16px; letter-spacing: 0;
  display: flex; align-items: center; gap: 10px;
}
.badge-live {
  font-size: 11px; font-weight: 500; padding: 4px 10px;
  background: rgba(19, 185, 178, 0.12); color: var(--accent-ink);
  border-radius: 100px; display: inline-flex; align-items: center; gap: 6px;
}
.badge-live::before {
  content: ''; width: 6px; height: 6px; background: var(--accent);
  border-radius: 50%; animation: pulse 1.5s infinite;
}
.badge-closed {
  font-size: 11px; font-weight: 500; padding: 4px 10px;
  background: var(--ink); color: #fff;
  border-radius: 100px;
}
.badge-awaiting {
  font-size: 11px; font-weight: 500; padding: 4px 10px;
  background: rgba(19, 185, 178, 0.10); color: #0c4f4b;
  border-radius: 100px;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.application-summary {
  background: var(--cream-darker);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
}
.creator-info h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.creator-info .meta { font-size: 13px; color: var(--ink-muted); }
.offer-price { font-family: var(--font-display); font-size: 24px; font-weight: 600; color: var(--accent-ink); letter-spacing: -0.01em; }

.chat {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 24px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 500px;
}
.chat-header {
  padding: 16px 24px;
  background: var(--ink);
  color: #fff;
  display: flex; align-items: center; gap: 12px;
}
.agent-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600;
}
.agent-info h4 { font-family: var(--font-display); font-size: 15px; font-weight: 500; }
.agent-info .status { font-size: 11px; opacity: 0.7; }

.messages {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
  max-height: 480px;
}
.msg { display: flex; gap: 12px; max-width: 85%; }
.msg.from-creator { align-self: flex-end; flex-direction: row-reverse; }
.msg-bubble { padding: 14px 18px; border-radius: 18px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.msg.from-agent .msg-bubble { background: var(--cream-darker); border-bottom-right-radius: 4px; }
.msg.from-creator .msg-bubble { background: var(--accent); color: #fff; border-bottom-left-radius: 4px; }
.msg-meta { font-size: 11px; color: var(--ink-faint); margin-top: 4px; text-align: end; }
.msg.from-creator .msg-meta { text-align: start; }

.typing {
  display: flex; gap: 4px;
  padding: 14px 18px;
  background: var(--cream-darker);
  border-radius: 18px;
  border-bottom-right-radius: 4px;
  align-self: flex-start;
}
.typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-muted); animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-8px); opacity: 1; }
}

.chat-input { padding: 16px 24px; border-top: 1px solid var(--line); display: flex; gap: 12px; }
.chat-input textarea {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  font-family: var(--font-body);
  font-size: 14px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  background: #fff;
  color: var(--ink);
}
.chat-input textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(19,185,178,0.14); }
.chat-input button {
  background: var(--ink);
  color: #fff;
  border: none;
  padding: 0 24px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-weight: 500;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}
.chat-input button:hover { background: var(--accent); }
.chat-input button:disabled { background: var(--ink-faint); cursor: not-allowed; }

.read-only-notice {
  background: var(--cream-darker);
  padding: 16px;
  text-align: center;
  font-size: 13px;
  color: var(--ink-muted);
  border-top: 1px solid var(--line);
}
.read-only-notice.awaiting {
  background: rgba(19, 185, 178, 0.06);
  color: #0c4f4b;
  font-weight: 500;
}

.deal-closed-banner {
  background: linear-gradient(135deg, #13B9B2, #0e9a94);
  color: #fff;
  padding: 24px 28px;
  border-radius: 20px;
  margin-top: 20px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 20px;
  align-items: center;
}
.deal-icon {
  width: 56px; height: 56px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
}
.deal-content h3 { font-family: var(--font-display); font-size: 20px; margin-bottom: 6px; }
.deal-content p { font-size: 14px; opacity: 0.95; line-height: 1.6; }
.deal-content .price { font-family: var(--font-display); font-size: 26px; font-weight: 600; margin-top: 8px; }

/* ============ Awaiting brand approval banner ============ */
.deal-awaiting-banner {
  background: rgba(19, 185, 178, 0.04);
  border: 1px solid rgba(19, 185, 178, 0.28);
  color: var(--ink);
  padding: 24px 28px;
  border-radius: 20px;
  margin-top: 20px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 20px;
  align-items: center;
}
.deal-awaiting-banner .deal-icon {
  background: rgba(19, 185, 178, 0.16);
  color: #0c4f4b;
  font-size: 26px;
}
.deal-awaiting-banner h3 { font-family: var(--font-display); font-size: 20px; margin-bottom: 6px; color: var(--ink); }
.deal-awaiting-banner p { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
.deal-awaiting-banner .price {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  margin-top: 8px;
  color: var(--accent-ink);
}
.deal-awaiting-banner .approve-cta {
  display: inline-block;
  margin-top: 16px;
  background: var(--ink);
  color: #fff;
  padding: 12px 28px;
  border-radius: 100px;
  border: 0;
  font-weight: 500;
  font-family: var(--font-body);
  font-size: 14px;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.deal-awaiting-banner .approve-cta:hover { background: var(--accent); transform: translateY(-1px); }
.deal-awaiting-banner .approve-cta:disabled { opacity: 0.6; cursor: not-allowed; }

/* Swipe to approve */
.swipe-track {
  background: #fff;
  border: 1.5px solid rgba(19, 185, 178, 0.35);
  border-radius: 100px;
  position: relative;
  height: 64px;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  margin-top: 16px;
  max-width: 380px;
}
.swipe-hint {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #0c4f4b;
  font-weight: 500;
  pointer-events: none;
  z-index: 1;
  transition: opacity .15s, color .25s;
  font-family: var(--font-body);
}
.swipe-hint::before {
  content: '\2190';
  display: inline-block;
  margin-left: 8px;
  font-size: 17px;
  animation: swipe-nudge 1.4s ease-in-out infinite;
}
@keyframes swipe-nudge {
  0%, 100% { transform: translateX(0); opacity: 0.45; }
  50% { transform: translateX(-8px); opacity: 1; }
}
.swipe-track.done .swipe-hint::before { display: none; }
.swipe-thumb {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 48px; height: 48px;
  background: var(--ink);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 18px;
  cursor: grab;
  z-index: 2;
  transition: background .2s, right .25s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 600;
}
.swipe-thumb:hover { background: var(--accent); }
.swipe-thumb.dragging { cursor: grabbing; transition: background .2s; }
.swipe-fill {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 0;
  background: rgba(19, 185, 178, 0.15);
  border-radius: 100px 0 0 100px;
  z-index: 0;
  transition: width .25s cubic-bezier(0.4, 0, 0.2, 1);
}
.swipe-track.done {
  background: rgba(19, 185, 178, 0.1);
  border-color: rgba(19, 185, 178, 0.45);
}
.swipe-track.done .swipe-thumb { background: var(--accent); }
.swipe-track.done .swipe-hint { color: var(--accent-ink); }

.loading { text-align: center; padding: 60px; color: var(--ink-muted); }

@media (max-width: 640px) {
  .container { padding: 0 16px; }
  .campaign-header { padding: 24px; }
  h1 { font-size: 22px; }
  .application-summary { grid-template-columns: 1fr; }
  .offer-price { font-size: 20px; }
  .deal-closed-banner, .deal-awaiting-banner { grid-template-columns: 1fr; text-align: center; }
  .deal-icon { margin: 0 auto; }
  .logo-eye { width: 36px; height: 36px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg class="logo-eye" viewBox="0 0 200 200" aria-hidden="true">
        <g fill="none" stroke-linejoin="miter" stroke-miterlimit="6" stroke-linecap="round">
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="8" transform="rotate(25 100 100)"/>
          <path d="M30 100 C61.5 78 138.5 78 170 100 C138.5 122 61.5 122 30 100 Z" stroke="#0a0a0a" stroke-width="8" transform="rotate(-25 100 100)"/>
          <path d="M76 100 Q100 88 124 100 Q100 112 76 100 Z" fill="#ffffff" stroke="#13B9B2" stroke-width="6"/>
          <circle cx="100" cy="100" r="7" fill="#0a0a0a"/>
        </g>
      </svg>
      <span class="logo-mark">سيمبل</span>
    </a>
    <a href="javascript:history.back()" class="back-link">← العودة</a>
  </div>
</nav>

<main class="page">
  <div class="container" id="content">
    <div class="loading">جاري التحميل...</div>
  </div>
</main>

<script src="supabase-config.js"></script>
<script>
let currentUser = null;
let campaign = null;
let application = null;
let messages = [];
let isAgentThinking = false;
let dealClosed = false;
let approvedClose = false;
let dealDetails = null;
let pollInterval = null;

// ====== خرائط عرض الحقول الجديدة ======
const PUBLISH_TIMING_LABELS = {
  '24h': 'خلال ٢٤ ساعة (مستعجل)',
  '3d': 'خلال ٣ أيام',
  '1w': 'خلال أسبوع',
  '2w': 'خلال أسبوعين',
  'custom': 'تاريخ محدّد'
};
const PLATFORM_LABELS = {
  tiktok: 'تيك توك', snapchat: 'سناب شات', x: 'إكس', instagram: 'انستقرام', youtube: 'يوتيوب'
};
const FOLLOWER_RANGE_LABELS = {
  '20-50k': 'من ٢٠ ألف إلى ٥٠ ألف متابع',
  '50-200k': 'من ٥٠ ألف إلى ٢٠٠ ألف متابع',
  '200-500k': 'من ٢٠٠ ألف إلى ٥٠٠ ألف متابع',
  '500k+': 'أكثر من ٥٠٠ ألف متابع'
};
const CITY_LABELS = { riyadh: 'الرياض', jeddah: 'جدة', dammam: 'الدمام', all: 'كل المناطق' };
function publishTimingText(c) {
  if (!c) return '-';
  if (c.publish_timing === 'custom' && c.publish_date) {
    try { return 'بتاريخ ' + new Date(c.publish_date).toLocaleDateString('ar-SA'); }
    catch (e) { return c.publish_date; }
  }
  return PUBLISH_TIMING_LABELS[c.publish_timing] || c.publish_timing || '-';
}
function followerRangeText(c) {
  if (!c || !c.follower_range) return '';
  return String(c.follower_range).split(',').map(s => s.trim()).filter(Boolean)
    .map(v => FOLLOWER_RANGE_LABELS[v] || v).join('، ');
}

async function init() {
  currentUser = getCurrentUser();
  if (!currentUser) {
    window.location.href = '/login.html';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const applicationId = params.get('app');

  if (!applicationId) {
    document.getElementById('content').innerHTML = '<div class="loading">رابط غير صحيح. <a href="/" style="color:var(--accent-ink)">العودة للرئيسية</a></div>';
    return;
  }

  try {
    const { data: appData, error: appErr } = await supabaseClient
      .from('applications')
      .select('*, users!applications_creator_id_fkey(name, platform, handle, followers, category), campaigns(*, users!campaigns_brand_id_fkey(company_name, name))')
      .eq('id', applicationId)
      .single();

    if (appErr || !appData) {
      document.getElementById('content').innerHTML = '<div class="loading">لم يتم العثور على الحملة</div>';
      return;
    }

    application = {
      ...appData,
      creator_name: appData.users?.name,
      platform: appData.users?.platform,
      handle: appData.users?.handle,
      followers: appData.users?.followers,
      category: appData.users?.category
    };

    campaign = {
      ...appData.campaigns,
      brand_name: appData.campaigns?.users?.company_name
    };

    const isOwner = (currentUser.role === 'brand' && currentUser.id === campaign.brand_id) ||
                    (currentUser.role === 'creator' && currentUser.id === application.creator_id);
    if (!isOwner) {
      document.getElementById('content').innerHTML = '<div class="loading">ليس لديك صلاحية لمشاهدة هذه الصفحة</div>';
      return;
    }

    dealClosed = application.status === 'closed';
    approvedClose = application.brand_approved === true;
    dealDetails = application.deal_details;

    await loadMessagesFromDB();
    render();

    if (messages.length === 0 && currentUser.role === 'brand' && !dealClosed) {
      await startNegotiation();
    }

    // واصل التحديث إذا لم تكتمل الصفقة (status أو الاعتماد)
    if (!dealClosed || !approvedClose) {
      pollInterval = setInterval(checkNewMessages, 5000);
    }
  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = '<div class="loading">حصل خطأ. حدث الصفحة.</div>';
  }
}

async function loadMessagesFromDB() {
  try {
    const { data, error } = await supabaseClient
      .from('negotiations')
      .select('*')
      .eq('application_id', application.id)
      .order('created_at', { ascending: true });

    if (error) throw error;

    messages = (data || []).map(n => ({
      from: n.from_role,
      text: n.message,
      time: n.created_at
    }));
  } catch (err) {
    console.error('Failed to load messages:', err);
    messages = [];
  }
}

async function checkNewMessages() {
  const previousCount = messages.length;
  const wasDealClosed = dealClosed;
  const wasApproved = approvedClose;
  await loadMessagesFromDB();

  try {
    const { data } = await supabaseClient
      .from('applications')
      .select('status, deal_details, final_price, brand_approved')
      .eq('id', application.id)
      .single();
    if (data) {
      if (data.status === 'closed' && !dealClosed) {
        dealClosed = true;
        dealDetails = data.deal_details;
        application.final_price = data.final_price;
      }
      if (data.brand_approved === true && !approvedClose) {
        approvedClose = true;
        application.brand_approved = true;
      }
      // أوقف التحديث لما يتم الإقفال والاعتماد معًا
      if (dealClosed && approvedClose && pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }
  } catch (err) {}

  if (messages.length > previousCount || dealClosed !== wasDealClosed || approvedClose !== wasApproved) {
    render();
  }
}

function render() {
  const brandInitial = campaign.brand_name ? campaign.brand_name[0] : 'ش';
  const isCreator = currentUser.role === 'creator';
  const isBrand = currentUser.role === 'brand';
  const isAwaiting = dealClosed && !approvedClose;
  const isFullyClosed = dealClosed && approvedClose;

  document.getElementById('content').innerHTML = `
    <div class="campaign-header">
      <div class="brand-line">
        <div class="brand-avatar">${brandInitial}</div>
        <span>${campaign.brand_name || 'شركة'}</span>
      </div>
      <h1>${campaign.title}</h1>
      <p class="desc">${campaign.description}</p>
      <div class="meta-grid">
        ${isBrand ? `
        <div class="meta-item">
          <div class="label">الميزانية</div>
          <div class="val">${campaign.budget} ر.س</div>
        </div>
        ` : ''}
        <div class="meta-item">
          <div class="label">موعد النشر</div>
          <div class="val">${publishTimingText(campaign)}</div>
        </div>
        <div class="meta-item">
          <div class="label">المنصة</div>
          <div class="val">${PLATFORM_LABELS[campaign.platform] || campaign.platform || '-'}</div>
        </div>
        <div class="meta-item">
          <div class="label">المتابعين</div>
          <div class="val">${followerRangeText(campaign) || '-'}</div>
        </div>
        <div class="meta-item">
          <div class="label">المدينة</div>
          <div class="val">${CITY_LABELS[campaign.city] || campaign.city || '-'}</div>
        </div>
      </div>
    </div>

    <h2 class="section-title">
      غرفة التفاوض
      ${isFullyClosed
        ? '<span class="badge-closed">✓ اتفاق مكتمل</span>'
        : isAwaiting
          ? '<span class="badge-awaiting">⏳ بانتظار تعميد الشركة</span>'
          : '<span class="badge-live">تفاوض نشط</span>'}
    </h2>

    <div class="application-summary">
      <div class="creator-info">
        <h3>${application.creator_name}</h3>
        <div class="meta">
          ${application.handle || ''} ·
          ${application.followers ? (application.followers / 1000).toFixed(0) + 'K متابع' : 'معلن'} ·
          ${application.platform || ''}
        </div>
      </div>
      <div class="offer-price">${application.price.toLocaleString('ar-SA')} ر.س</div>
    </div>

    <div class="chat">
      <div class="chat-header">
        <div class="agent-avatar">و</div>
        <div class="agent-info">
          <h4>وكيل سيمبل</h4>
          <div class="status">يفاوض نيابة عن ${campaign.brand_name}</div>
        </div>
      </div>
      <div class="messages" id="messages">
        ${renderMessages()}
      </div>
      ${isFullyClosed ? `
        <div class="read-only-notice">
          ✓ تم إقفال الاتفاق بنجاح
        </div>
      ` : isAwaiting ? `
        <div class="read-only-notice awaiting">
          ⏳ بانتظار تعميد الشركة على إقفال الصفقة
        </div>
      ` : !isCreator ? `
        <div class="read-only-notice">
          أنت تشاهد المفاوضة كمراقب. المعلن هي اللي ترد على الوكيل.
        </div>
      ` : `
        <div class="chat-input">
          <textarea id="creator-input" placeholder="اكتب ردك هنا..." rows="1"
                    onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendCreatorMessage();}"></textarea>
          <button onclick="sendCreatorMessage()" id="send-btn">إرسال</button>
        </div>
      `}
    </div>

    ${isAwaiting ? `
      <div class="deal-awaiting-banner">
        <div class="deal-icon">⏳</div>
        <div class="deal-content">
          <h3>${isBrand ? 'بحاجة تعميدك على الصفقة' : 'بانتظار تعميد الشركة'}</h3>
          <p>${isBrand
            ? 'الوكيل توصّل لاتفاق مع المعلن. راجع المفاوضة فوق، واعتمد الصفقة لبدء التنفيذ.'
            : 'تم التوصّل لاتفاق مع الوكيل، بانتظار تعميد الشركة عشان نبدأ التنفيذ.'}</p>
          ${application.final_price ? `<div class="price">${application.final_price.toLocaleString('ar-SA')} ر.س</div>` : ''}
          ${isBrand ? `
            <div class="swipe-track" id="approve-swipe" onclick="event.stopPropagation()">
              <div class="swipe-fill"></div>
              <div class="swipe-hint">اسحب لاعتماد الصفقة</div>
              <div class="swipe-thumb">✓</div>
            </div>
          ` : ''}
        </div>
      </div>
    ` : isFullyClosed && dealDetails ? `
      <div class="deal-closed-banner">
        <div class="deal-icon">✓</div>
        <div class="deal-content">
          <h3>تم الاتفاق بنجاح</h3>
          <p>${escapeHtml(dealDetails)}</p>
          ${application.final_price ? `<div class="price">${application.final_price.toLocaleString('ar-SA')} ر.س</div>` : ''}
          <a href="/${isBrand ? 'brand' : 'creator'}.html" style="display:inline-block; margin-top:16px; background:#fff; color:var(--accent-ink); padding:12px 28px; border-radius:100px; text-decoration:none; font-weight:500; font-family:var(--font-body)">بدء التسليم ←</a>
        </div>
      </div>
    ` : ''}
  `;

  scrollToBottom();
  initSwipeTracks();
}

function renderMessages() {
  let html = messages.map(m => `
    <div class="msg from-${m.from}">
      <div>
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-meta">${formatTime(m.time)}</div>
      </div>
    </div>
  `).join('');

  if (isAgentThinking) {
    html += `
      <div class="msg from-agent">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
  }

  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  if (m) m.scrollTop = m.scrollHeight;
}

// ============ Swipe to approve handler ============
let activeSwipe = null;

function initSwipeTracks() {
  document.querySelectorAll('.swipe-track').forEach(track => {
    if (track.dataset.swipeReady === '1') return;
    track.dataset.swipeReady = '1';
    const thumb = track.querySelector('.swipe-thumb');
    if (!thumb) return;
    thumb.addEventListener('mousedown', e => swipeStart(e, track));
    thumb.addEventListener('touchstart', e => swipeStart(e, track), { passive: false });
  });
}

function swipeStart(e, track) {
  if (track.classList.contains('done')) return;
  const thumb = track.querySelector('.swipe-thumb');
  const fill = track.querySelector('.swipe-fill');
  const hint = track.querySelector('.swipe-hint');
  activeSwipe = {
    track, thumb, fill, hint,
    startX: e.touches ? e.touches[0].clientX : e.clientX,
    trackWidth: track.offsetWidth,
    thumbWidth: 48,
    padding: 8,
    currentLeft: 0
  };
  thumb.classList.add('dragging');
  e.preventDefault();
}

function swipeMove(e) {
  if (!activeSwipe) return;
  const s = activeSwipe;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const delta = s.startX - cx;
  const max = s.trackWidth - s.thumbWidth - s.padding * 2;
  s.currentLeft = Math.max(0, Math.min(max, delta));
  s.thumb.style.right = (s.padding + s.currentLeft) + 'px';
  s.fill.style.width = (s.currentLeft + s.thumbWidth + s.padding) + 'px';
  const pct = s.currentLeft / max;
  s.hint.style.opacity = Math.max(0, 1 - pct * 1.6);
  if (pct >= 0.92) swipeComplete();
}

function swipeEnd() {
  if (!activeSwipe) return;
  const s = activeSwipe;
  const max = s.trackWidth - s.thumbWidth - s.padding * 2;
  s.thumb.classList.remove('dragging');
  if (s.currentLeft / max < 0.92) {
    s.thumb.style.right = s.padding + 'px';
    s.fill.style.width = '0px';
    s.hint.style.opacity = 1;
  }
  activeSwipe = null;
}

function swipeComplete() {
  if (!activeSwipe) return;
  const s = activeSwipe;
  const max = s.trackWidth - s.thumbWidth - s.padding * 2;
  s.thumb.style.right = (s.padding + max) + 'px';
  s.fill.style.width = (max + s.thumbWidth + s.padding) + 'px';
  s.track.classList.add('done');
  s.hint.textContent = '✓ جاري الاعتماد...';
  s.hint.style.opacity = 1;
  s.thumb.classList.remove('dragging');
  activeSwipe = null;
  approveDeal();
}

if (!window.__simblSwipeBound) {
  window.__simblSwipeBound = true;
  window.addEventListener('mousemove', swipeMove);
  window.addEventListener('touchmove', swipeMove, { passive: false });
  window.addEventListener('mouseup', swipeEnd);
  window.addEventListener('touchend', swipeEnd);
  window.addEventListener('touchcancel', swipeEnd);
}

async function startNegotiation() {
  isAgentThinking = true;
  render();

  try {
    const res = await fetch('/api/negotiate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ campaign, application, history: [] })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    isAgentThinking = false;
    await loadMessagesFromDB();

    if (data.dealClosed) {
      dealClosed = true;
      dealDetails = data.dealDetails;
      // approvedClose يظل false، الشركة لازم تعتمد
    }

    render();
  } catch (err) {
    console.error(err);
    isAgentThinking = false;
    render();
    alert('حصل خطأ في الاتصال بالوكيل. حدث الصفحة وحاول من جديد.');
  }
}

async function sendCreatorMessage() {
  const input = document.getElementById('creator-input');
  const text = input.value.trim();
  if (!text || isAgentThinking || dealClosed) return;

  input.value = '';
  isAgentThinking = true;
  render();

  messages.push({ from: 'creator', text, time: new Date().toISOString() });
  render();

  try {
    const historyBeforeNew = messages.slice(0, -1);
    const res = await fetch('/api/negotiate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        campaign,
        application,
        history: historyBeforeNew,
        creatorMessage: text
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    isAgentThinking = false;
    await loadMessagesFromDB();

    if (data.dealClosed) {
      dealClosed = true;
      dealDetails = data.dealDetails;
    }

    render();
  } catch (err) {
    console.error(err);
    isAgentThinking = false;
    render();
    alert('حصل خطأ. حاول مرة أخرى.');
  }
}

async function approveDeal() {
  try {
    const { data, error } = await supabaseClient
      .from('applications')
      .update({ brand_approved: true })
      .eq('id', application.id)
      .select();
    if (error) throw error;
    if (!data || data.length === 0) {
      throw new Error('لم يتم التحديث. تحقق من سياسات الحماية.');
    }

    approvedClose = true;
    application.brand_approved = true;
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

    // إشعار المعلن
    if (application.creator_id) {
      const title = '🎉 تم اعتماد الصفقة';
      const body = `${campaign.title || 'صفقة'}: الشركة اعتمدت الاتفاق! نبدأ التنفيذ.`;
      try {
        await createNotification(application.creator_id, 'deal_approved', title, body, '/creator.html');
      } catch (e) { console.error(e); }
      fetch('https://rdzzzasbyzugxogbgwwn.supabase.co/functions/v1/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + supabaseClient.supabaseKey },
        body: JSON.stringify({ title, body, url: '/creator.html', target_users: [application.creator_id] })
      }).catch(console.error);
    }

    render();
  } catch (err) {
    console.error('Approve error:', err);
    alert('حصل خطأ في الاعتماد: ' + (err.message || 'حاول مرة أخرى'));
    // أعد رسم السحب للحالة الأصلية
    render();
  }
}

window.addEventListener('beforeunload', () => {
  if (pollInterval) clearInterval(pollInterval);
});

init();
</script>
