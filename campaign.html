<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحملة - سيمبل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #F7F3EC;
  --cream-darker: #EFE9DD;
  --ink: #1A1714;
  --ink-soft: #3D3833;
  --ink-muted: #6B645B;
  --ink-faint: #A8A095;
  --accent: #D4523A;
  --accent-soft: #E8917E;
  --olive: #5B6042;
  --gold: #B8915E;
  --line: rgba(26, 23, 20, 0.1);
  --line-strong: rgba(26, 23, 20, 0.2);
  --success: #5B6042;
  --font-display: 'Reem Kufi', sans-serif;
  --font-serif: 'Noto Naskh Arabic', serif;
  --font-body: 'Tajawal', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 300;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  opacity: 0.3; mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' seed='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.35 0 0 0 0 0.3 0 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
.nav {
  background: var(--cream);
  padding: 20px 0;
  border-bottom: 1px solid var(--line);
}
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
.logo-mark {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 700; letter-spacing: -1px;
  position: relative;
}
.logo-mark::after {
  content: ''; position: absolute; bottom: 4px; inset-inline-end: -8px;
  width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
}
.back-link { color: var(--ink-muted); text-decoration: none; font-size: 14px; }
.back-link:hover { color: var(--accent); }

.page { padding: 40px 0 80px; }

.campaign-header {
  background: white;
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 32px;
  margin-bottom: 24px;
}
.brand-line {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; color: var(--ink-muted); margin-bottom: 12px;
}
.brand-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--cream-darker); color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600;
}
h1 {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 600; letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.desc { color: var(--ink-soft); margin-bottom: 24px; line-height: 1.7; }
.meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  padding-top: 20px; border-top: 1px solid var(--line);
}
.meta-item .label {
  font-size: 11px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 6px;
}
.meta-item .val {
  font-family: var(--font-display); font-weight: 500; font-size: 15px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600;
  margin: 32px 0 16px; letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 10px;
}
.badge-live {
  font-size: 11px; font-weight: 500; padding: 4px 10px;
  background: rgba(212, 82, 58, 0.1); color: var(--accent);
  border-radius: 100px; display: inline-flex; align-items: center; gap: 6px;
}
.badge-live::before {
  content: ''; width: 6px; height: 6px; background: var(--accent);
  border-radius: 50%; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.application-summary {
  background: var(--cream-darker);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
}
.creator-info h3 {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600; margin-bottom: 4px;
}
.creator-info .meta { font-size: 13px; color: var(--ink-muted); }
.offer-price {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 600; color: var(--accent);
  letter-spacing: -0.5px;
}

.chat {
  background: white;
  border: 1px solid var(--line);
  border-radius: 24px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 500px;
}
.chat-header {
  padding: 16px 24px;
  background: var(--ink);
  color: var(--cream);
  display: flex; align-items: center; gap: 12px;
}
.agent-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600;
}
.agent-info h4 {
  font-family: var(--font-display); font-size: 15px; font-weight: 500;
}
.agent-info .status { font-size: 11px; opacity: 0.7; }

.messages {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
  max-height: 480px;
}
.msg { display: flex; gap: 12px; max-width: 85%; }
.msg.from-creator { align-self: flex-end; flex-direction: row-reverse; }
.msg-bubble {
  padding: 14px 18px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.msg.from-agent .msg-bubble {
  background: var(--cream-darker);
  border-bottom-right-radius: 4px;
}
.msg.from-creator .msg-bubble {
  background: var(--accent);
  color: white;
  border-bottom-left-radius: 4px;
}
.msg-meta {
  font-size: 11px; color: var(--ink-faint);
  margin-top: 4px;
  text-align: end;
}
.msg.from-creator .msg-meta { text-align: start; }

.typing {
  display: flex; gap: 4px;
  padding: 14px 18px;
  background: var(--cream-darker);
  border-radius: 18px;
  border-bottom-right-radius: 4px;
  align-self: flex-start;
}
.typing span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ink-muted);
  animation: bounce 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-8px); opacity: 1; }
}

.chat-input {
  padding: 16px 24px;
  border-top: 1px solid var(--line);
  display: flex; gap: 12px;
}
.chat-input textarea {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  font-family: var(--font-body);
  font-size: 14px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
}
.chat-input textarea:focus {
  outline: none; border-color: var(--accent);
}
.chat-input button {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 0 24px;
  border-radius: 100px;
  font-family: var(--font-body);
  font-weight: 500;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}
.chat-input button:hover { background: var(--accent); }
.chat-input button:disabled {
  background: var(--ink-faint); cursor: not-allowed;
}

.read-only-notice {
  background: var(--cream-darker);
  padding: 16px;
  text-align: center;
  font-size: 13px;
  color: var(--ink-muted);
  border-top: 1px solid var(--line);
}

.deal-closed {
  background: var(--success);
  color: white;
  padding: 20px 24px;
  border-radius: 16px;
  margin-top: 20px;
  text-align: center;
}
.deal-closed h3 {
  font-family: var(--font-display);
  font-size: 20px;
  margin-bottom: 8px;
}
.deal-closed p { font-size: 14px; opacity: 0.9; }

.loading {
  text-align: center;
  padding: 60px;
  color: var(--ink-muted);
}

@media (max-width: 640px) {
  .container { padding: 0 16px; }
  .campaign-header { padding: 24px; }
  h1 { font-size: 22px; }
  .application-summary { grid-template-columns: 1fr; }
  .offer-price { font-size: 20px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <span class="logo-mark">سيمبل</span>
    </a>
    <a href="javascript:history.back()" class="back-link">← العودة</a>
  </div>
</nav>

<main class="page">
  <div class="container" id="content">
    <div class="loading">جاري التحميل...</div>
  </div>
</main>

<script src="supabase-config.js"></script>
<script>
let currentUser = null;
let campaign = null;
let application = null;
let messages = [];
let isAgentThinking = false;
let dealClosed = false;

async function init() {
  currentUser = getCurrentUser();
  if (!currentUser) {
    window.location.href = '/login.html';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const applicationId = params.get('app');

  if (!applicationId) {
    document.getElementById('content').innerHTML = '<div class="loading">رابط غير صحيح. <a href="/" style="color:var(--accent)">العودة للرئيسية</a></div>';
    return;
  }

  try {
    // جلب التقديم والحملة
    const { data: appData, error: appErr } = await supabaseClient
      .from('applications')
      .select('*, users!applications_creator_id_fkey(name, platform, handle, followers, category), campaigns(*, users!campaigns_brand_id_fkey(company_name, name))')
      .eq('id', applicationId)
      .single();

    if (appErr || !appData) {
      document.getElementById('content').innerHTML = '<div class="loading">لم يتم العثور على الحملة</div>';
      return;
    }

    application = {
      ...appData,
      creator_name: appData.users?.name,
      platform: appData.users?.platform,
      handle: appData.users?.handle,
      followers: appData.users?.followers,
      category: appData.users?.category
    };

    campaign = {
      ...appData.campaigns,
      brand_name: appData.campaigns?.users?.company_name
    };

    // التحقق من الصلاحية
    const isOwner = (currentUser.role === 'brand' && currentUser.id === campaign.brand_id) ||
                    (currentUser.role === 'creator' && currentUser.id === application.creator_id);
    if (!isOwner) {
      document.getElementById('content').innerHTML = '<div class="loading">ليس لديك صلاحية لمشاهدة هذه الصفحة</div>';
      return;
    }

    // تحميل المحادثة من localStorage (نخزنها محلياً مؤقتاً)
    const stored = localStorage.getItem('simbl_chat_' + applicationId);
    if (stored) {
      const parsed = JSON.parse(stored);
      messages = parsed.messages || [];
      dealClosed = parsed.dealClosed || false;
    }

    render();

    // لو محادثة جديدة، ابدأ بالوكيل
    if (messages.length === 0 && currentUser.role === 'brand') {
      await startNegotiation();
    }
  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = '<div class="loading">حصل خطأ. حدث الصفحة.</div>';
  }
}

function render() {
  const brandInitial = campaign.brand_name ? campaign.brand_name[0] : 'ش';
  const isCreator = currentUser.role === 'creator';

  document.getElementById('content').innerHTML = `
    <div class="campaign-header">
      <div class="brand-line">
        <div class="brand-avatar">${brandInitial}</div>
        <span>${campaign.brand_name || 'شركة'}</span>
      </div>
      <h1>${campaign.title}</h1>
      <p class="desc">${campaign.description}</p>
      <div class="meta-grid">
        <div class="meta-item">
          <div class="label">الميزانية</div>
          <div class="val">${campaign.budget} ر.س</div>
        </div>
        <div class="meta-item">
          <div class="label">المدة</div>
          <div class="val">${campaign.duration || '-'}</div>
        </div>
        <div class="meta-item">
          <div class="label">الباقة</div>
          <div class="val">${campaign.package || '-'}</div>
        </div>
        <div class="meta-item">
          <div class="label">المتطلبات</div>
          <div class="val">${campaign.requirements || 'لا توجد'}</div>
        </div>
      </div>
    </div>

    <h2 class="section-title">
      غرفة التفاوض
      <span class="badge-live">${dealClosed ? 'اتفاق مكتمل' : 'تفاوض نشط'}</span>
    </h2>

    <div class="application-summary">
      <div class="creator-info">
        <h3>${application.creator_name}</h3>
        <div class="meta">
          ${application.handle || ''} ·
          ${application.followers ? (application.followers / 1000).toFixed(0) + 'K متابع' : 'مؤثرة'} ·
          ${application.platform || ''}
        </div>
      </div>
      <div class="offer-price">${application.price.toLocaleString('ar-SA')} ر.س</div>
    </div>

    <div class="chat">
      <div class="chat-header">
        <div class="agent-avatar">و</div>
        <div class="agent-info">
          <h4>وكيل سيمبل</h4>
          <div class="status">يفاوض نيابة عن ${campaign.brand_name}</div>
        </div>
      </div>
      <div class="messages" id="messages">
        ${renderMessages()}
      </div>
      ${dealClosed ? `
        <div class="read-only-notice">
          تم إقفال الاتفاق. لا يمكن إرسال رسائل إضافية.
        </div>
      ` : !isCreator ? `
        <div class="read-only-notice">
          أنت تشاهد المفاوضة كمراقب. المؤثرة هي اللي ترد على الوكيل.
        </div>
      ` : `
        <div class="chat-input">
          <textarea id="creator-input" placeholder="اكتبي ردك هنا..." rows="1"
                    onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendCreatorMessage();}"></textarea>
          <button onclick="sendCreatorMessage()" id="send-btn">إرسال</button>
        </div>
      `}
    </div>
  `;

  scrollToBottom();
}

function renderMessages() {
  let html = messages.map(m => `
    <div class="msg from-${m.from}">
      <div>
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-meta">${formatTime(m.time)}</div>
      </div>
    </div>
  `).join('');

  if (isAgentThinking) {
    html += `
      <div class="msg from-agent">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
  }

  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  if (m) m.scrollTop = m.scrollHeight;
}

function saveChat(applicationId) {
  localStorage.setItem('simbl_chat_' + applicationId, JSON.stringify({
    messages, dealClosed
  }));
}

async function startNegotiation() {
  isAgentThinking = true;
  render();

  try {
    const res = await fetch('/api/negotiate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ campaign, application, history: [] })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    messages.push({
      from: 'agent',
      text: data.reply,
      time: new Date().toISOString()
    });

    if (data.dealClosed) dealClosed = true;

    isAgentThinking = false;
    saveChat(application.id);
    render();
  } catch (err) {
    console.error(err);
    isAgentThinking = false;
    messages.push({
      from: 'agent',
      text: 'حصل خطأ في الاتصال بالوكيل. الرجاء تحديث الصفحة والمحاولة من جديد.',
      time: new Date().toISOString()
    });
    render();
  }
}

async function sendCreatorMessage() {
  const input = document.getElementById('creator-input');
  const text = input.value.trim();
  if (!text || isAgentThinking || dealClosed) return;

  messages.push({
    from: 'creator',
    text,
    time: new Date().toISOString()
  });
  input.value = '';
  isAgentThinking = true;
  render();
  saveChat(application.id);

  try {
    const res = await fetch('/api/negotiate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        campaign,
        application,
        history: messages.slice(0, -1),
        creatorMessage: text
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    messages.push({
      from: 'agent',
      text: data.reply,
      time: new Date().toISOString()
    });

    if (data.dealClosed) dealClosed = true;

    isAgentThinking = false;
    saveChat(application.id);
    render();
  } catch (err) {
    console.error(err);
    isAgentThinking = false;
    messages.push({
      from: 'agent',
      text: 'حصل خطأ في الاتصال. حاولي مرة أخرى.',
      time: new Date().toISOString()
    });
    render();
  }
}

init();
</script>

</body>
</html>
